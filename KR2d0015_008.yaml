body:
  text: 春秋别典卷八明薛虞畿撰魯襄公二十五年齊景公立至哀五年方卒而晏子則自昭二十年以後不見傳景公晏子問答疑在襄末昭初之年故類輯於此晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人將加大誅於子晏子對曰臣請改道易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰甚善矣子之治東阿也晏子對曰前臣之治東阿也屬託不行貨賄不至陂池之魚以利貧民當是之時民無饑者而君反以罪臣今臣之復至東阿也屬託行貨賄至并㑹賦斂倉庫少內便事左右陂池之魚入於權家當此之時饑者過半矣君乃反迎而賀臣愚不能復治東阿願乞骸骨避賢者之路再拜便辟景公乃下席而謝之曰子强復治東阿東阿者子之東阿也寡人無與焉晏子方食君之使者至分食而食之晏子不飽使者返言之景公景公曰嘻夫子之家若是其貧也寡人不知也是寡人之過也令吏致千家之縣一於晏子晏子再拜而辭曰嬰之家不貧以君之賜澤覆三族延及交逰以振百姓君之賜也厚矣嬰之家不貧也嬰聞之厚取之君而厚施之人代君為君也忠臣不為也厚取之君而藏之是筐篋存也仁人不為也厚取之君而無所施之身死而財遷智者不為也嬰也聞為人臣進不事上以為忠退不克下以為亷八升之布一豆之食足矣使者三返並辭不受也晏子朝乘敝車駕駑馬景公見之曰嘻夫子之祿寡耶何乘不任之甚也晏子對曰賴君之賜足以夀三族及國交逰皆得生焉臣得暖衣飽食敝車駑馬以奉其身於臣足矣晏子出公使梁丘據遺之輅車乘馬三返不受公不悅趣召晏子晏子至公曰夫子不受寡人亦不乘晏子對曰君使臣臨百官之吏節其衣服飲食之養以先齊國之人然猶恐其侈靡而不顧其行也今輅車乘馬君乘之臣亦乘之下民之無義侈其衣食而不顧其行者臣無以禁之遂讓不受也景公飲酒移于晏子家前驅報閭曰君至晏子被𤣥端立于門曰諸侯得微有故乎于國家得微有事乎君何為非時而夜辱乎公曰酒醴之味金石之聲願與夫子樂之晏子對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于司馬穰苴之家前馳報閭曰君至司馬穰苴介胄操㦸立于門曰諸侯得微有兵乎大臣得微有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于梁丘據之家前驅報閭曰君至梁丘據左操瑟右挈竽行歌而至公曰樂哉今夕吾飲也微彼二子何以治吾國微此一臣者何以樂吾身聖賢之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰乃薦田穰苴田穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大說之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓不信人微權輕願得君之寵臣國之所尊以監軍乃可於是景公許之使莊賈往穰苴既辭與莊賈約曰旦日日中㑹於軍門穰苴先馳至軍立表下漏待賈賈素驕貴以為將已之軍而已為監不甚急親戚左右送之留飲日中而賈不至穰苴則仆表决漏入行軍勒兵申明約束約束既定夕時乃至穰苴曰何後期為賈謝曰大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身今敵國深侵邦內騷動士卒暴露於境君寢不安席食不甘味百姓之命皆懸於君何謂相送乎召軍正問曰軍法期而後至者云何對曰當斬莊賈懼使人馳報景公請救既往未及反於是遂斬莊賈以徇三軍三軍之士皆振栗久之景公遣使者持節赦賈馳入軍中穰苴曰將在軍君命有所不受問軍正曰軍中不馳今使者馳云何正曰當斬使者大懼穰苴曰君之使不可殺之乃斬其僕車之右駙馬之左驂以徇三軍遣使者還報然後行士卒次舍井竈飲食問疾醫藥身自拊循之悉取將軍之資糧享士卒身與士卒平分糧食最比其羸弱者三日而後勒兵病者皆求行爭奮出為之赴戰晉師聞之為罷去燕師聞之度水而解於是追擊之遂取所亡封內故境而引兵歸未至國釋兵旅解約束誓盟而後入邑景公與諸大夫郊迎勞師成禮然後反歸寢既旦穰苴尊為大司馬田氏日以益尊於齊已而大夫鮑氏髙國之屬害之譛於景公景公退穰苴穰苴發疾而死景公飲酒陳桓子侍望見晏子而復于公曰請浮晏子公曰何故也對曰晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隱君之賜也公曰諾酌者奉觴而進之曰君命浮子晏子曰何故也陳桓子曰君賜之卿位以尊其身寵之百萬以富其家羣臣之爵莫尊于子祿莫厚於子今子衣緇布之衣麋鹿之裘􅳞軫之車而駕駑馬以朝則是隱君之賜也故浮子晏子避席曰請飲而後辭乎其辭而後飲乎公曰辭然後飲晏子曰君賜卿位以顯其身嬰不敢為顯受也為行君令也寵之百萬以富其家嬰不敢為富受也為通君賜也臣聞古之賢臣有受君賜而不顧其國族則過之臨事守職不勝其任則過之君之內𨽻臣之父兄若有離叛在於鄙野者此臣之罪也君之外𨽻臣之所職若有播亡在四方者此臣之罪也兵革不完戰車不修此臣之罪也若夫弊車駑馬以朝主者非臣之罪也且臣以君之賜臣父之黨無不乘車者母之黨無不足於衣食者妻之黨無凍餒者國之管士待臣而後舉火者數百家如此為隱君之賜乎彰君之賜乎公曰善為我浮桓子也越石父賢在縲絏中晏子出遭之塗解左驂贖之載歸弗謝入閨久之越石父請絶晏子戄然攝衣冠謝曰嬰雖不仁免子於厄何子求絶之速也石父曰不然吾聞君子絀於不知已而信於知已者方吾在縲絏中彼不知我也夫子既以感寤而贖我是知已也知已而無禮固不如在縲絏之中晏子延入為上客晏子為齊相出其御之妻從門間而窺其夫為相御擁大蓋䇿駟馬意氣揚揚甚自得也既而歸其妻謝請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺方為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子怪而問之御以實對晏子薦以為大夫越石父曰不肖人自賢也愚者自靈也佞人者皆莫能相其心口以出之又謂人勿言也譬之臨渴而穿井臨難而後鑄兵雖疾從而不及也夫臨財忘貧臨生忘死可以逺罪矣夫君子愛口孔雀愛羽虎豹愛爪此皆所以治身法也上交者不失其祿下交者不離於患是以君子擇人與交農人擇田而田君子樹人農人樹田田者擇種而種之豐年必得粟士擇人而樹之豐時必得祿矣天下失道而後仁義出焉國家不治而後孝子生焉民爭不分而後慈惠生焉道逆時反而後權謀生焉凡善之生皆學之所由一室之中又有主道焉父母之謂也故君正則百姓治父母正則子孫孝慈是以孔子家兒不知罵曽子家兒不知怒所以然者生而善教也夫仁者好合不仁者好蘺人故君子居人間則治小人居人間則亂君子欲和人譬猶水火不相能然也而鼎在其間火水不亂乃和百味是以君子不可以不慎擇人在其間齊景公為露臺之寢成而不通焉柏常騫曰為臺甚急臺成君何為不通焉公曰然梟昔者鳴其聲無不為也吾惡之盛是以不通焉柏常騫曰臣請禳而去之公曰何具對曰築新室為置白茅焉公使為室成置白茅焉柏常騫夜用事明日問公曰今者聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死公曰子之道若此其明也亦能益寡人夀乎對曰能公曰能益幾何對曰天子九諸侯七大夫五公曰亦有徴兆之見乎對曰得夀地且動公喜令百官趣具騫之所求柏常騫出遭晏子於塗拜馬前辭曰騫為君禳梟而殺之君謂騫曰子之道若此其明也亦能益寡人夀乎騫曰能今旦大祭為君請夀故將往以聞晏子曰嘻亦善矣能為君請夀也雖然吾聞之惟以政與德順乎神可以益夀今徒祭可以益夀乎然則福召有見乎對曰得夀地將動晏子曰騫昔者吾見紀星絶樞星散地其動汝以是乎柏常騫俯有間仰而對曰然晏子曰為之無益不為無損也薄賦斂無費民且令君知之晏子復於景公曰朝居嚴乎公曰朝居嚴則曷害于國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之暗上無聞則謂之聾聾暗則非害國家如何也且合菽粟之激以滿倉廩合疏縷之緯以成幃幕太山之髙非一石也纍卑然後髙也夫治天下者非一士之言也固有受而不用烏有距而不入者哉林既衣韋衣而朝齊景公景公曰此君子之服也小人之服也林既逡巡而作色曰夫服事何足以端士行乎昔者荆為長創危冠令尹子西出焉齊短衣而遂傑之冠管仲隰朋出焉越文身鬋髮范蠡大夫種出焉西戎左袵而椎結由余亦出焉即如君之言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得無為變乎景公曰子其為勇悍矣今未嘗見之竒辨也一鄰之鬬也千乘之勝也林既曰不知君之所謂何也夫登髙臨危而目不眴而足不陵者此工匠之勇悍者也入深淵刺蛟龍抱龜鱉而出者此漁夫之勇悍也入深山刺虎豹抱熊羆而出者此獵夫之勇悍也不難斷頭裂腹暴骨流血中野者此武夫之勇悍也今臣居廣庭作色端辨以犯主君之怒前雖有乘軒之賞未為之動也後雖有斧鑕之威未為之恐也此既之所為勇悍也齊侯問於晏子曰為政何患對曰患善惡之不分公曰何以察之對曰審擇左右左右善則百寮各得其所宜而善惡分孔子聞之曰此言也信矣善言進則不善無由入矣不善言進則善無由入矣復槀之君朝齊桓公問治民焉復槀之君不對而循口操襟抑心袵抑心桓公曰與民共甘苦饑寒乎夫以我為聖人也故不用言而諭因禮之千金景公好婦人而丈夫飾者國人盡服之從使吏禁之曰女子而男子飾者裂其衣斷其帶裂衣斷帶相望而不止晏子見公曰寡人使吏禁女子而男子飾者裂其衣斷其帶相望而不止者何也對曰君使服之於內而禁之於外猶懸牛首於門而求買馬肉也公胡不使內勿服則外莫敢為也公曰善使內勿服不旋月而國莫之為也齊人甚好轂擊相犯以為樂禁之不止晏子患之乃為新車良馬出與人相犯也曰擊轂者不祥臣其祭祀不順居處不敬乎下車棄而去之然後國人乃不為景公伐宋至于岐隄之上登髙以望太息而嘆曰昔我先公桓公長轂八百乘以霸諸侯今我長轂三千乘而不敢久處於此者豈其無管仲歟弦章對曰臣聞之水廣則魚大君明則臣出昔有桓公固有管仲今桓公在此則車下之臣盡管仲也齊景公問於晏子曰當今之時諸侯孰危對曰莒其亡乎公曰奚故對曰地侵於齊貨竭於晉是以亡也景公畋於梧丘夜猶蚤公姑坐睡而夢有五丈夫北面倚盧稱無罪焉公覺召晏子而告其所夢公曰我其嘗殺不辜而誅無罪也晏子對曰昔者先君靈公畋五丈夫罟而駭獸故殺之斷其首而葬之曰五丈夫之丘此耶公令人掘而求之則五頭同穴而存焉公曰嘻令吏葬之國人不知其夢也曰君憫白骨而况於生者乎不遺餘力矣不釋餘智矣故曰人君之為易也孔子見齊景公梁丘據自外而至公曰何遲對曰陳氏戮其小臣小臣有辭為是故遲公笑而目孔子曰周書所謂明德慎罰陳子明德也罰人而有辭罰不慎矣孔子答曰昔康叔封衛統三監之地命為孟侯周公以成王之命作康誥焉稱述文王之德以成敕誡之文其書曰惟爾丕顯考文王克明德慎罰克明德者能顯用有德舉而任之也慎罰者并心而慮之衆平然後行之致刑措也此言其所任不失德所罰不失罪不謂巳德之明也公曰寡人不有過言則吾將聞君子之教也髙繚仕於晏子晏子逐之左右諫曰髙繚之事夫子三年曽無爵位而逐之其義可乎晏子曰嬰仄陋之人也四維之然後能宜今此子事我三年未曽弼吾過是以逐之也景公逰於海上而樂之六月不歸令左右曰敢有先言歸者致死不赦顔燭趨進諫曰君樂治海上六月不歸後儻有治國者君且安得樂此海也景公援㦸將斫之顔燭趨集撫衣待之曰君奚不斫也昔者桀殺關龍逢紂殺王子比干君之賢非比二王也臣之材亦非比二子也君奚不斫以臣參此二者不亦可乎景公說遂歸中道聞國人謀不內矣齊侯問於晏子曰忠臣之事君也何若對曰有難不死出亡不送君曰裂地而封疏爵而貴之君有難不死出亡不送可謂忠乎對曰言而見用終身無難臣何死焉謀而見從終身不亡臣何送焉若言不見用君難而死之是妄死也諫而不見從出亡而送是詐僞也故忠臣者能納善於君也而不能與其君陷難者也齊大旱景公召羣臣問曰天不雨久矣民且有饑色吾使人卜之祟在髙山廣水寡人欲少斂以祠靈山可乎羣臣莫對晏子進曰不可祠此無益也夫靈山固以石為身以草木為髮天久不雨髮將焦身將熱彼獨不欲雨乎祠之無益景公曰不然吾欲祠河伯可乎晏子曰不可祠此無益也夫河伯以水為國以魚鱉為民天久不雨水泉將下百川竭國將亡民將滅矣彼獨不用雨乎祠之何益景公曰今為之奈何晏子曰君誠避宫殿暴露與靈山河伯共憂其幸而雨乎于是景公出野暴露三日天果大雨民盡得種樹景公曰善哉晏子之言可無用乎其惟有德也齊景公嘗賞賜及後宫文繡被臺榭菽粟食鳬鴈出而見殣謂晏子曰此何為死晏子對曰此餒而死公曰嘻寡人之無德也何甚矣晏子對曰君之德著而彰何為無德也景公曰何謂也對曰君之德及後宮與臺榭君之玩物衣以文繡君之鳬鴈食以菽粟君之營內自樂延及後宫之施何為其無德也顧臣願有請於君由君之意自樂之心推而與百姓同之則何殣之有君不推此茍營內好私便則貨偏有所聚粟菽幣帛腐於囷府惠不遍加於百姓公心不周乎國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛德以布之于天下則湯武可為也殣何足恤哉晏子飲景公酒日暮公呼具火晏子辭曰詩曰側辨之俄言失德也屢儛傞傞言失容也既醉以酒既飽以德既醉而出竝受其福賓主之禮也醉而不出是謂伐德賓主之罪也嬰以卜其日未卜其夜公曰善舉酒而祭之再拜而出曰豈過我哉吾託國于晏子也以其家貧善寡人也不欲其淫侈也而况于寡人謀國乎景公飲酒而樂釋衣冠自鼓缶謂侍者曰仁人亦樂是乎梁丘子曰仁人耳目亦猶人也奚為獨不樂此也公曰速駕迎晏子晏子朝服以至公曰寡人甚樂此樂也願與夫子共之請去禮晏子對曰君之言過矣齊國五尺之童子力盡勝嬰而又勝君所以不敢亂者畏禮也上若無禮無以使其下下若無禮無以事其上夫麋鹿惟無禮故父子同麀人之所以貴於禽獸者以有禮也詩曰人而無禮胡不遄死故禮不可去也公曰寡人無良左右淫湎寡人以至於此請殺之晏子曰左右何罪君若好禮左右有禮者至無禮者去君若無禮亦將如之公曰善請革衣冠更受命乃嚴酒而更尊朝服而坐觴三行晏子趨出景公為臺臺成又欲為鐘晏子諌曰君不勝欲為臺又欲為鐘是重斂于民民之哀矣夫斂民之哀而以為樂不祥景公乃止景公正書被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慙而不朝晏子睹裔敖而問曰君何故不朝對曰昔者君正晝被髮乘六馬御婦人出正閨刖跪擊其馬而反之曰爾非吾君也公慙而反不果出是以不朝晏子入見公曰昔者寡人有罪被髮乘六馬以出正閨刖跪擊其馬而反之曰爾非吾君也寡人以天子大夫之賜得率百姓以守宗廟今見戮于刖跪以辱社稷吾猶可以齊于諸侯乎晏子對曰君無惡焉臣聞之下無直辭上無隱君民多諱言君有驕行古者明君在上下有直辭上好善民無諱言今君有失行而刖跪有直辭是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諫公笑曰可乎晏子曰可於是令刖跪倍資無正時朝無事景公出弋昭華之池顔鄧聚一作燭雛主鳥而亡之景公怒而欲殺之晏子曰夫鄧聚有死罪四請數而誅之於是乃召聚數之景公之前曰鄧聚為君主鳥而亡之是罪一也使吾君以鳥之故而殺人是罪二也使四國諸侯聞之以吾君重鳥而輕士是罪三也天子聞之必將貶絀吾見君危其社稷絶其宗廟是罪四也此四罪者故當殺無赦臣請加誅焉景公曰止此亦吾過矣請為寡人謝之景公有馬圉人殺之公怒援戈將自擊之晏子曰此不知其罪而死臣請為君數之令知其罪而殺之公曰諾晏子舉戈而臨之曰汝為我君養馬而殺之而罪當死汝使吾君以馬故殺圉人而罪又當死使吾君以馬故殺人聞于四鄰諸侯汝罪又當死公曰夫子釋之夫子解之勿傷吾仁也齊有北郭騷者結罟網捆蒲葦織屨履以養其母猶不足見晏子曰願乞所以養母僕曰此齊之賢者也不臣天子不友諸侯今乞所以養母說夫子之義也必與之晏子分倉粟府金而遺之辭金受粟有間晏子出奔過北郭騷之門而辭北郭子曰夫子勉之晏子太息曰嬰之亡豈不宜哉亦不知士甚矣晏子行北郭子召其友告之曰養及親者身伉其難晏子見疑吾將以死白之令其友操劍奉笥而從造於君庭曰晏子天下之賢者也去則齊國必侵矣不若先死請以頭託白晏子退而自刎其友曰北郭子為國故死吾將為北郭子死又退而自刎齊君大駭乘驛自追晏子請而反之晏子聞北郭騷以死白已也曰嬰之亡豈不宜哉亦愈不知士甚矣景公逰於牛山之上而北望齊曰美哉國乎鬱鬱泰山使古而無死者則寡人將去此而何之俯而泣沾襟國子髙子曰然臣受君之賜疏食惡肉可得而食也駑馬柴車可得而乘也且猶不欲死况君乎俯泣晏子曰樂哉今日嬰之逰也見怯君一而諛臣二使古而無死者則太公至今猶存吾君方今將被蓑笠而立乎畎畝之中惟事之恤何暇念死乎景公慙而舉觴自罰因罰二臣晏子侍於景公朝寒請進熱食對曰嬰非君之厨養臣也敢辭公曰請進服裘對曰嬰非田澤之臣也敢辭公曰然夫子與寡人奚為者也對曰社稷之臣也公曰何謂社稷之臣對曰社稷之臣能立社稷辨上下之宜使得其理制百官之序使得其宜作為辭令可分布於四方自是之後君不以禮不見晏子也梁丘據謂晏子曰吾至死不及夫子矣晏子曰嬰聞之為者常成行者常至嬰非有異於人也常為不置常行而不休者也故難及也景公出獵上山見虎下澤見蛇歸召晏子而問之曰今日寡人出獵上山則見虎下澤則見蛇殆所謂之不祥也晏子曰國有三不祥是不與焉夫有賢而不知一不祥知而不用二不祥用而不任三不祥所謂不祥乃若此者也今上山見虎虎之室也下澤見蛇蛇之穴也如虎之室如蛇之穴而見之曷為不祥也景公問於晏子曰寡人欲從夫子而善齊國之政對曰嬰聞之國具官而後政可善景公作色曰齊國雖小則何為而不具官乎對曰此非臣之所復也昔先君桓公身體墮解辭令不給則隰朋侍左右多過刑罰不中則弦章侍居處縱肆左右懼畏則東郭牙侍田野不修人民不安則寧戚侍軍吏怠戎事偷則王子成父侍德義不中信行衰微則管子侍先君能以人之長續其短以人之厚補其薄是以辭令旁達而不逆兵加于有罪而不頓是故諸侯朝其德而天子致其胙今君之失多矣未有一士以聞者也故曰未具公曰善吾聞髙繚與夫子遊寡人請見之晏子曰臣聞為地戰者不能成王為祿仕者不能成政若髙繚與嬰為兄弟久矣未嘗干嬰之過補嬰之闕特進仕之臣也何足以補君齊景公使人於楚楚王與之上九重之臺顧使者曰齊有臺若此乎曰吾君有治位之坐土階三等茅茨不剪朴椽不斫者猶以為之者勞居之者泰吾君惡有臺若此者於是楚王蓋悒如也使者可謂不辱君命且能專對矣晏子使於魯景公起大臺之役嵗寒不止國人望晏子至至已復事公乃坐飲酒樂晏子請歌曰庶民之言日凍水洗我若之何奉上靡敝我若之何歌終喟然嘆而流涕公就止之曰夫子曷為至此殆為大臺之役夫寡人將速罷之晏子再拜出而不言遂如大臺執朴鞭其不務者曰吾細人也皆有蓋廬以避燥濕君為臺而不速成何為國人皆曰晏子助天為虐晏子歸未至而君輒罷役仲尼聞之嘆曰聲名歸之君災祻歸之身入則切磋其君之不善出則髙譽其君之德義當此道者其晏子耶景公使晏子使於楚楚王進橘置削晏子不剖而并食之楚王曰橘當去剖晏子對曰臣聞之賜人主前瓜桃不削橘柚不剖今萬乘無教臣不敢剖然臣非不知之也晏子將使楚楚王聞之謂左右曰晏子賢人也今方來欲辱之何以也左右對曰為其來也臣請縳一人過王而行於是楚王與晏子立語有縳一人過王而行王曰何為者也對曰齊人也王曰何坐曰坐盜王曰齊人故盜乎晏子反顧之曰江南有橘齊王使人取之而樹之於江北此不為橘乃為枳所以然者何其土地使之然也今齊人居齊不盜來之楚而盜將無土地使之然乎楚王曰吾欲傷子而反自中也晏子使楚晏子短楚人為小門於大門之側而延晏子晏子不入曰使至狗國者從狗門入今臣使楚不當從此門儐者使從大門入見楚王曰齊無人耶晏子對曰齊之臨淄三百閭張袂成帷揮汗成雨比肩繼踵而在何為無人王曰然則何為使子晏子對曰齊命使各有所主其賢者使賢主不肖者使不肖主嬰最不肖故宜使楚耳晏子之晉遭披裘負芻息于途者以為君子也使人召焉曰曷為而至此對曰齊人纍之吾名曰越石甫晏子曰嘻遽解左驂以贖之載而與歸至舍不辭而入越石甫怒而請絶晏子使人應之曰嬰未嘗得交也今免子於患吾於子猶未可也越石甫曰吾聞君子絀乎不知已而信乎知己者吾是以請絶也晏子乃出見之曰向也見客之容而今也見客之意嬰聞察實者不留聲觀行者不幾辭嬰可以辭而無棄乎越石甫曰夫子禮之敢不敬從晏子遂以為上客前條史記似略當從此參入之景公探爵􅑹之弱故反之晏子聞之不待請而入見景公汗出惕然晏子曰君胡為者也景公曰我探爵􅑹弱故反之晏子逡巡北面再拜而賀曰吾君有聖王之道矣景公曰寡人入探爵􅑹之弱而反之其當聖王之道者何也晏子對曰君探爵􅑹之弱而反之是長幼也吾君仁愛禽獸之加焉而况於人乎此聖王之道也景公覩嬰兒有乞於途者公曰是無歸乎晏子對曰君在何為而無歸使養之可立而以聞景公逰于夀宫覩長年負薪而有饑色公悲之喟然嘆曰令吏養之晏子曰臣聞之樂賢而哀不肖守國之本也今君愛老而恩無不逮治國之本也公笑有喜色晏子曰聖王見賢以樂賢見不肖以哀不肖今請求老弱之不養鰥寡之不室者論而供秩焉景公曰諾於是老弱有養鰥寡有室景公出田十有七日而不反晏子乘而往比至衣冠不正景公見而怪之曰夫子何遽乎得無有急乎晏子對曰然有急國人皆以君為惡民好禽臣聞之魚鱉厭深淵而就乾淺故得於釣網禽獸厭深山而下於都澤故得於田獵今君出田十有七日而不反不亦過乎景公曰不然為賓客莫應待邪則行人子牛在為宗廟而不血食邪則祝人太宰在為獄不中邪則大理子幾在為國家有餘不足邪則巫賢在寡人有四子猶有四肢也而得代焉不可患也晏子曰然人心有四肢而得代焉則善矣令四肢無心十有七日不死乎景公曰善哉遂援晏子之手與驂乘而返左昭二十年田于沛晏子使吳吳王謂行人曰吾聞晏嬰蓋北方之辨於辭習於禮者也命儐者客見則稱天子明日晏子有事行人曰天子請見晏子蹴然者三曰臣受命敝邑之君將適於吳王之所不佞而迷惑入於天子之朝敢問吳王惡乎存然後吳王曰夫差請見以諸侯之禮晏子聘魯上堂則趨授玉則跪子貢怪之問孔子曰晏子知禮乎今者晏子來聘魯上堂則趨授玉則跪何也孔子曰其有方矣待其見我我將問焉俄而晏子至孔子問之晏子對曰夫上堂之禮君行一臣行二今君行疾臣敢不趨乎今君之受幣也卑臣敢不跪乎孔子曰善禮中有禮賜寡行也何足以識禮也齊景公問子貢曰子誰師對曰臣師仲尼公曰仲尼賢乎對曰賢公曰其賢若何對曰不知也公曰子知其賢而不知其賢若何乎對曰臣終身戴天不知天之髙也終身踐地不知地之厚也若臣之事仲尼譬猶渴操壺杓就江海而飲之腹滿而去又安知江海之深乎景公曰子之譽得無太甚乎對曰賜何敢甚言尚慮不及耳臣譽仲尼猶兩手捧土而附太山其無益亦明矣使臣不譽仲尼譬猶兩手把太山無損亦明矣公曰善豈其然晏子飲景公酒令器必新家老曰財不足請斂於民晏子曰止夫樂者上下同之故天子與天下諸侯與境內自大夫以下各與其僚無有獨樂今上樂其樂下傷其費是獨樂者也不可景公使人為弓三年乃成景公得弓而射不穿三札景公怒將殺弓人弓人之妻往見景公曰蔡人之子弓人之妻也此弓者太山之南烏號之柘騂牛之角荆麋之筋河魚之膠也四物者天下之練材也不宜穿札之少如此且妾聞奚公之車不能獨走莫耶雖利不能獨斷必有以動之夫射之道左手若附枝掌若握卵四指如斷短杖右手發之左手不知此蓋射之道景公以為儀而射之穿七札蔡人之夫立出矣齊有得罪於景公者景公大怒縛置之殿下召左右肢解之敢諫者誅晏子左手持頭右手磨刀仰而問曰古者明王聖主其肢解人不審從何肢解始也景公離席曰縱之罪在寡人齊傷槐女來造晏子之門晏子曰嬰其有淫色者何為見奔殆有悅內之志哉景公與晏子適魯景公問於孔子曰秦穆公其國小處僻而霸何也對曰其國小而志大雖處僻而其政中其舉果其謀深其令不偷親舉五羖大夫於係縲之中與之語三日而授之政以此取之雖王可也霸則小矣他日景公復問政於孔子孔子曰政在節財景公說將欲以尼溪田封孔子晏嬰進曰夫儒者滑稽而不可軌法倨傲自順不可以為下崇喪遂哀破産厚葬不可以為俗逰說乞貸不可以為國自大賢之息周室既衰禮樂缺有間今孔子盛容飾繁登降之禮趨翔之節纍世不能殫其學當年不能究其禮君雖欲用之以移齊俗非所以先細民也後景公數見孔子不問其禮孔子適齊晏子就其館既宴其私焉曰齊其危矣譬若載無轄之車以臨千仞之谷其不顚覆亦難兾也子吾心也子以齊為逰息之館當或可救子幸不吾隱也孔子曰夫死病無可為醫夫政令者人君之銜轡所以制下也今齊君失之已久矣子雖欲挾其輈而扶其輪良弗及也此猶可以終齊君及子之身過此以往齊其田氏矣孔子適齊齊景公讓登孔子降一等景公三辭然後登既坐曰夫子降德辱臨寡人寡人以為榮也而降階以逺自絶於寡人寡人未知所以為罪也孔子答曰君惠顧外臣君之賜也然以匹夫敵國君非所敢行也雖君私之其若義何孔子與齊景公坐左右白曰周使來言周廟燔齊景公出問曰何廟也孔子曰是釐王廟也景公曰何以知之孔子曰詩云皇皇上帝其命不忒天之與人必報有德禍亦如之夫釐王變文武之制而作𤣥黃宫室輿馬奢侈不可振也故天殃其廟是以知之景公曰天何不殃其身曰天以文王之故也若殃其身文王之祀無乃絶乎故殃其廟以章其過也左右入報曰周釐王廟也景公大驚起再拜曰善聖人之智豈不大哉景公問晏子曰寡人自以坐地二三子皆坐地吾子獨搴草而坐之何也晏子對曰嬰聞之唯喪與獄坐地今不敢以喪獄之事侍於君矣齊景公之時天大旱三年卜之曰必以人祠乃雨景公下堂頓首曰凡吾所以求雨者為吾民也今必使吾以人祠乃且雨寡人將自當之言未卒而天大雨方千里景公問太卜曰子之道何能對曰能動地晏子往見公公曰寡人問太卜曰子之道何能對曰能動地地可動乎晏子默然不對出見太卜曰昔吾見勾星在房心之間地其動乎太卜曰然晏子出太卜走往見公曰臣非能動地地固將動也田子賜聞之曰晏子默然不對者不欲太卜之死往見太卜者恐君之欺也晏子可謂忠於事上而惠於下矣晏子謂曽子曰今夫車輪山之直木也良匠揉之其圜中規雖有攪暴不復羸矣故君子慎櫽括和氏之璧井里之棄也良工修之則為存國之寶也故君子慎所修齊景公逰少海𫝊騎從中來謁曰嬰疾甚且死恐公沒之景公遽起傳騎又至景公曰趍駕煩且之乘使騶子韓樞御之行數百步以騶為不疾奪轡代之御可數百步以馬為不進盡釋車而走以煩且之良而騶子韓樞之巧而以為不如下走也公孫捷田開疆古冶子事景公勇而無禮晏子言於公餽之二桃曰三子計功而食公孫捷曰吾再搏隱虎功可以食田曰吾仗兵而御三軍者再功可以食古冶子曰君當濟河黿銜左驂冶潜行水底逆流百步從流九里得黿頸功可以食二子曰吾勇不若子功不逮子取桃不讓是貪也然而不死無勇也刎頸而死冶曰二子死之吾獨不逮又刎頸而死景公逰於萎聞晏子卒公乘輿素服驛而驅之自以為遲下車而趨知不若車之速則又乘比至於國者四下而趨行哭而往焉至伏尸而號曰子大夫日夜責寡人不遺尺寸寡人猶且淫佚而不收怨罪重積於百姓今天降禍於齊國不加寡人而加於夫子寡人之社稷危矣百姓將誰告矣晏子沒十有七年景公飲諸大夫酒公射出質堂上唱善若出一口公作色太息播弓矢弦章入公曰自吾失晏子於今十有七年未嘗聞吾過不善今射出質而唱善者若出一口弦章對曰此諸臣之不肖也知不足以知君之不善勇不足以犯君之顔色然而有一焉臣聞之君好之則臣服之君嗜之則臣食之夫尺蠖食黃則其身黃食蒼則其身蒼君其猶有諂人言乎公曰善今日之言章為君我為臣是時海人入魚公以五十乘賜弦章臨魚乘塞塗撫其御之手曰曩之唱善者皆欲君魚者也昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利故出質而唱善如出一口今所輔於君者未見於衆而受若魚是反晏子之義而順諂諛之欲也固辭魚不受晏嬰卒後范中行反晉晉攻之急范中行請粟於齊田乞欲為亂樹黨於諸侯乃說景公曰范中行數有德於齊齊不可不救齊使田乞救之而輸之粟靈公行汙而晏子事之以潔莊公怯而晏子事之以勇景公侈而晏子事之以儉梁丘據問曰事三君而不同心而俱順焉仁人固多心乎晏子曰一心可以事百君百心不可以事一君故三君之心非一也而嬰之心非三也孔子聞之曰小子記之晏子以一心事三君君子春秋别典卷八
