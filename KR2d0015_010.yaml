body:
  text: 春秋别典卷十明薛虞畿撰魯昭公二十六年楚平王卒伍子胥謂白公勝曰平王卒吾志不悉矣然楚有吾何憂矣白公默然不對伍子胥坐泣於室二十六年卒昭王立魯昭公棄國走齊二十五年遜陽州二十六年以至自齊居于鄆齊君問焉曰何年之少而棄國之蚤昭公曰輔弼無人諂諛我者甚衆譬之猶秋蓬也孤其根而美其枝葉秋風一至根且拔矣景公辨其言以語晏子曰使是人反其國豈不為古之賢君乎晏子對曰不然夫愚者多悔不肖者自賢溺而後問墜迷而後問路譬之臨難而遽鑄兵噎而遽掘井雖速無益也於是昭公卒死於乾侯専諸者堂邑人也伍胥之亡楚如吳時遇之於途専諸方與人鬬將就敵其怒有萬人之氣甚不可當其妻一呼即還子胥怪而問其狀何夫子之怒盛也聞一女之聲而折道寧有說乎専諸曰子視吾之儀寧類愚者也何言之鄙也夫屈一人之下必伸萬人之上子胥因相其貌雄顙而深目虎膺而熊背於從難知其勇士隂而結之欲以為用遭公子光之有謀也進之子光得而禮待之二十七年殺王僚白喜歸吳一作伯嚭即太宰嚭闔廬傷之以為大夫與伍胥共謀國事吳大夫被離承宴問子胥曰何見喜而信子胥曰吾之怨與喜同子不聞河上歌乎同病相憐同憂相救驚翔之鳥相隨而集瀨下之水因復俱流胡馬望北風而立驚燕向日而熙誰不愛其所近悲其所思者乎被離曰君之言外也豈有內意以决疑乎子胥曰吾不見也被離曰吾觀喜之為人鷹視虎步専功擅殺之性不可親也子胥不然其言與之俱事吳王昭二十七年楚殺郤宛伯州犂之孫嚭出為吳太宰吳伐楚子胥隂令宣言於楚曰楚用子期為將吾將得而殺之子常用兵吾即去之楚聞之用于常退子期吳遂破楚入郢定四年趙簡子春築臺于邯鄲天雨而不息謂左右曰可無趨種乎尹鐸對曰公事急厝種而縣之臺夫雖欲趨種不能得也簡子惕然乃促罷臺役曰我以臺為急不如民之急也民以不為臺故知吾之愛也趙簡子曰厥也愛我鐸也不愛我厥之諌我也必於無人之所鐸之諌我也喜質我於人中必使我醜鐸對曰厥也愛君之醜也而不愛君之過也鐸也愛君之過而不愛君之醜也不質君於人中恐君之不變趙簡子使人以明白之乘六先以一璧為遺於衛衛叔文子曰見不意可以生故此小之所以事大也今吾未以往而趙簡子先以來必有故於是斬林除圍聚斂蓄積而後遣使者簡子曰吾舉也為不可知也今既已知矣乃輟圍衛簡子沈鸞徼於河曰吾嘗好聲色矣而鸞徼致之吾嘗好宫室臺榭矣而鸞徼為之吾嘗好良馬善御矣而鸞徼求之今吾好士六年矣而鸞徼未嘗進一人也是長吾過而絀善也趙簡子有兩白騾甚愛之陽城胥渠夜欵門而謁曰主君之臣胥渠有疾醫教之曰得白騾之肝病則止不得則死董安于愠曰嘻胥渠也期吾君騾請刑焉簡子曰殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是殺白騾取肝以與胥渠無幾何趙興兵攻翟廣門之官皆先登而獲甲首簡子晝居喟然太息曰異哉吾欲伐衛十年矣而衛不伐侍者曰以趙之大伐衛之細君若不欲則可也君若欲之請令伐之簡子曰不知而言也衛有士十人於吾所十人者其言不義也而我伐之是我為不義故簡子之時衛以十人按趙之兵或謂趙簡子君何不更乎簡子曰諾左右曰君未有過何更君曰吾謂是諾未必有過也吾將求以來諌者也今我却之是却諌者諌者必止我過無日矣趙簡子問於翟封荼曰吾聞翟雨榖三日信乎曰信又聞雨血三日信乎曰信又聞馬生牛牛生馬信乎曰信簡子曰大哉妖亦足以亡國矣對曰雨榖三日盲風之所飄也雨血三日鷙鳥擊於上也馬生牛牛生馬雜牧也此非翟之妖也簡子曰然則翟之妖何也對曰其國敝散其君幼弱其諸卿貨其大夫比黨以求祿爵其百官肆斷而無告其政令不竟而數化其士貪功而有怨此其妖也趙簡子攻陶有二人先登死於城上簡子欲得之陶君不與承盆疽謂陶君曰簡子將掘君之墓以與君之百姓市曰踰邑梯城者將舍之不者將掘其墓朽者揚其灰未朽者辜其尸陶君懼請效二人之尸以為和趙簡子問於成摶曰吾聞乎羊殖者賢大夫也是行奚然對曰臣摶不知也簡子曰吾聞之子與友親子而不知何也摶曰其為人也數變其十五年也廉以不匱其二十也仁以喜義其三十也為晉中軍尉勇以喜仁其年五十也為邊城將也逺者復親今臣不見五年矣恐其變是不敢知簡子曰果賢大夫也每變益上矣趙簡子問子貢曰孔子為人何如對曰賜不能識也簡子不悅曰夫子事孔子數十年終業而去之寡人問子子曰不能識何也子貢曰賜譬渴者之飲江海知足而已孔子猶江海也賜則何足以識之簡子曰善哉子之言昔者周公舍事趙簡子立簡子之門三日三夜簡子使人出問之曰夫子將何以令我周舍曰願為諤諤之臣墨筆操牘隨君之後司君之過而書之日有記也月有效也嵗有得也簡子恱之與處居無幾何而周舍死簡子厚葬之三年之後與大夫飲酒酣簡子泣諸大夫起而出曰臣有死罪而不知也簡子曰大夫反無罪昔者吾友周舍有言曰百羊之皮不如一狐之腋衆人之唯唯不如周舍之諤諤昔紂唯唯而亡武王諤諤而昌自周舍之死後吾未嘗聞吾過也故人君不聞其非及聞而不改者亡吾國其幾于亡矣是以泣也趙簡子乘敝車瘦馬羖羊裘其宰進諌曰車新則安馬肥則往來疾狐白之裘溫且輕簡子曰吾非不知也吾聞之君子服善則益恭細人服善則益倨我以自備恐有細人之心也𫝊曰周公位尊愈卑勝敵愈懼家愈富愈儉故周氏八百餘年此之謂也趙簡子疾五日不知人大夫皆懼呼醫扁鵲視之扁鵲諸書俱作趙簡子時人惟國䇿作秦武王時人出董安于問扁鵲曰血脉治也勿怪昔秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰吾之帝所甚樂吾所以久者適有學也帝告我晉國且大亂五世不安其後將霸未老而死霸者之子且令國男女無别公孫支書而藏之秦讖於是出夫獻公之亂文公之霸而襄公之敗秦師于殽而歸縱淫此子所聞今主君之病與之同不出三日病必間間必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神逰於鈞天廣樂九奏萬儛不類三代之樂其聲動心有一熊欲援我射中之熊死有羆來我又射之中羆死帝甚嘉之賜我二笥皆有副吾見兒在側帝屬我翟犬曰及汝子之壯也以賜之帝告我晉國且衰七世而亡嬴姓將大敗周人於范魁之西亦不能有也董安于受言而藏之以扁鵲之言告簡子賜扁鵲田四萬畝他日簡子出有人當道辟之不去從者將刃之當道者曰吾有欲謁于主君從者以聞簡子召之曰嘻吾有所見子晰也當道者曰屏左右願有以謁簡子屏人當道者曰主君之病臣在帝側簡子曰然子之見我何為當道者曰帝令主君射熊羆皆死簡子曰是且何也當道者曰晉國且有大難主君首之帝令主滅二卿夫熊羆皆其祖也簡子曰帝賜我二笥皆有副何也當道者曰主君之子將克二國於翟皆子姓也簡子曰吾見兒在帝側帝屬我一翟犬曰及汝子之長以賜之夫兒何說以賜翟犬當道者曰兒主君之子也翟犬代之先也主君之子其必有此代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而遂延之以官當道者曰臣野人致帝命耳遂不見無幾范中行作亂簡子滅之趙簡子曰晉有澤鳴犢犨魯有孔丘吾殺此二人則天下可圖矣於是乃召澤鳴犢犨任之以政而殺之使人聘孔子於魯孔子至河臨水而觀曰美哉水洋洋乎丘之不濟於此命也子路趨進曰敢問奚謂也孔子曰夫澤鳴犢犨晉之賢大夫也趙簡子之未得志也與之同聞見及其得志也殺之而後從政故丘聞之刳胎焚夭則麒麟不至乾澤而漁則蛟龍不逰覆巢破卵則鳳凰不翔丘聞之君子重主傷其類也趙簡子使聘孔子孔子將至焉及河聞鳴犢與竇犨之見殺也廽輿而旋之衛息鄹遂為操曰周道衰微禮樂凌遲文武幾墜吾將焉歸周逰天下靡邦可依鳯鳥不識珍寶梟鴟眷然顧之慘然心悲升車命駕將適唐都黃河洋洋攸攸之魚臨津不濟還轅息鄹傷子道窮哀彼無辜翺翔于衛復我舊廬從吾所好其樂只且楊因見趙簡子曰臣居鄉三逐事君五去主好士故走來見簡子聞之絶食而欲跪而行左右進諌曰居鄉三逐是不用衆也事君五去是不忠上也今君有見過矣簡子曰子不知也夫美女醜婦之讎也盛德亂世所疏也正直之行邪枉所憎也遂出見之因授以為相而國大治由是觀之逺近之人不可以不察也邯鄲之民正月之旦獻鳩於簡子簡子大恱厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之競而捕之死者衆矣君如欲生不若勿捕捕而放之恩過不相補趙簡子從晉陽之邯鄲中路而止引車吏進問君何為止簡子曰董安于在後吏曰此三軍之事也君奈何以一人留三軍也簡子曰諾驅之百步又止吏將進諌董安于適至簡子曰秦道之與晉國交者吾忘令人塞之董安于曰此安于之所以為後也簡子曰官之寶璧吾忘令人載之對曰此安于之所以為後也簡子曰行人燭過年長矣言未嘗不為晉國法也吾行忘令人辭且聘焉對曰此安于之所以為後也簡子可謂內省外知人矣趙簡子之子長曰伯魯幼曰無恤將置後不知所立乃書訓誡之辭于二簡授二子曰謹藏之三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習求其簡出諸袖中而奏之於是簡子以無恤為賢立以為後姑布子卿見簡子簡子遍召諸子相之子卿曰無為將軍者簡子曰趙氏其滅乎子卿曰吾嘗見一子於路真君之子也簡子召子毋恤至則子卿起曰此真將軍矣簡子曰此其母賤翟婢也奚足貴哉子卿曰天所授雖賤必貴自是之後簡子盡召諸子與語毋恤最賢簡子乃告諸子曰吾藏寶符于常山上先得者賞諸子馳之常山上求無所得毋恤還曰已得符矣簡子曰奏之毋恤曰從常山上臨代代可取也簡子於是知毋恤果賢乃廢太子伯魯而以毋恤為太子董安于為趙上地守行石邑山中澗深山如墻深百仭因問其旁鄉左右曰人嘗有入此者乎對曰無有曰嬰兒癡聾狂悖之人嘗有入此者乎對曰無有牛馬犬彘嘗有入此者乎對曰無有董安于喟然太息曰吾能治矣使吾法之無赦猶入澗之必死也則人莫之敢犯矣何為不治之趙簡子以襄子為後董安于曰無恤不才今以為後何也簡子曰是是其人能為社稷忍辱異日智伯與襄子飲而灌襄子之首大夫請殺之襄子曰先君之立我也曰能為社稷忍辱豈曰能刺人哉處十日智伯圍襄子於晉陽襄子疏隊而擊之大敗智伯漆其首以為飲器簡子謂左右車席泰美夫冠雖賤頭必戴之屨雖貴足必履之今車席如此泰美吾將何屨而履之夫美下即耗上妨義之本也春秋别典卷十
