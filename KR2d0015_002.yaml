body:
  text: 春秋别典卷二明薛虞畿撰魯莊公十三年起齊桓公與魯莊公為柯之盟十三年魯大夫曹劌謂莊公曰齊之侵魯至於城下城壞壓境君不圖歟莊公曰嘻寡人之生不若死曹劌曰然則君請當其君臣請當其臣及㑹兩君就壇兩相相揖曹劌手劍拔刃而進廹桓公於壇上曰城壞壓境君不圖歟管仲曰然則君何求曹劌曰願請汶陽田管仲謂桓公曰君其許之桓公許之曹劌請盟桓公遂與之盟已盟摽劍而去左右曰要盟可倍曹劌可讐請倍盟而討曹劌管仲曰要盟可負而君不負曹劌可讐而君不讐著信天下矣遂不倍天下諸侯翕然而歸之略同公羊齊桓公伐魯魯請比闗内侯以聽曹劌謂莊公曰君寧死而又死乎寧生而又生乎公曰何謂也曰聽臣之言國必廣大身必安樂是生而又生也不聽臣之言國必滅亡身必危辱是死而又死也公曰請從明日將盟皆懷劍至壇上公左搏桓公右抽劍以自承管鮑進劌按劍曰二君將改圖毋或進者公曰封於汶則可不則請死仲曰以地衛君非以君衛地君其許之乃與之盟歸尚欲勿予仲曰不可人刼君君不知不可謂智臨難而不能勿聽不可謂勇許之而不與不可謂信有此三者不可以立功名予之雖亡地亦得信以四百里之地見信於天下君猶得也以下数十條多載桓公委任仲父言聽計從惓惓圖覇之心疑初年勵精時事也彚輯左方有司請吏於齊桓公桓公曰以告仲父有司又請桓公曰以告仲父如是者二在側者曰一則告仲父二則告仲父易哉為君桓公曰吾未得仲父則難也得仲父曷為其不易也故王者勞於求人佚於得賢舜舉衆賢在位垂衣裳恭已無為而天下治湯文用伊呂成王用周召而刑措不用兵偃而不動用衆賢也桓公問於管仲曰吾欲使爵腐於酒肉腐於豆得無害於覇乎管仲對曰此極非其貴者耳然亦無害於覇也桓公曰何如而害覇管仲對曰不知賢害覇知而不用害覇用而不任害覇任而不信害覇信而復使小人參之害覇桓公曰善齊桓公設庭燎為士之欲造見者朞年而士不至於是東野鄙人有以九九之術進者桓公曰九九何足以見乎鄙人對曰臣非以九九為足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君天下之賢君也四方之士皆以自論而不及君故不至也夫九九薄能耳而君猶禮之况賢於九九乎夫泰山不辭壤石江海不逆細流所以成大也詩云先民有言詢於芻蕘言博謀也桓公曰善乃因禮之朞月四方之士相携而並至齊桓公見小臣稷一日三至不得見也從者曰萬乗之主布衣之士一日三至不得見亦可以止矣桓公曰不然士之傲爵禄者固輕其主其主傲覇王者亦輕其士縱夫子傲爵禄吾庸敢傲覇王乎五往而後得見天下聞之皆曰桓公猶下布衣之士而况國君乎於是相率而朝桓公得管仲隰朋辨其言說其意正月之朝令具太牢進之先祖桓公西面而立管子隰朋東面而立桓公賛曰自吾得聽二子之言吾目加明耳加聰不敢獨擅願薦之祖考桓公問治民於管子管子對曰凡牧民者必知其疾而優之以德勿懼以罪勿止以力慎此四者足以治民也桓公問管仲曰吾欲伐大國之不服者奈何管仲對曰先愛四封之内然後可以惡境外之不善者先定卿大夫之家然後可以危鄰之敵國是故先王必有置也然後有廢也必有利也然後有害也齊桓公問管仲曰吾念有而勿失得而勿忘為之有道乎對曰勿創勿作時至而隨毋以私好惡害公正察民所惡以自為戒黄帝立明臺之議者上觀於賢也堯有衢室之問者下聽於人也舜有告善之旌而主不蔽也禹立建鼓於朝而備訊唉也湯有總街之庭以觀人誹也武王有靈臺之復而賢者進也此古聖帝明王所以有而勿失得而勿忘者也桓公曰吾欲效而為之其名云何對曰名曰嘖室之議曰法簡而易行刑審而不犯事約而易從求寡而易足人有非上之所過謂之正士内於嘖室之議有司執事者咸以奉厥職事而不忘焉此嘖室之事也請以東郭牙為之此人能以正事争於君前者也桓公曰善龍闘於馬請之陽牛山之隂管子入復於桓公曰天使使者臨君之郊請使大夫初飭左右𤣥服天之使者乎天下聞之曰神哉齊桓公天使使者臨其郊不待舉兵而朝者八諸侯此乗天威而動天下之道也故智者役使鬼神而愚者信之桓公問於管仲曰寡人有大邪三其猶尚可以為國乎對曰臣未得聞公曰寡人不幸而好田晦夜而至禽側田莫不見禽而後反諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人不幸而好酒日夜相繼諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人有汙行不幸而好色而姑姊有不嫁者對曰惡則惡矣然非其急者也公作色曰此三者且可則惡有不可者已矣對曰人君唯優與不敏為不可優則亡衆不敏不及事公曰善吾子就舎異日請與吾子圖之對曰時可將與夷吾何待異日乎公曰奈何對曰公子舉為人博聞而知禮好學而辭遜請使為遊於魯以結交焉公子開方為人巧轉而兌利請使遊於衛以結交焉曹孫宿其為人也小亷而苛狀足恭而辭給正荆之則也請使往遊以結交焉遂立行三使者而後退相三月請論百官公曰諾管仲曰升降揖讓進退習閑辨辭之剛柔臣不如隰朋請立為大行墾草入邑辟土聚粟多衆盡地之利臣不如甯戚請立為大司田平原廣牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立為大司馬決獄折中不殺不辜不誣無罪臣不如賓胥無請立為大司理犯君顔色進諫必忠不辟死亡不撓富貴臣不如東郭牙請立以為大諫之官此五子者夷吾一不如然而以易夷吾夷吾不為也君若欲治國强兵則五子者存矣若欲覇王夷吾在此桓公曰善齊桓公問於管仲曰何患對曰患夫社鼠桓公曰何謂也對曰夫社束木而塗之鼠因往託焉薫之則恐燒其木灌之則恐敗其塗此鼠所以不可得殺以社故也夫國亦有社鼠人主左右是也内則蔽賢要於君上外則賣權重於百姓不誅之則為亂誅之則為人主所察按腹而有之此亦國之社鼠也人有酤酒者為器甚潔置表甚長而酒酸不售問之里人其故里人云公之狗猛人挈器而入且酤公酒狗迎而噬之此酒所以酸不售之故也夫國亦有猛狗用事者也有道術之人欲用萬乗之主而用事者迎而齕之此亦國之猛狗也左右為社鼠用事者為猛狗則道術之士不得用矣此治國者之所患也齊桓公謂管仲曰吾欲舉事於國昭然如日月無愚夫愚婦皆曰善可乎管仲曰可然非聖人之道桓公曰何也對曰夫短綆不可以汲深學鮮不可以與聖人之言惠士可與辨物智士可與辨無方聖人可與辨神明夫聖人之所為非衆人所可及也民知十已則當與之争曰不如我也百已則疵其過千已則誹而不信是故民不可稍而掌也可并而牧也不可暴而殺也可摩而致也衆不可户說也可舉而示也桓公問管仲曰王者何貴曰貴天桓公仰而視天管仲曰所謂天者非謂蒼蒼莽莽之天也人君者以百姓為天百姓與之則安輔之則强非之則危背之則亡詩云人而無良相怨一方民怨其上不遂亡者未之有也桓公曰金剛則折革剛則裂人君剛則國家滅人臣剛則交友絶夫剛則不和不和則不可用是故四馬不和取道不長父子不和其世破亡兄弟不和不能久同夫妻不和家室大凶易曰二人同心其利斷金由不剛也桓公之平陵見冡人有年老而自養者公問其故對曰吾有子九人家貧無以妻之吾使傭而未返也桓公取外御者五人妻之管仲入見曰公之施惠不亦小乎公曰何也對曰公待所見而施惠焉則齊國之有妻者少矣公曰若何管子曰令國丈夫二十而室女子十五而嫁齊國好厚𦵏布帛盡於衣衾材木盡於棺椁桓公患之以告管仲曰布帛盡則無以為蔽材木盡則無以為守備而人厚𦵏之不休禁之奈何管仲對曰凡人之有為也非名之則利之也於是乃下令曰棺椁過度者則戮其尸罪夫當喪者夫戮死無名罪當喪者無利人何故為之也齊桓公好服紫一國盡服紫當是時也五素不得一紫桓公患之謂管仲曰寡人好服紫紫貴甚一國百姓好服紫不已寡人奈何管仲曰君欲何不試勿衣紫也謂左右曰吾甚惡紫之臭公曰諾於是左右適有衣紫而進者公曰少却吾惡紫臭於是日郎中莫衣紫其明日國中莫衣紫三日境内莫衣紫也桓公謂管仲曰吾國甚小而財用甚少而羣臣衣服輿馬甚汰吾欲禁之可乎管仲曰臣聞之君嘗之臣食之君好之臣服之今之食也必桂之漿衣練紫之衣狐白之裘此羣臣之所奢泰也詩曰不躬不親庶民不信君欲禁之何不自親乎桓公曰善於是更制練白之衣大帛之冠朝一年而齊國儉也桓公謂管仲曰官少而索者衆寡人憂之管仲曰君無聽左右之請因能而授禄録功而與官則莫敢索官君何患焉管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣卑桓公使立於高國之上曰臣尊矣然而臣踈乃立為仲父孔子聞而非之曰泰侈偪上齊桓公之時霖雨十旬桓公欲伐陵其城之值雨也未合管仲隰朋以卒徒造於門桓公曰徒衆何以為管仲對曰臣聞之雨則有事夫陵不能雨臣請攻之公曰善遂興師伐之既至大卒間外士在内矣桓公曰其有聖人乎乃還旗而去之齊桓公田至於麥丘見麥丘邑人問之子何為者也對曰麥丘邑人也公曰年幾何對曰八十有三矣公曰美哉壽乎子其以壽祝寡人麥丘邑人曰祝主君使主君甚壽金玉是賤人為寳桓公曰至哉至德不孤善言必再吾子其復之麥丘邑人曰祝主君使主君無羞學無惡下問賢者在傍諫者得人桓公曰善哉至德不孤善言必三吾子其復之麥丘邑人曰祝主君使主君無得罪於羣臣百姓桓公怫然作色曰吾聞之子得罪於父臣得罪於君未聞君得罪於臣者也此一言者非夫子二言之匹也子更之麥丘邑人坐拜而起曰此一言者夫二言之長也子得罪於父可以因姑姊叔父而解之父能赦之臣得罪於君可以因便嬖左右而謝之君能赦之昔桀得罪於湯紂得罪於武王此則君之得罪於其臣者也莫為謝至今不赦公曰善賴國家之福社稷之靈使寡人得吾子於此挾而載之自御以師禮之於朝封之以麥丘而斷政焉秦武公卒史記武公卒在莊十八年𦵏雍平陽初以人從死死者六十六人有子一人名曰白白不立封平陽立其弟德公德公元年初居雍城大鄭宮以犧三百牢祠鄜畤卜居雍後子孫飲馬於河梁伯芮伯來朝二年初伏以狗禦蠱晉人伐邢齊桓公將救之鮑叔曰太蚤邢不亡晉不敝晉不敝齊不重且夫持危之功不如存亡之德大君不如晩救以敝晉齊實利待邢亡而復存之其名實美桓公乃弗救晉伐邢年不可考似桓初年事且狄伐邢尚在閔元年晉伐或先耳楚成王惲元年初即位莊二十二年熊惲殺兄堵敖代立是為楚成王布德施惠結舊好于諸侯使人獻天子天子賜胙曰鎮爾南方夷越之亂無侵小國於是楚地千里陳宣公後有嬖姬生子疑欲立之乃殺其太子禦㓂禦寇素愛厲公子完完懼禍及已乃奔齊莊二十二年傳備始末晉獻公八年士蒍說公曰莊二十三四五年傳故晉之羣公子多不誅亂且起乃使盡殺諸公子而城聚都之命曰絳始都絳九年晉羣公子既亡奔虢虢以其故再伐晉弗克十年晉欲伐虢士蒍曰且待其亂楚成王立子文代公子元為令尹三十年傳公子元歸自伐鄭而處王宮秋申公鬬班殺子元子文為令尹子文因鬬班之殺子元也緇帛之衣以朝鹿裘以處未明而立於朝日晦而歸食朝不謀夕家無盈積自毁其家以紓國難不為爵勸不為禄勉以憂勤於社稷嘗曰蔽賢者不祥專利者必害故其為政度人以用人溥惠以撫下凡以自究厥心不遑他恤於時齊桓方覇楚邦多難子文量力而動舎命不渝其族有干法者廷理拘之聞其令尹之族也而釋之子文召廷理責之曰凡立廷理者將以司犯王令而察觸國法也夫直士持法柔而不撓剛而不折今棄法背令而釋犯法者是理之不端而駁於法也執國之柄而以私聞與吾生不以義不若以義而死也廷理懼遂刑其族人成王聞之不及履而至於子文之室曰寡人幼少置理失其人以違夫子之意於是黜廷理而尊子文使及内政國人聞之曰若令尹之公也吾黨何憂乎乃作歌曰子文之族犯國法程廷理釋之子文不聽恤願怨萌方正公平齊桓公與管仲謀伐衛衛姬望君再拜請衛君之罪公曰吾於衛無故子曷為我請對曰妾望見君之入也足高氣强有伐國之志見妾而有動色伐衛也明日君朝揖管仲而進之管仲曰君舎衛乎公曰仲父安識之仲曰君之揖朝也恭而言也徐見臣而有慙色臣是以知之君曰善仲父治外夫人治内寡人知不為諸侯笑矣桓公之所以匿者不言也今管仲乃以容貌聲音夫人乃以行步氣志桓公雖不言若暗夜而燎燭也經二十八年書伐衛齊桓公將伐山戎經三十年書齊伐山戎使人請助於魯魯君進羣臣而謀皆曰師行數千里入蠻夷之地必不反矣於是魯許助之而不行齊已伐山戎孤竹而欲移兵於魯管仲曰不可諸侯未親今又伐逺而還誅近鄰之國不親非伯王之道君之所得山戎之寳器者中國之所鮮也不可以進周公之廟乎桓公乃分山戎之寳獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至孔子曰轉禍為福報怨以德此之謂也左傳言伐山戎為病燕故也齊桓公北伐山戎其道過燕燕君迎而出境桓公問管仲曰諸侯相迎固出境乎管仲曰非天子不出境桓公曰然則燕君畏而失禮也寡人不道而使燕君失禮乃割燕君所至之地以與燕君諸侯聞之皆朝於齊管仲隰朋從於桓公而伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤寸而仞有水乃掘地而遂得氷桓公北征孤竹未至卑耳谿中十里闟然而止瞠然而視有頃見人長尺而人物具焉冠左袪衣走馬前疾以問左右左右不見也管仲曰事必濟此登山之神俞兒也臣聞覇王之君興則登山神見且走馬前疾導也袪衣示前有水也左袪衣示從旁方涉也桓公果從左渡遼水遂得孤竹覇天下桓公再拜管仲馬前曰仲父之聖至於是寡人得罪久矣管仲曰夷吾聞之聖人先知無形今已有形乃知之是夷吾善承敎非聖也春秋别典卷二
