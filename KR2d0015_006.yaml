body:
  text: 春秋别典卷六明薛虞畿撰魯宣公元年癸丑在位十八年周匡王五年趙宣孟見骩桑之餓人為之下食而餔之與脯一朐拜受而不敢食曰臣有老母將以遺之宣孟曰食之吾更與汝乃復賜之脯二束與錢百而遂去之晉靈公欲殺宣孟伏士以待因發酒宣孟宣孟知之中飲而出靈公令房中士疾追殺之一人追先及曰君輿吾請為君反死宣孟曰而知為誰曰何以名為臣骫桑之餓人也還閫而死宣孟遂活經二年書盾弒君陳靈公行僻而言失泄冶曰陳其亡矣吾驟諫君君不吾聽而愈失威儀夫上之化下猶風靡草東風則草靡而西西風則草靡而東在風所由而草為之靡是故人君之動不可不慎也夫樹曲木者惡得直景人君不宜其行不敬其言未有能保帝王之號垂顯令之名者也易曰夫君子居其室出其言善則千里之外應之言可不慎乎天地動而萬物變化詩曰慎爾出話敬爾威儀無不柔嘉今君不是之慎而縱恣焉不亡則弒靈公聞之以泄冶為妖言而殺之後果弒於夏徴舒九年陳殺泄冶楚莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰其城郭髙溝壑深蓄積多其國寧也王曰陳可伐也夫陳小國也而蓄積多蓄積多則賦斂重賦斂重則民怨上矣城郭髙溝壑深則民力罷矣興兵伐之遂取陳十一年楚莊王伐陳吳救之雨十日夜晴左史倚相曰吳必夜至甲裂壘壞彼必薄我行不成列鼓出待之吳師至楚見成陳而還左史倚相曰追之吳行六十里而無功王罷卒寢趨擊之大敗吳師按左傳倚相楚靈王時人莊王時而稱倚相恐非是楚莊王將縣陳聽申叔時之諫曰善乃迎陳靈公太子午於晉而立之復為陳君如故是為成公孔子讀史記至楚復陳曰賢哉莊王輕千乘之國而重一言十一年楚王將興師伐晉曰敢諫者死孫叔敖曰臣聞畏鞭箠之嚴而不敢諫其父非孝子也懼斧鉞之誅而不敢諫其君非忠臣也於是遂諫曰君今貪彼之土所謂知前之利而不顧後害者也正猶螳蜋欲攫蟬而不知黃雀之在後而黃雀不知放彈者方將窺而斃之也臣敢愛死不以告王哉遂不伐晉莊王欲伐晉使豚尹觀焉反曰不可伐也其憂在上其樂在下且賢臣在焉曰沈駒明年又使豚尹觀反曰可矣初之賢人死矣諂諛多在君之廬者其君好樂而無禮其臣危處以怨上上下離心興師伐之其民必先反莊王從之果如其言晉人伐楚三舍不止大夫曰請擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是寡人之過也如何其辱諸大夫也大夫曰先君之時晉不伐楚及臣之身而晉伐楚是臣之罪也請擊之莊王俯泣而起拜諸大夫晉人聞之曰君臣爭以過為在已且君下其臣猶如此亦謂上下一心三軍同力未可攻也乃夜還師楚莊王既與晉戰勝之懼諸侯之畏已也乃築為五仞之臺臺成而觴諸侯諸侯請約莊王曰我薄德之人也諸侯請為觴乃仰而歌曰將將之臺窅窅其謀我言而不當諸侯伐之於是逺者來朝近者入賓莊王既服鄭敗晉師將軍子重三言而不當莊王歸過申侯之邑申侯進飯日中而王不食申侯請罪王喟然嘆曰吾聞之其君賢者也而又有師者王其君中君也而又有師者霸其君下君也而羣臣又莫若君者亡今我下君也而羣臣又莫若不榖不穀恐亡且世不絶聖國不絶賢而我獨不得若我生者何以食為故戰服大國義從諸侯戚然憂恐聖智不在乎身自惜不肖思得賢佐日中忘飯可謂明君矣俱邲之戰莊王使使齎金百斤聘於北郭先生先生曰臣有箕帚之使願入計之即謂婦曰楚欲以我為相今日相即結駟列騎食方丈於前如何婦曰夫子以織屨為食食粥履無怵惕之憂者何哉與物無治也今如結駟列騎所安不過容膝食方丈於前所甘不過一肉容膝之安一肉之味而殉楚國之憂其可乎於是遂不應聘與婦去之莊王欲伐越杜子諫曰王之伐越何也曰政亂兵弱杜子曰臣患王之智如目也能見百步之外而不能自見其睫王之兵自敗于秦晉喪地數百里此兵之弱也莊蹻為盜於境內而吏不能禁此政之亂也王之弱亂非越之下也而欲伐越此智之如目也王乃止莊王欲伐楊夏師久而不罷群臣欲諫而莫敢王獵于雲夢椒舉進諫曰王所以多得獸者馬也而王國亡王之馬豈可有哉莊王曰善不穀知詘强國之可以長諸侯也知得地之可以為富也而忘吾民之不用也明日飲諸大夫酒以椒舉為上客罷楊夏之師莊王既勝晉於河雍歸而封孫叔敖不受病疽將死謂其子曰吾則死矣王必封汝汝必讓肥饒之地而受沙石之間有寢丘者其地確石之醜荆人鬼越人禨人莫之利也敖死王果封其子以肥饒之地其子辭而不受請有寢之丘楚邦之法祿臣再世而收地唯孫叔敖獨在不以其邦為收者瘠也故九世而祀不絶孫叔敖病且死屬其子曰我死而必貧困若往見優孟言我孫叔敖之子也居數年其子困窮負薪過優孟與言曰我孫叔敖之子也父且死時屬我貧困往見優孟優孟曰若無逺有所之即為孫叔敖衣冠抵掌談語歲餘像孫叔敖楚王及左右不能别也莊王置酒優孟前為夀莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日後優孟復來王曰婦言謂何孟曰婦言慎無為楚相不足為也如孫叔敖之為楚相盡忠為亷以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也楚相孫叔敖持廉至死今妻子困窮負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢丘田四百户以奉其祀十八年莊王卒晉國苦盜有郤雍者能視盜之貌察其眉睫之間而得其情晉侯使視盜千百無遺一焉晉侯喜告趙文子曰吾得一人而一國盜為盡矣奚用多為文子曰吾君恃伺察而得盜盜不盡矣且郤雍必不得其死焉俄而羣盜謀曰吾所窮者郤雍也遂共盜而殘之晉侯聞而大駭立召文子而告之曰果如子言郤雍死矣然取盜何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下民有恥心則何盜之為於是用隨㑹知政而羣盜奔秦焉按左氏宣十六年士㑹為政十七年請老乃晉景公之八年也至成八年趙氏方有下宮之難趙文子時未之生也安能薦士㑹為政哉此事見列子列多寓言即非寓言而記事亦缺核矣左十六年士㑹將中軍為太傅晉之盜逃奔于秦魯成公元年辛未在位十八年周定王十七年吳夀夢立而吳始益大稱王自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在蠻夷十二世而晉滅中國之虞中國之虞滅二世而蠻夷之吳興大凡從太伯至夀夢一十九世按春秋成七年始書吳伐郯吳夀夢元年朝周適楚觀諸侯禮樂魯成公㑹於鍾離不見經深問周公禮樂成公悉為陳前王之禮樂因為詠歌三代之風夀夢曰孤在夷蠻徒以椎髻為俗豈有斯之服哉因嘆而去曰大乎哉禮也史年表夀夢元年即成公六年以是不見經史晉趙盾薦韓厥晉君以為中軍尉趙盾死子朔為卿至景公三年趙朔為晉將朔取成公姊為夫人初盾在時夢見叔帶持盾要而哭甚悲已而笑拊手且歌盾卜之吉兆絶而後好趙史援占曰此甚惡非君之身乃君之子然亦君之咎也至于朔世益衰屠岸賈者始有寵于靈公至景公時賈為司寇將作難乃治靈公之賊以致趙盾遍告諸將曰趙穿弒靈公盾雖不知猶為賊首賊臣弒君子孫在朝何以懲罪請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今諸君將誅其後是非先君之意而復妄誅妄誅謂之賊臣有大事而君不聞是無君也賈不聽厥告朔趣亡朔不肯曰子必不絶趙祀朔死且不恨厥許諾稱疾不出賈不請而擅與諸將攻趙氏于下宮殺趙朔趙括趙嬰齊皆滅其族八年事朔妻成公姊有遺腹走公宮匿公孫杵臼程嬰者皆朔客也公孫杵臼謂程嬰胡不死嬰曰朔之妻有遺腹若幸而男吾奉之即女也吾徐死耳無何而朔妻免生男賈聞之索於宮朔妻置兒袴中祝曰趙宗滅乎若號即不滅乎即無聲及索兒竟無聲已脫程嬰謂杵臼曰今一索不得後必且復之奈何杵臼曰立孤與死孰難嬰曰立孤亦難耳杵臼曰趙氏先君遇子厚子强為其難者吾為其易者吾請先死而二人謀取他嬰兒負以文褓匿山中嬰謂諸將曰嬰不肖不能立孤誰能與吾千金吾告趙氏孤處諸將皆喜許之發師隨嬰攻杵臼杵臼曰小人哉程嬰下宮之難不能死與我謀匿趙氏孤兒今又賣之縱不能立孤忍賣之乎抱而呼天乎趙氏孤兒何罪請活之獨殺杵臼也諸將不許遂并殺杵臼與兒諸將以為趙氏孤兒已死皆喜然趙氏真孤乃在程嬰卒與俱匿山中居十五年晉景公病卜之大業之胄者為祟景公問韓厥韓厥知趙孤存乃曰大業之後在晉絶祀者其趙氏乎夫自中行衍皆嬴姓也中行衍人面鳥噣降佐帝太戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至于成公世有成功未嘗絶祀今及吾君獨滅趙宗國人哀之故見龜策唯見圖景公問趙尚有後乎韓厥具以實告景公乃與韓厥謀立趙孤兒召匿之宮中諸將入問病景公因韓厥之衆以脅諸將而見趙孤兒孤名曰武諸將不得已乃曰昔下宮之難屠岸賈為之矯以君命并命羣臣非然孰敢作難微君之命羣臣固將請立趙後今君有命羣臣願之於是召趙武程嬰遍拜諸將遂俱與程嬰趙氏攻屠岸賈滅其族復與趙氏田邑如故趙武冠為成人程嬰乃辟大夫謂武曰昔下宮之難皆能死我非不能死思立趙氏後今子既立為成人趙宗復故我將下報趙孟與公孫杵臼趙武號泣固請曰武願苦筋骨以報子至死而子忍棄我死乎程嬰曰不可彼以我為能成事故肯先我死今我不下報之是以我為不成也遂自殺趙武服衰三年為祭邑春秋祠之世不絶君子曰程嬰公孫杵臼可謂信友厚士矣嬰之自殺下報亦過矣楚共王戰於鄢陵十六年事潘尫養由基黃衰微公孫丙相與篡之共王懼而失體黃衰微舉足蹴其體共王乃覺怒其失禮奮體而起四大夫載而行楚共王出獵而遺其弓左右請求之共王曰止楚人遺弓楚人得之又何求焉仲尼聞之曰惜乎其不大亦曰人遺弓人得之而已何必楚也仲尼所謂大公者也養由基善射去栁葉百步而射之百發百中左右皆曰善有一人過曰善射可教也矣養由基曰人皆善子乃曰可教射何不代我射之也客曰我不能教子支左屈右夫射柳葉者百發百中而不以善息少焉氣力倦弓撥矢鈎一發不中前功盡矣養由基尹儒皆六藝之人也荆廷嘗有神白猿荆之善射者莫之能中荆王請養由基射之養由基矯弓操矢而往未之射而括中之矣發之則猿應矢而下則養由基有先中中之者矣尹儒學御三年而不得苦痛之夜夢受秋駕於其師明日往朝其師望而謂之曰吾非愛道也恐子之未可與也今日將教子以秋駕尹儒反走北面再拜曰今夕臣夢受之先為其師言所夢所夢固秋駕矣二士者可謂學矣晉厲公南伐楚東伐齊西伐秦北伐燕兵橫行天下而無所倦威行四方而無所絀遂合諸侯於嘉陵氣充志驕淫侈無度暴虐萬民內無輔拂之臣外無諸侯之助戮殺大臣親近導諛明年出逰匠驪氏欒書中行偃劫而幽之諸侯莫之救百姓莫之哀三月而死十八年事范文子喜直言武子擊之以杖夫直議者不為人所容無所容則危身非徒危身又將危父詳晉語魯襄公元年己丑在位三十一年周簡王十四年士尹池為荆使於宋司城子罕止而觴之南家之牆擁於前而不宜西家之潦經其宮而不止士尹池問其故司城子罕曰南家工人也為鞔者也吾將徙之其父曰吾恃為鞔已食三世矣今徙是宋邦之求鞔者不知吾處也吾將不食願相國之憂吾不食也為是故吾不徙西家髙吾宮卑潦之經吾宮也利為是故不禁也士尹池歸荆適興兵欲攻宋尹池諫於王曰宋不可攻也其主賢其相仁賢者得民仁者能用人攻之無功為天下笑楚釋宋而攻鄭孔子問之曰夫修之堂廟之內而折衝于千里之外者司城子罕之謂也六年子罕見傳即樂喜宋司城子罕之貴子韋也入則同食出則同衣司城子罕亡子韋不從子罕來復召子韋而貴之左右曰君之善子韋也君亡不從來又復貴之君獨不愧于君之忠臣乎子罕曰吾唯不能用子韋故至于亡今吾之得復也尚是子韋之遺德餘教也吾固貴之日吾之亡也吾臣之削迹扳樹以從我者奚益于吾亡哉子産者子國之子也子産忠於鄭君子國怒之曰夫介異於人臣而獨忠於主主明賢能聽汝不明將不汝聽聽與不聽未可必知而汝已離於羣臣離於羣臣則必危汝身矣非徒危已也又且危父二年子國為司馬五年來聘八年子産始見傳子國責子産以不喜侵秦周靈王太子晉幼有盛德聰明博達師曠與之言弗能尚也晉年十五顧而問曰吾聞太師能知人之短長也師曠對曰汝色赤白汝聲清汝色不夀晉曰然吾後三年將上賓於天汝慎無言禍將及汝其後太子果死按國語靈王二十一年榖洛鬬將毁王宮王將壅之太子晉諫之注靈王二十二年魯襄公之二十四年也是嵗齊人城郟楚共王多寵子而世子之位不定按左氏十三年楚共王卒屈建曰楚必多亂夫一兔走於街萬人追之一人得之萬人不復走分未定則一兔走使萬人擾分已定則雖貪夫知止今楚國多寵子而嫡位無主亂自是生矣夫世子者國之基也而百姓之望也國既無基又使百姓失望絶其本矣本絶則撓亂猶兔走也共王聞之立康王為太子其後猶有令尹圍公子棄疾之亂郈成子為魯聘於晉過衛右宰穀臣止而觴之陳樂而不樂酒酣而送之以璧顧反過而不辭其僕曰向者穀臣之觴吾子也甚歡今侯泄過而不辭郈成子曰夫止而觴我與我歡也陳樂而不樂告我憂也酒酣而送之以璧寄之我也由是觀之衛其有亂乎寧喜之難作穀臣死之使人迎其妻子分祿而食之長而反其璧孔子聞之曰知可以謀微仁可以託財者其郈成子之謂乎寧喜弒君剽而入衛獻公在二十六年右宰榖臣實為寧喜伐孫氏二十七年齊晉相與戰平阿平阿經傳俱無據疑是平隂之餘子亡㦸得矛不自快謂路之人曰亡㦸得矛可以歸乎人曰㦸亦兵也亡兵得兵何為不可以歸心猶不自快遇髙唐叔之孤叔無孫曰亡㦸得矛可以歸乎叔無孫曰矛非㦸也㦸非矛亡㦸得矛豈亢責也哉平阿之餘子曰嘻還反戰趨尚及之遂戰而死叔無孫曰吾聞之君子濟人於患必罹其難疾馳而從之亦死而不反十八年中行偃伐齊齊禦諸平隂十九年偃死二十三年齊侯伐衛遂伐晉報平隂之役晉逐欒盈之族二十一年盈出奔命其家臣有敢從者死其臣曰辛俞從之吏得而將殺之君曰命汝無得從敢從何也辛俞對曰臣聞三世仕于家者君之二世者主之事君以死事主以勤為其賜之多也今臣三世於欒氏受其賜多臣敢畏死而忘三世之恩哉晉君釋之齊莊公且伐莒為車五乘之賓而杞梁華舟獨不與焉二十三年伐晉報平隂還襲莒故歸而不食其母曰汝生而無義死而無名則雖非五乘孰不汝笑也汝生而有義死而有名則五乘之賓盡汝下也趣食乃行杞梁華舟同車侍于莊公而行至莒莒人逆之杞梁華舟𫝊作杞殖華周下鬬獲甲首三百莊公止之曰子止與子同齊國杞梁華舟曰君為五乘之賓而舟梁不與焉是少吾勇也臨敵涉難止我以利是汚我行也深入多殺者臣之事也齊國之利非我所知也遂進鬬壞軍陷陳三軍弗敢當至莒城下莒人以炭置地二人立有間不能入隰侯重為右曰吾聞古之士犯患涉難者其去遂于物也來我踰子隰侯重仗楯伏炭二子乘而入顧而哭之華舟後息杞梁曰汝無勇乎何哭之久也華舟曰我豈無勇哉是其勇與我同也而先我死是以哀之莒人曰子毋死與子同莒國杞梁華舟曰去國歸敵非忠臣也去長受賜非正行也且雞鳴而期日中而忘之非信也深入多殺臣之事也莒國之利非吾所知也遂進鬬殺二十七人而死其妻聞之而哭城為之弛而隅西崩齊莊公之時有士曰賓卑聚夢有壯子白縞之冠丹績之絢束布之衣新素履墨劍室從而叱之唾其面惕然而寤徒夢也終夜坐不自快明日召其友而告之曰吾少好勇年六十而無所挫辱今夜辱吾將索其形期得之不得將死之與其友俱立于衢三日不得却而自歿謂此當務則末也雖然其心之不辱也有可以加乎中牟無令晉平公問趙武曰中牟三國之股肱邯鄲之肩髀寡人欲得其良令也誰使而可武曰邢伯子可公曰非子之讐也曰私讐不入公門公又問曰中府之令誰使而可曰臣子可故曰外舉不避讐內舉不避子趙武所薦四十六人及武死各就賓位其無私德若此解狐薦其讐於簡主以為相其讐以為且幸釋已也乃因往拜謝狐乃引弓逆而射之曰夫薦汝公也以汝能當之也夫讐汝吾私怨也不以私怨汝之故擁汝於吾君故私怨不入公門解狐晉悼公時祁奚所薦者此必有誤韓武子獸已聚矣田車合矣傳來告曰晉公薨武子謂欒懷子曰子亦知好田獵也獸已聚矣田車合矣吾可以卒獵而后弔乎懷子對曰范氏之亡也多輔而少拂今臣于君輔也畾於君拂也君胡不問于畾也武子曰盈而拂我乎而拂我矣何必畾哉遂輟田齊莊公出獵有螳螂舉足將持其輪問其御曰此何蟲也御者曰此螳螂也其為蟲知進而不知退不量力而輕敵莊公曰以為人必為天下勇士矣於是回車避之而勇士歸之春秋别典卷六
