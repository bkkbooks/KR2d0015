body:
  text: 春秋别典卷一明薛虞畿撰魯隠公元年己未在位十一年周平王四十九年晉昭侯立封文侯弟成師于曲沃曲沃邑大於翼翼昭侯邑也成師號為桓叔靖侯庶孫欒賔相桓叔時年五十八矣好德晉國之衆皆附焉君子曰晉之亂其在曲沃矣末大於本而得民心不亂何待七年晉大臣潘父弑其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平為君是為孝侯誅潘父魯隠公初立卾侯六年卒孝侯子也曲沃莊伯桓叔子也聞晉鄂侯卒乃興兵伐晉周平王使虢公將兵伐曲沃莊伯莊伯走保曲沃晉人共立鄂侯子光是為哀侯隠五年見傳哀侯三年曲沃莊伯卒子稱代立是為曲沃武公哀侯八年晉侵陘庭桓二年見傳陘庭與曲沃武公謀九年伐晉於汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯小子元年曲沃武公使韓萬殺所虜晉哀侯曲沃益强晉無如之何晉小子四年曲沃武公誘晉小子殺之周桓王使虢仲伐曲沃武公武公入於曲沃乃立晉哀侯弟緡為晉侯晉侯二十八年齊桓公始覇曲沃武公伐晉侯緡滅之盡以其寳器賂獻於周釐王釐王命曲沃武公為晉君列為諸侯於是始併晉地而有之曲沃武公已即位三十七年矣更號晉武公始都晉國後二年卒子獻公佹諸立晉曲沃始終詳矣春秋之世晉覇主也有國始自曲沃故特詳之與左互有詳畧燕繆侯七年魯隠公元年也十八年卒子宣侯立宣侯十三年卒子桓侯立桓侯七年卒子莊公立莊公十二年齊桓公始覇十六年與宋衛共伐周惠王惠王出奔温立惠王弟頽為周王十七年鄭執燕仲父而納惠王於周二十七年山戎来侵齊桓公救燕遂北伐山戎而還燕公送齊桓公出境因割燕所至地予燕使燕共貢天子如成周時職使燕復修召公之法三十三年而卒燕事三傳希見特詳之秦文公時陳倉人獵得獸若彘不知名牽以獻之逢二童子童子曰此名為媦常在地中食死人腦即欲殺之柏捶其首媦亦語曰二童子名陳寳得雄者王得雌者覇陳倉人乃逐二童子化為雉上陳倉北阪為石秦祠之平王東遷封秦襄公為諸侯襄公卒子文公立立四十四年是為魯隠公元年穆公始見經秦文公時雍南山有大梓樹文公伐之輙有大風雨樹生合不斷時有一人病夜往山中聞有鬼語樹神曰秦若使人被髪以朱絲繞樹伐汝汝得不困耶樹神無言明日病人語文公如其言伐樹斷中有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎堕地復上髪觧牛畏之入不出故置旄頭秦文公東獵汧渭之間卜居之而吉文公夢黃虵自天下屬地其口止於鄜衍文公問史敦史敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉作鄜畤後九年文公獲若石云於陳倉北阪城祠之其神或嵗不至或嵗數来来也常以夜光輝若流星從東南来集於祠城則若雄鷄其聲殷殷野鷄夜雊以一牢祠命曰陳寳秦文公出獵獲黑龍此其水德之應瑞於是秦更命河曰德水秦寧公二年徙居平陽遣兵伐蕩社三年與亳戰亳王奔戎遂滅蕩社寧公魯隠公八年立據史年表云史作靈公宋宣公有太子與夷十九年宣公病讓其弟和曰父死子繼兄死弟及天下通義也我其立和和亦三讓而受之宣公卒弟和立是為穆公隠三年經書宋穆公卒魯桓公元年庚午在位十八年周桓王九年楚伐随随曰我無罪楚曰我蠻夷也今諸侯皆為叛相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號随人為之周請尊楚王室不聽還報楚三十七年楚熊通楚武王名怒曰吾先鬻熊文王之師也早終成王舉我先公乃以子男田令居楚蠻夷皆率服而王不加位我自尊耳乃自立為武王與隨人盟而去於是始開濮地而有之五十一年周召隨侯數以立楚為王楚怒以隨背已伐隨武王卒師中而兵罷按左桓六年楚伐隨八年及隨少師有寵楚伐隨秋隨楚平莊四年楚武王卒陳厲公娶蔡女蔡女與蔡人亂厲公數如蔡淫厲公所殺桓公太子免之三弟長曰躍中曰林少曰杵臼共令蔡人誘厲公以好女與蔡人共殺厲公而立躍是曰利公按左桓五年陳侯鮑卒於是陳亂文公子佗殺太子免而代之公疾病而亂作國人分散故再赴佗立兵屬周王戰繻葛陳氏無鬬心是以敗踰年蔡人殺佗見經不稱爵十有二年經書八月壬辰陳侯躍卒即厲公與史謂佗為厲公異厲公佗者陳文公少子也其母蔡女文公卒厲公兄鮑立是為桓公桓公與佗異母及桓公病蔡人為佗殺桓公鮑及太子免而立佗為厲公厲公既立娶蔡女蔡女淫於蔡人數歸厲公亦數如蔡桓公之子林怨厲公殺其父與兄乃令蔡人誘厲公而殺之林自立是為莊公故陳完不得立為陳大夫厲公之殺以淫出國故春秋曰蔡人殺陳佗罪之也莊公卒弟杵臼立是為宣公宣公十一年殺其太子禦㓂禦㓂與完相愛恐禍及已完奔齊莊二十二年完卒諡為敬仲仲生穉孟夷敬仲之如齊以陳氏為田氏田穉孟夷生湣孟莊田湣孟莊生文子須無田文子事齊莊公晉之大夫欒盈作亂於晉来奔齊齊莊公厚客之晏嬰與陳文子諫莊公弗聽文子卒生桓子無宇無宇有力事齊莊公有寵無宇卒生武子開與釐子乞事齊景公為大夫其収賦於民以小斗受之其粟予民以大斗行隂德於民景公弗禁由是田氏得齊衆家益彊民思田氏陳完始卒備此郭君出郭郭即虢十年夏虢叔出奔虞謂其御者曰吾渇欲飲御者進清酒曰吾饑欲食御者進乾脯粱糗曰何備也御者曰臣儲之曰奚儲之御者曰為君之出亡而道饑渇也曰子知我且亡乎御者曰然曰何不以諫也御者曰君喜道諛而惡至言臣欲進諫恐先郭亡是以不諫也郭君作色而怒曰吾所以亡者誠何哉御轉其辭曰君之所以亡者太賢曰夫賢者所以不存而亡者何也御者曰天下無賢而獨賢是以亡也伏軾而嘆曰嗟乎夫賢者如此乎於是身倦力解枕御膝而卧御自易以備踈行而去身死中野為虎狼所食公子彭生乗魯侯脅之公薨於車十八年竪曼曰賢者死忠以振疑百姓寓焉智者究理而長慮身得免焉今彭生二於君無盡言而諛行以戲吾君使吾君失親戚之禮命又力威吾君之禍以搆二國之怨彭生其得免乎禍理屬然夫君以怒遂禍不畏惡親聞容昏生無醜也豈及彭生而能止之哉魯若有誅必以彭生為說二月魯人告曰寡君畏君之威不敢寧居来修舊好禮成而不反無所歸咎請以彭生除之齊人為殺彭生以謝於魯魯莊公元年戊子在位三十二年周莊王三年楚文王伐鄧使王子革王子靈共招菜二子出採見老丈載畚乞焉不與摶而奪之王聞之令皆拘二子將殺之大夫辭曰取畚信有罪然殺之非其罪也君若何殺之言卒丈人造軍而言曰鄧為無道故伐之今君公之子摶而奪吾畚無道甚於鄧呼天而號君聞之羣臣恐君見之曰討有罪而横奪非所以禁暴也恃力虐老非所以教幼也愛子棄法非所以保國也私二子滅二行非所以從政也丈人舎之矣謝之軍門之外四年楚文王立六年伐申過鄧鄧侯享之十六年楚滅鄧荆文王曰莧譆數犯我以義違我以禮與處則不安曠之而不榖得焉不以吾身爵之後世有聖人將以為非不榖爵之五大夫申侯伯善養我意吾所欲先我為之與處則安曠之而不榖䘮焉不以吾身逺之後世有聖人將以非不榖於是送而行之左申侯有寵於文王文王將死與之璧使行曰云云文王卒在位十九年王孫厲謂楚文王曰徐偃王好行仁義之道漢東諸侯三十二國盡服矣王若不伐楚必事徐王曰若信有道不可伐也對曰大之伐小彊之伐弱猶大魚之吞小魚也若虎之食豚也惡有不得文王遂興師伐徐殘之徐偃王將死曰吾賴於文德而不明武備好行仁義之道而不知詐人之心以至於此夫古之王者其有備乎荆文王得茹黄之狗宛路之矰以畋於雲夢三月不反得丹之姬淫期年不聽朝葆申曰先王卜以臣為葆吉今王畋三月不反期年不聽朝王之罪當笞王曰不榖免衣襁褓而齒於諸侯願請更變而無笞申曰臣承先王之令不敢廢也王不受笞是廢先王之令也臣寧抵罪於王毋寧抵罪於先王王曰謹諾引席王伏葆申束細荆跽而加之背如此者再謂王起矣王曰有笞之名一也遂致之申曰臣聞君子恥之小人痛之恥之不變痛之何益申出自流於淵請死罪文王曰此不榖之過也乃變更殺茹黄之狗折宛路之矰放丹之姬後兼國三十九令荆國廣大至於此者葆申之力也極言之功也上三事年無攷據特因荆文王伐鄧乃附其後方齊僖公桓十五年𦵏齊僖公使鮑叔傅小白鮑叔辭管仲召忽往見之曰何在不出鮑叔曰先人有言曰知子莫若父知臣莫若君今君知臣之不肖也是以使賤臣傅小白也賤臣知所棄矣忽曰子固辭無出吾權任子以死亡必免子管仲曰不可持社稷宗廟者不譲事不廣閒將有國者未可知也子其出乎忽曰不可吾三人者之於齊國也譬之猶鼎之有足也去一焉則必不立矣吾觀小白必不為後矣管仲曰不然國人憎惡糾之母以及糾之身而憐小白之無母諸兒長而賤事未可知也夫所以定齊國者非此二公子者將無已也小白之為人也無小智而有大慮天不幸降禍於齊糾雖立不濟非子定社稷其將誰也忽曰百嵗之後吾君卜也犯吾君命而廢吾所立奪吾糾也雖得天下吾不生也管仲曰夷吾之為君臣也將承君命奉社稷以持宗廟豈死一糾哉夷吾之所以死者社稷破宗廟滅祭祀絶則夷吾死之非此三者則夷吾生夷吾生則齊國利矣鮑叔曰然則奈何管仲曰子出奉令則可鮑叔許諾遂傅小白管仲鮑叔相謂曰君亂甚矣必失國齊國之諸公子其可輔者非公子糾則小白也與子人事一人焉先達者相收管仲乃從公子糾鮑叔從小白國人果弑君小白先入為君魯人拘管仲而郊之鮑叔言而相之見八年𫝊公子糾將為亂九年經九月齊人殺公子糾桓公使使者視之使者報曰笑不樂視不見必為亂乃使魯人殺之管子得於魯魯檻而送之齊管子恐魯止而殺己也謂役人曰我為汝唱汝為我和其所唱適宜走役人不倦而取道甚速管仲束縛自魯之齊道而饑渇過綺鳥封人而乞食焉封人跽而食之甚敬封人因竊謂仲曰適幸及齊不死而用齊將何以報我曰如子之言我且賢之用能之使勞之論我何以報子封人怨之魯君束縛管仲召忽以與齊使管仲謂召忽曰子懼乎召忽曰何懼乎吾不蚤死將胥有所定也今既定矣令子相齊之左必令忽相齊之右雖然殺君而用吾身是再辱我也子為生臣忽為死臣忽也知得萬乗之衆而死公子糾可謂有死臣矣子生而覇諸侯公子糾可謂有生臣矣死者成行生者成名名不兩立行不虗至子其勉之死生有分矣乃行入齊境自刎而死管仲遂入君子曰召忽之死也賢其生也管仲之生也賢其死也桓公既立發兵攻魯心欲殺管仲鮑叔牙曰臣幸得從君君竟以立君之尊臣無以增君君將治齊即高傒與叔牙足也君且欲覇王非管夷吾不可夷吾所居國國重不可失也於是桓公從之乃佯為召管仲欲甘心實欲用之管仲知之故請往鮑叔牙迎受管仲及堂阜而脱桎梏齊祓而見桓公桓公既得管仲與鮑叔隰朋高傒修齊國政連五家之兵設輕重魚鹽之利以贍貧窮禄賢能齊人皆說二年滅郯郯子奔莒初桓公亡過郯郯無禮故伐之經十一年伐郯郯傳作譚齊桓公使管仲治國管仲對曰賤不能臨貴桓公以為上卿而國不治桓公曰何故對曰貧不能使富桓公賜之齊國市租一年而國不治桓公曰何故對曰䟽不能制親桓公以為仲父齊國大安而遂覇天下孔子曰管仲之賢不得此三權者亦不能使其君南面而覇矣桓公立仲父致大夫曰善吾者入門而右不善吾者入門而左東郭牙中門而立桓公問焉對曰管子之知可謀天下其强可與取天下君恃其信乎内政委焉外事斷焉驅民而歸之是亦可奪也桓公曰善乃謂管仲政則卒歸於子矣政之所不及惟子是匡管仲故築三歸之臺以自傷於民甯戚欲干齊桓公窮無以自進於是為商旅將車至齊暮宿於郭門之外桓公郊迎客夜開門辟賃車執火甚盛從者甚羨甯戚飯牛居車下望桓公悲擊牛角疾歌商歌桓公聞之曰異哉之歌者非常人也命後車載之甯戚見說桓公以治境内明日說桓公以為天下桓公大説將任之羣臣争之曰客衛人也衛之去齊未逺不若使人問之而固賢者也用之未晩也桓公曰不然患其有小惡以人之小惡而亡人之大美此所以失天下之士也已且人固難全權而用其長者當舉也遂大用之為上卿春秋别典卷一
