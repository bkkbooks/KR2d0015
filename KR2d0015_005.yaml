body:
  text: 春秋别典卷五明薛虞畿撰魯文公元年乙未在位十八年周襄王二十六年晉襄公使人於周曰敝邑寡君寢疾卜以守龜曰三塗為祟使下臣願藉途而祈福焉天子許之萇𢎞謂劉康公曰夫祈福於三塗而受禮於天子此柔嘉之事也而客武色願公備之晉果襲聊阮梁蠻氏戎王使由余於秦由余其先晉人也亡入戎能晉言聞繆公賢故使由余觀秦繆公示以宮室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣繆公怪之問曰中國以詩書禮樂法度為治然尚時亂今戎夷無此何以為治不亦難乎由余歎曰此乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅以小治及其後世日以驕淫阻法度之威以督責於下下罷極則以仁義怨望於上上下交爭怨而相篡弒至於滅宗皆以此類也夫戎夷不然上居淳德以遇其下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也於是繆公退而問內史廖曰孤聞鄰國有聖人敵國之憂也今由余賢寡人之害將奈之何內史廖曰戎王處僻區未聞中國之聲君誠遺其女樂以奪其志為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也且戎王好樂必怠於政繆公曰善因與由余曲席而坐傳器而食問其地形與其兵勢盡察而後令內史廖以女樂二八遺戎王戎王受而說之終年不還於是秦乃歸由余由余數諫不聽繆公又數使人間要由余由余遂去降秦繆公客禮待之左傳秦戰彭衙在二年按史記秦誘由余在戰彭衙之後秦繆公問於由余曰古者明王聖帝得國失國當何以也由余曰臣聞之當以儉得之以奢失之繆公曰願聞奢儉之節由余曰臣聞堯有天下飯于土簋啜于土瓶其地南至交址北至幽都東西至日所出入莫不賓服堯釋天下舜受之作為食器斬木而裁之銷銅鐵修其刃猶漆黑之以為器諸侯侈國之不服者十有三舜釋天下而禹受之為祭器漆其外而朱畫其內繒帛為茵褥觴勺有彩為飾彌侈而國之不服者三十有二夏后氏以沒殷周受之作為大器而建九傲食器雕琢觴勺刻鏤四壁四帷茵席雕文此彌侈矣而國之不服者五十有二君好文章而服者彌侈故曰儉其道也繆公說拜由余為上卿問其兵勢與其地利既以得矣舉兵而伐戎兼國十二開地千里繆公奢主能聽賢納諫故霸西戎淫於樂誘於利以亡其國由離質朴也繆公益厚孟明視等使將兵伐晉渡河焚船大敗晉人取王官及鄗以報殽之役三年事晉人皆城守不敢出於是繆公乃自茅津渡河封殽中尸為發喪哭之三日乃誓於軍曰嗟士卒聽無譁余誓告汝古之人謀黃髮番番則無所過以申思不用蹇叔百里奚之謀故作此誓令後世以記余過君子聞之皆為流涕曰嗟乎秦繆公之與人周也卒得孟明之慶天子使召公過賀繆公以金鼓秦繆公謂伯樂曰子之年長以子姓有可使求馬者乎對曰良馬者可以形容筋骨相也相天下之馬者若滅若失若亡其一若此馬者絶塵弭轍臣之子皆下材也可告以良馬而不可告以天下之馬臣有所與供儋纒采薪者九方堙此其於馬非臣之下也請見之繆公見之使之求馬三月而反報曰已得馬矣在於沙丘繆公曰何馬也對曰牡而黃使人往取之牝而驪繆公不悅召伯樂而問之曰敗矣子之所使求者毛物牝牡弗能知又何馬之能知伯樂喟然太息曰一至此乎此乃其所以千萬臣而無數者也若堙之所觀者天機也得其精而亡其粗在內而忘其外見其所見而不見其所不見視其所視而遺其所不視若彼之所相者乃有遺乎馬者馬至而果千里之馬此條年無考證按𫝊六年秦繆公卒此宜附之繆公未卒之年云秦康公築臺三年荆人起兵將欲以兵攻齊任妄曰饑召兵疾召兵勞召兵亂召兵君築臺三年今荆人起兵將攻齊臣恐其攻齊為聲而襲秦為實也不如備之戍東邊荆人輟行康公六年立十八年卒事希見楚莊王立為君十四年立三年不聽朝乃令于國曰寡人惡為臣而遽諫其君者今寡人有國家主社稷有諫則死無赦蘇從曰處君之髙爵食君之厚祿愛其死而不諫其君則非忠臣也乃入諫莊王立鐘鼓之間左伏楊姬右擁越姬左禱袵右朝服曰吾鐘鼓之不暇何諫之聽蘇從曰臣聞之好道者多資好樂者多迷好道者多糧好樂者多亡荆國亡而無日矣死臣敢以告王王曰善左執蘇從手右抽隂刀刎鐘鼓之縣明日授蘇從為相莊王涖政三年不治而好隱戲社稷危國將亡士慶問左右羣臣曰王涖政三年不治而好隱戲社稷危國將亡胡不入諫左右曰子其入矣士慶入再拜而進曰隱有大鳥來止南山之陽三年不蜚不鳴不審其故何也王曰子其去矣寡人知之矣士慶曰臣言亦死不言亦死願聞其說王曰此鳥不蜚以長羽翼不鳴以觀羣臣之慝是鳥雖不蜚蜚必冲天雖不鳴鳴必驚人士慶稽首曰所願聞已王大悅士慶之問而拜之以為令尹授之相印士慶喜出門顧左右笑曰吾王成王也中庶子聞之跽而泣曰臣尚衣冠御節三年矣前為豪矢而後為藩蔽王賜士慶相印而不賜臣臣將死有日矣王曰寡人居塗泥中子所與寡人言者內不及國家外不及諸侯如子者可富而不可貴也於是乃出其國寶璧玉以賜之曰忠信者士之行也言語者士之道路也道路不修治士無所行矣楚莊王聽朝罷晏樊姬下堂而迎之曰何罷之晏也得無饑倦乎莊王曰今日聽忠賢之言不知饑倦也樊姬曰王之所謂忠賢者諸侯之客歟中國之士歟莊王曰則沈令尹也樊姬掩口而笑王曰姬之所笑者何也姬曰妾得於王尚湯沐執巾櫛振袵席十有一年矣然妾未嘗不遣人之梁鄭之間求美人而進之於王也與妾同列者十人賢於妾者二人妾豈不欲擅王之寵哉不敢私願蔽衆美欲王之多見則娛今沈令尹相楚數年矣未嘗見進賢而退不肖也又焉得為忠賢乎莊王旦朝以樊姬之言告沈令尹令尹避席而進孫叔敖叔敖治楚三年而楚國霸楚史援筆而書之於策曰楚之霸樊姬之力也楚沈令尹一作虞丘子左宣十一年令尹蒍艾城沂即叔敖叔敖始見傳楚莊王見天不見妖而地不出孽則禱于山川曰天其忘豫歟此能求過於天必不逆諫矣孫叔敖為嬰兒出逰見兩頭蛇殺而埋之歸而泣其母問其故叔敖以告曰聞見兩頭之蛇者死向者吾見之恐其去母而死也其母曰蛇今安在曰恐他人又見殺而埋之矣其母曰吾聞有隂德者天報之福汝則不死也及長為楚令尹未治而國人信其仁也孫叔敖沈尹董相與友叔敖逰於郢三年聲問不知修行不聞沈尹董謂叔敖曰能令人主上至於王下至於霸我不若子耦世接俗以適主心子不如我子何不歸耕乎吾將為子逰沈尹董逰於郢荆王欲以為令尹辭曰有孫叔敖者聖人也王必用之臣不若也荆王於是迎叔敖以為令尹十二年而霸此沈尹董之力也楚令尹虞丘子復於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位不名仁智無求顯榮才之所不著無當其處臣為令尹十年矣國不加治訟獄不息處士不升淫禍不討久踐髙位妨羣賢路尸祿素餐貪祿無饜臣之罪當稽于理臣竊選國俊下里之士曰孫叔敖秀羸多能其性無欲君舉而授之政則國可使治而士民可使附莊王曰子輔寡人寡人得以長于中國令行於絶域遂霸諸侯非子而何虞丘子曰久固祿位者貪也不進賢達能者誣也不讓以位者不亷也不能三者不忠也為人臣而不忠王又何以為忠臣願固辭莊王從之賜虞丘子萊地三百號曰國老以孫叔敖為令尹少焉虞丘子家干法孫叔敖執而戮之虞丘子喜入見于王曰臣言孫叔敖果可使持國政奉國法而不黨施刑戮而不骫可謂公平莊王曰夫子之賜也已孫叔敖為楚令尹一國士民皆來賀有一老父衣粗衣冠白冠后來弔孫叔敖正衣冠而出見之謂老父曰楚王不知臣不肖使臣受吏民之垢人盡來賀子獨後來弔豈有說乎父曰有說身已貴而驕人者民亡之位已髙而擅權者君惡之祿已厚而不知足者患處之叔敖再拜曰敬受命願聞餘教父曰位已髙而意益下官益大而心益小祿已厚而慎不敢取君謹守此三者足以治楚矣孫叔敖遇狐丘丈人狐丘丈人曰僕聞之有三利必有三患子知之乎叔敖蹴然易容曰小子不敏何足以知之敢聞何謂三利何謂三患狐丘丈人曰夫爵髙者人妬之官大者主惡之祿厚者怨歸之此之謂也叔敖曰不然吾爵益髙吾志益下吾官益大吾心益小吾祿益厚吾施益博可以免於患乎狐丘丈人曰善哉言乎堯舜其猶病諸一作譄丘封人孫叔敖相楚三月施教導民上下和合世俗盛美政信禁止吏無姦邪盜賊不起秋冬則勸民山採春夏以水各得其所便民皆樂其生莊王以為幣輕更以小為大百姓不便皆去其業市令言之相曰市亂民莫安其處次行不定相曰如此幾何頃乎市令曰三月頃相曰罷吾今令之復矣後五日朝相言之王曰前日更幣以為輕今市令來言曰市亂民莫安其處次行之不定臣請遂令復如故王許之下令三日而市復如故楚民俗好庳車王以為庳車不便馬欲下令使髙之相曰令數下民不知所從不可王必欲髙車臣請教閭里使髙其梱乘車者皆君子君子不能數下車王許之居半嵗民悉自髙其車楚莊王問於孫叔敖曰寡人未得所以為國是也孫叔敖曰國之有是而以非之所惡也臣恐王之不能定也王曰不定獨在君乎亦在臣乎孫叔敖曰國君驕士曰士非我無道富貴士驕君曰國非士無道安强人君幾至失國而不悟士幾至饑寒而不進君臣不合國是無道定矣夏桀殷紂不定國是而以合其取舍者為是以不合其取舍者為非故致亡而不知莊王曰善哉願相國與諸侯士大夫共定國是寡人豈敢以褊國驕士民哉孫叔敖相楚棧車牝馬糲餅菜羮枯魚之膳冬羔裘夏葛衣而有饑色孫叔敖決期思之水而灌雲夢之野莊王知其可為令尹也乘馬三年而不知其牝牡孫叔敖妻不衣帛馬不食粟乘棧車牝馬披羖羊之裘從者曰車新則安馬肥則疾狐裘則溫何不為也叔敖曰吾聞君子服美益恭小人服美益倨吾無德以堪之矣楚有善相人者所言無遺策聞於國莊王召見而問焉對曰臣非能相人能觀人之交也觀布衣者其交皆孝悌篤謹畏令如此者家必日益而身益安此所謂吉人者也觀事君者其交皆誠信有行好善如此者措事日益官職日進此所謂吉臣者也人主朝臣皆多賢左右皆忠主有失皆敢分爭正諌如此者國日安主日尊名聲日顯此所謂吉主者也臣非能相人能觀人之交也莊王曰善於是乃招聘四方之士遂得孫叔敖將軍子重之屬以備卿相遂成霸功楚莊王問詹何曰治國奈何詹何對曰臣明於治身而不明於治國也王曰寡人得奉宗廟社稷願學所以守之何對曰臣未聞身治而國亂者也又未聞身亂而國治者也故本在身不敢對以末莊王曰善楚莊王有茅門者法曰羣臣大夫諸公子入朝馬蹄蹂霤者斬其輈而戮其御太子入朝馬蹄蹂霤廷理斬其輈戮其御太子大怒入為王泣曰為我誅廷理王曰法者所以敬宗廟尊社稷故為立法令尊敬社稷者社稷之臣也安可以加誅夫犯法廢令不尊敬社稷是臣棄君下陵上也臣棄君則主失威下陵上則上危位社稷不守何以遺子太子乃還走避舍再拜請死楚莊王之時太子車立於茅門之內少師慶逐之太子怒入謁王曰少師慶逐臣車王曰舍之老君在前而不踰少君在後而不豫是國之寶臣也楚莊王築層臺延石千里延壤百里士有缺三月之糧者大臣諫者七十二人皆死矣有諸御己者違楚百里而耕謂其耦曰吾將入見於王其耦曰以身乎我聞之說人主者皆閒暇之人也然且至而死矣今子特草茅之人耳諸御巳曰若與豫同耕則比力也至於說人主不與子比賢矣遂入見莊王莊王謂之曰諸御已來汝將諫也諸御巳曰君有義之用有法之行且已聞之土負水者平木負繩者直君受諫者聖君築層臺延石千里延壤百里民之釁咎血成于通塗然且未敢諫也已何諫乎顧臣愚竊聞昔者虞不用宮之竒而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之吳不用子胥而越并之時吳未有子胥事恐後人增入之秦人不用蹇叔之言而秦國危桀殺關龍逄而湯得之紂殺王子比干而武王得之宣王殺杜伯而周室卑此三天子六諸侯皆不能尊賢用辨士之言故身死而國亡遂趨而出楚王遽而追之曰己子反矣吾將用子之諫先曰說寡人者其說也不足以動寡人之心又危一作色加諸寡人故皆至於死今子之說足以動寡人之心又不危加諸寡人故將用子之諫明日令曰有能入諫者吾將與為兄弟遂解層臺罷民楚人歌之曰薪乎菜乎無諸御已訖無子乎菜乎薪乎無諸御已訖無人乎令尹子佩請飲莊王莊王許諾不往子佩北面立於殿下曰昔者君王許今不果往意者臣有罪乎莊王曰吾聞子具於强臺强臺者南望料山以臨方皇左江而右淮其樂亡死若吾薄德之人不可以當此樂也恐留而不能反楚莊王之弟春申君有愛妾曰余春申君之正妻子曰甲余欲君之棄其妻也因自傷其身以示君而泣曰得為君之妾幸甚雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸於左右願君必察之無為人笑君因信妾唋之詐為棄正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非不知也今乃欲强戲余余與爭之至裂余之衣而此子之不肖莫大於此矣君怒而殺甲也楚莊王賜其羣臣酒日暮酒酣左右皆醉殿上燭滅有牽王后衣者后扢冠纓而絶之言於王曰今燭滅有牽妾衣者妾扢其纓而絶之願趣火視絶纓者王曰止立出令曰與寡人飲不絶纓者不為樂也於是纓絶無完者不知王后絶纓者誰於是王遂與羣臣歡飲乃罷後吳興師攻楚有人常為應行五合戰五陷陳却敵遂取大軍之首而獻之王怪而問之曰寡人未嘗有異於子何為於寡人厚耶對曰臣先殿上絶纓者也當時宜以肝膽塗地負日久矣未有所效今幸得用於臣之義尚可為王破吳而强楚楚莊王好獵大夫諫曰晉楚敵國也楚不謀晉晉必謀楚今王無乃耽於樂乎王曰吾獵將以求士也其榛藂刺虎豹者吾是以知其勇也其攖犀搏兕者吾是以知其徑有力也罷田而分所得吾是以知其仁也因是道也而得三士焉楚因以安故曰苟有志則無非事者此之謂也楚莊王獵於雲夢射隨兕中之隨兕一作科雉申公子培劫而奪之王命誅左右進諫曰子培賢者此必有故願察之不出三月子培病而死邲之戰楚大勝晉賞有功者培之弟進曰臣兄有功於車下臣之兄嘗讀故記曰殺隨兕者不出三月是以驚懼而爭得之伏其罪而死王令人發而視之於故記果有乃厚賞之楚莊王所愛馬病肥死使羣臣喪之欲以棺槨大夫禮葬之下令有敢諫者死優孟入哭曰馬者王之所愛也楚國之大何求不得而以大夫葬之諸侯聞之皆知大王賤人而貴馬也王於是以馬屬太官楚人有獻魚楚王者曰今日漁獲食之不盡賣之不售棄之又惜故來獻也左右曰鄙哉辭也楚王曰子不知漁者仁人也蓋聞囷倉粟有餘者下民多饑後宮多幽女者下民多曠夫餘衍之蓄聚于府庫者境內多貧困之民皆失君人之道故厨庖有肥魚廄有肥馬民有饑色是以亡國之君藏於府庫寡人聞之久矣未能行也漁人者知之其以此諭寡人也且令行之於是乃遣使恤鰥寡而存孤獨出倉粟發幣帛而振不足罷去後宮不御者出而妻鰥夫楚民欣欣大悅鄰國歸之故漁者一獻餘魚而楚國賴之可謂仁智矣魯宣公者魯文公之弟也文公薨十八年文公之子赤立為魯侯宣公殺子赤而奪之國按傳十八年公薨襄仲殺惡及視而立宣公書曰子卒諱之也惡文公太子視其弟也宣公文公妃敬嬴子接立為魯侯公子肹者宣公之同母弟也宣公殺子赤而肹非之宣公與之祿則曰我足矣何以兄之食為哉織屨而食終身不食宣公之食其仁恩厚矣其守節固矣故春秋美而貴之宣十七年經特書冬十有一月壬午公弟叔肹卒庶弟稱公弟豫之也晉靈公造九層之臺費用千金謂左右曰敢有諫者斬荀息聞之上書求見靈公張弩持矢見之曰臣不敢諫也臣能纍十二博棊加九雞子其上公曰子為寡人作之荀息定顔色定志意以棊子置下加九雞子其上左右懼懾息靈公氣息不續公曰危哉危哉荀息曰不危也復有危於此者公曰願見之荀息曰九層之臺三年不成男不耕女不織國用空虛鄰國謀議將興社稷亡滅君欲何望靈公曰寡人之過也乃至于此即壞九層臺也按左傳荀息死奚齊卓子之難靈公時而稱荀息恐非是靈公文六年立宣二年弒春秋别典卷五
