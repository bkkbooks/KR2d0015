body:
  text: 春秋别典卷四明薛虞畿撰魯僖公十四年起丕鄭子豹奔秦説繆公曰晉君無道百姓不親可伐也繆公曰百姓茍不便何故能誅其大臣能誅其大臣此其調也不聽而隂用豹見十年傳宋襄公欲為盟㑹召楚王楚王怒曰召我我将好往襲辱之遂行至盂遂執辱宋公已而歸之二十一年事廿二年為鹿上之盟廿三年戰于泓次年襄公卒晉文公入國二十四年晉侯夷吾卒秦繆公納重耳至于河令棄籩豆茵席顔色黎黒手足胼胝者在後咎犯聞之中夜而哭文公曰吾亡也十有九年矣今将反國夫子不喜而哭何也其不欲我反國乎對曰籩豆茵席所以安者也而棄之顔色黎黒手足胼胝所以執勞苦而皆後之臣聞國君蔽士無所取忠臣大夫蔽逰無所取忠友今至扵國臣在所蔽之中矣不勝其哀故哭也文公曰禍福利害不與外氏同之者有如白水祝之乃沉璧而盟介子推曰獻公之子九人唯君在耳天未絶晉必将有主主晉祀者非公而何唯二三子者以為己力不亦誣乎文公即位賞不及推推母曰盍亦求之推曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之推曰言身之文也身将隠焉用文其母曰能如是與若俱隠至死不復見推從者憐之乃縣書宫門曰有龍矯矯頃失其所五蛇從之周徧天下龍既無食一蛇割股龍反其淵安其壤土四蛇入穴皆有處所一蛇無穴號于中野文公出見書曰嗟此介子推也吾方憂王室未圖其功使人召之則亡遂求其所在聞其入綿上山中于是文公表綿上山中而封之以為介子推田號曰介山晉文公出亡箕鄭挈壺餐而從迷而失道與公相失饑而道泣寝卧而不敢食及文公反國舉兵攻原克而拔之文公曰夫輕忍饑餒之患而必全壺餐是将不以原叛乃舉以為原令大夫渾軒聞而非之曰以不動壺餐之故知其不以原叛也不亦無術乎故明主者不恃其不我叛也恃吾不可叛也不恃其不吾欺也恃吾不可欺也晉文公亡時陶舛狐從文公反國行三賞而不及陶舛狐狐見咎犯曰吾從君而亡十有三年顔色黎黒手足胼胝今君反國行三賞而不及吾也意者君忘我歟我有大故與子試為我言之君咎犯言之文公文公曰我豈忘是子哉夫髙明至賢徳行全誠躭我以道説我以仁暴浣我行昭明我名使我為成人者吾以為上賞防我以禮讓我以誼蕃援我使我不得為非數引我請於賢人之門吾以為次賞夫勇壮强禦難在前則居前難在後則居後免我于患難之中者吾又以為之次且子獨不聞乎死人者不如存人之身亡人者不如存人之國三行賞之後而勞苦之士次之夫勞苦之士是子固為首矣豈敢忘子哉周内史叔輿聞之曰文公其霸乎昔聖王先徳而後力文公其當之矣文公出亡周流天下舟之僑去虞而從焉文公反國擇可爵而爵之擇可禄而禄之舟之僑獨不與焉文公酌諸大夫酒酒酣文公曰二三子盍為寡人賦乎舟之僑進曰君子為賦小人請陳其辭辭曰有龍矯矯將失其所一蛇從之周流天下龍反其淵安寧其處一蛇脂乾獨不得其所文公瞿然曰子欲爵也請待旦日之期子欲禄耶請今命廩人舟之僑曰請而得其賞亷者不受也言盡而名至仁者不為也今天油然作雲沛然下雨則苗草興起莫之與禦今為一人言施一人猶為一塊土下水也土亦不生之矣遂歴階而去文公求之不得終身誦甫田之詩晉文公反國酌士大夫酒召咎犯而將召艾陵而相之授田百萬介子推無爵齒而就位觴三行介子推奉觴而起曰有龍矯矯将失其所有蛇從之周流天下龍入深淵得其安所蛇脂盡乾獨不得甘雨此何謂也文公曰嘻是寡人之過也吾為子爵歟待旦之朝也吾為子田歟河東陽之間介子推曰推聞君子之道謁而得位道士不居也爭而得財亷士不受也文公曰使我得反國者子也吾將以成子之名介子推曰推聞君子之道為人子而不能承其父者不敢當其後為人臣而不見察於其君者則不敢立於其朝然推亦無索於天下矣遂去而之介山之上文公使人求之不得為之避寢三月號呼朞年詩云逝將去汝適彼樂郊樂郊樂郊誰之永號此之謂也文公待之不肯出求之不能得以謂焚其山宜出乃焚其山不出而焚死晉文公反國李離為大理過殺不辜自繫曰臣之罪當死文公令之曰官有上下罰有輕重是下吏之罪也非子之過也李離曰臣居官為長不與下讓位受禄為多不與下分利過聽殺無辜委下罪死非義也臣之罪當死矣文公曰子必自以為有罪則寡人亦有過矣李離曰君量能而授官臣奉職而任事臣受印綬之日君命曰必以仁義輔政寧過于生毋失于殺臣受命不稱壅惠蔽恩如臣之罪乃當死君何過之有且理有法失生即生失殺即死君以臣能聽㣲決疑故任臣以理今離刻深不顧仁義信文墨不察是非聽他詞不精事實掠服無罪使百姓怨天下聞之必議吾君諸侯聞之必輕吾國怨積于百姓惡揚于天下權輕于諸侯如臣之罪是當重死文公曰吾聞之也直而不枉不可與往方而不圓不可與長存願子以此聽寡人也李離曰君以所私害公法殺無罪而生當死二者非所以教于國也離不敢受命文公曰子獨不聞管仲之為人臣也身辱而君肆行汙而霸成李離曰臣無管仲之賢而有汙辱之名無霸王之功而有射鈎之累夫無能以臨官藉汙以治人君雖不忍加之于法臣亦不敢汙官亂治以生臣聞其命矣伏劍以死晉文公問咎犯曰誰可使為西河守者咎犯對曰虞子羔可也公曰非女之讐也對曰君問可為守者非問臣之讐也羔見咎犯而謝之曰幸赦臣之過而薦之於君得為西河守咎犯曰薦子者公也怨子者私也吾不以私事害公義子其去矣顧吾射子也翟人有獻封狐文豹於晉文公文公受客皮而嘆曰此以皮之美自為罪夫治國者則以名號為罪徐偃王是也以城與地為罪虞虢是也晉文公時翟人有獻封狐文豹之皮者文公喟然嘆曰封狐文豹何罪哉以其皮為罪也大夫欒枝曰地廣而不平財聚而不散獨非狐豹之罪乎文公曰善哉説之欒枝曰地廣而不平人将平之財聚而不散人将争之扵是列地以分民散財以賑貧晉文公問政於舅犯舅犯對曰分熟不如分腥分腥不如分地割以分民而益其爵禄是以上得地而民知富上失地而民知貧古之所謂致師而戰者其斯之謂乎文公舉兵欲伐衞公子鋤仰天而笑公問何笑曰臣笑隣之人有送其妻適私家者道見桑婦悦而與之言顧視其妻亦有招之者矣臣竊笑此也公寤其言乃止引師而還未至有伐其北鄙者此舉疑未救宋之前信義未孚威聲未振時事晉文公見咎季其廟傅于西墻公曰孰處而西對曰君之老臣也公曰西益而宅對曰臣之忠不如老臣之力其墻壊而不築公曰何不築對曰一日不稼百日不食公出而告之僕僕頓首子軫曰呂刑云一人有慶兆民賴之君之明羣臣之福也乃令于國曰毋淫宮室以妨人宅版築以時無奪農功齊無道起兵攻魯魯君患之召其相曰為之奈何對曰夫栁下惠少好學長而嘉智主君試召使于齊魯君曰吾千乗主也身自使於齊齊不聽夫柳下惠特布衣韋帶之士也使之又何益乎相對曰臣聞之乞火不得不望其炮矣今使柳下惠于齊縱不解於齊兵終不愈益攻於魯矣魯君乃曰然乎相即使人召柳下惠來入門袪衣不趨魯君避席而立曰寡人所謂饑而求黍稷渇而穿井者未嘗能以懽喜見子今國事急百姓恐懼願藉子使夫齊柳下惠曰諾乃東見齊侯齊侯曰魯君將懼乎柳下惠曰臣君不懼齊侯忿然怒曰吾望而魯城芒若𩔖失亡國百姓發屋伐木以救城郭吾視若魯君𩔖吾國子曰不懼何也柳下惠曰臣之君所以不懼者以其先人出周封于魯君之先君亦出周封于齊相與出周南門刳羊而約曰自後子孫敢有相攻者令其罪若此刳羊矣臣之君固以刳羊不懼矣不然百姓非不急也齊侯乃解兵三百里柳下惠姓名不見於經唯二十六年齊伐吾北鄙公使展喜犒師受命於展禽㣲見其名於傳耳下數條皆無據但倂附柳下惠之後齊攻魯求岑鼎魯君載岑鼎往齊侯不信而反之以為非也使人告魯君柳下惠以為是因請受之魯君請于柳下惠下惠對之曰君之欲以為岑鼎也以免國也臣亦有國於此破臣之國以免君之國此臣所難也魯君乃以真岑鼎往柳下惠可謂守信矣非獨存己之國也又存魯君之國信之于人重矣猶輿之輗軏也故孔子曰大車無輗小車無軏其何以行之哉此之謂也魯君問柳下惠吾欲伐齊何如柳下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至扵我哉柳下惠三黜於魯而不去也其妻謂之曰子無乃凟乎吾聞之君子有二恥國無道而貴恥也國有道而賤恥也今當亂世三黜而不去亦近恥矣惠曰彼為彼我為我雖裸裎安能汙我由由然與之處柳下惠既死門人将誄之妻曰將誄夫子之徳邪則二三子不如妾之知也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從俗而不彊察兮蒙恥救民徳彌大兮雖遇三黜而心不易兮愷悌君子永能厲兮嗟呼惜哉乃下世兮庶幾遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之諡宜曰惠兮於是門人從之以惠為誄云城濮之戰二十八年文公謂舅犯曰吾卜戰而龜熸我迎嵗彼背嵗彗星見彼操其柄我操其標吾又夢與荆王搏彼在上我在下吾欲無戰子以為何如舅犯曰卜戰龜熸是荆人也我迎嵗彼背嵗彼去我從之也彗星見彼操其柄我操其標以掃則彼利以擊則我利君夢與王搏彼在上君在下則君見天而荆王伏其罪也且吾以宋衞為主齊秦輔我我合天道獨以人事固將勝之矣文公從之荆人大敗晉文公與荆人戰於城濮君問於舅犯舅犯對曰服義之君不足於信服戰之君不足於詐詐之而已矣君問於雍季雍季對曰焚林而田得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也詐猶可以偷利而後無報遂與荆軍戰大敗之及賞先雍季而後舅犯侍者曰城濮之戰舅犯之謀也君曰雍季之言百世之謀也舅犯之言一時之權也寡人既行之矣晉文公與楚戰至黄鳯之陵履係解因自結之左右曰不可以使人乎公曰吾聞上君所與居皆其所畏也中君之所與居皆其所愛也下君之所與居皆所侮也寡人雖不肖先君之人皆在是以難之也晉文公與楚人戰大勝之燒其軍火三日不滅文公退而有憂色侍者曰君大勝楚今有憂色何也文公曰吾聞能以戰勝而安者其唯聖人乎若夫詐勝之徒未嘗不危也吾是以憂晉文公問箕鄭曰救饑奈何對曰信公曰安信曰信名則羣臣守職善惡不踰百事不怠信事則不失天時百姓不踰信義則近親勸勉而逺者歸之晉文公將伐鄴趙衰言所以勝鄴文公用之而勝鄴將賞趙衰衰曰君將賞其末乎賞其本乎賞其末則騎乗者存賞其本則臣聞之郤虎公召郤虎郤虎曰言之易行之難臣言之者也公曰子無辭虎非親言之者也而賞及之此疏逺者之所以盡能竭智者也晉文公合諸侯而盟曰吾聞國之昬不由聲色必由姦利好樂聲色者淫也貪姦者惑也夫淫惑者之國不必殘自今以來無以美妾疑妻無以聲樂妨正無以姦情害公無以貨利示下其有之者是謂伐其根素流于華葉若此者有患無憂有冦勿弭不如言者盟示之於是君子聞之曰文公其知道乎其不王者由無佐也疑踐土盟辭晉文公田于虢遇一老夫而問曰虢之為虢久矣子處此故矣虢亡其有説乎對曰斷則不能諫則無與也不能斷又不能用之此虢之所以亡文公輟田而歸遇趙衰而告趙衰曰今其人安在君曰吾不與之來也趙衰曰古之君子聽其言而用其人今之君子聽其言而棄其身哀哉晉國之憂也文公乃召賞之於是晉國樂納善言文公卒以霸晉文公逐麋而失之問農夫老古曰吾麋何在老古以足指曰如是往公曰寡人問子以足指何也老古振衣而起曰一不意人君如此也虎豹之居也厭閑而近人故得魚鱉之居也厭深而之淺故得諸侯厭衆而亡其國詩云維鵲有巢維鳩居之君放不歸人將君之於是文公恐歸道遇欒武子武子曰獵得獸乎而有悦色文公曰寡人逐麋而失之得善言故有悦色欒武子曰其人安在乎曰吾未與來也欒武子曰居上位而不恤其下驕也緩令急誅暴也取人之言而棄其身盜也文公曰善還載老古與俱歸晉文公出田逐獸碭入大澤迷不知所出其中有漁者文公問曰我若君也道安從出我且厚賜若漁者曰臣願有獻公曰出澤而受之於是遂出澤公令曰子之所以教寡人者何等也願受之漁者曰鴻鵠保河海之中厭而欲移徙之小澤則必有九繒之憂黿鼉保深淵厭而出之淺渚則必有羅網釣射之憂今君逐獸碭入至此何行之太逺也文公曰善哉謂從者記漁者名曰君何以名為君其尊天事地敬社稷固四國慈愛萬民薄賦斂輕租税者臣亦與焉君不敬社稷不固四海失禮于諸侯内逆民心一國流亡漁者雖得厚賜不能保也遂辭不受曰君亟歸國臣亦反吾漁所晉文公出獵前驅曰前有大蛇髙如隄阻道竟之文公曰寡人聞之諸侯夢惡則脩徳大夫夢惡則脩官士夢惡則脩身如是而禍不至矣今寡人有過天以戒寡人還車而返前驅曰臣聞之喜者無賞怒者無刑今禍福已在前矣不可變何不遂驅之公曰不然夫神不勝道而妖亦不勝徳禍福未發猶可化也還車反宿齋三日請于廟曰孤少犧不肥幣不厚罪一也孤好弋獵無度數罪二也孤多賦斂重刑罰罪三也請自今以來者闗市無征澤梁無賦斂赦罪人舊田半税新田不税行此令未半旬吏夢大帝殺蛇曰何故當聖之道為而罪當死發夢視蛇臭腐矣謂文公曰然夫神果不勝道而妖亦不勝徳奈何其究理而任天也應之以徳而已晉文公好苴服當文公之時晉國之士大布之衣羔羊之裘練帛之冠且苴之履入見文公出以踐之朝故苴服為其難為也然為而文公説之未踰於世而民可移也即求以鄉其上也晉文公行地登遂大夫皆扶之隨㑹不扶文公曰㑹夫為人臣而忍其君者其罪奚如對曰其罪重死文公曰何為重死對曰身死妻子為戮焉隨㑹曰君奚獨問為人臣而忍其君者而不問為人君而忍其臣者耶文公曰為人君而忍其臣者其罪奚如隨㑹對曰為人君而忍其臣者智士不為謀辨士不為言仁士不為行勇士不為死文公授綏下車辭大夫曰寡人有腰痹之病願諸大夫勿罪也以上諸條年次無証據姑附文公城濮圖霸之後三十二年冬文公卒次年敗秦師于殽先軫欲要功獲名利以秦不假道之故秦伐鄭弦髙以十二牛犒師即此年請要秦師襄公曰不可夫秦伯與吾先君有結先君一日薨而以師擊之是孤之負吾先君敗鄰國之交而失孝子之行也先軫曰先君薨而不弔贈是無哀吾喪也興師經吾地不假道是弱吾孤也且柩畢尚薄屋無哀吾喪也興師卜曰大國師将至請擊之則聴先軫興師要殽擊之匹馬隻輪無脱者大結怨搆禍于秦接刃流血伏尸暴骸糜爛國家十有餘年卒喪其師詳見三十三年傳春秋别典卷四
