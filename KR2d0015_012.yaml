body:
  text: 春秋别典卷十二明薛虞畿撰魯定公十四年吳王闔廬聞允常越王名死乃興師伐越越王勾踐使死士挑戰三行至吳陳呼而自刎吳師觀之越因襲擊吳師吳師敗於㰎李射傷吳王闔廬闔廬且死告其子夫差曰必毋忘越三年勾踐聞吳王夫差日夜勒兵且以報越越欲先吳未發往伐之范蠡諌曰不可臣聞兵者凶器也戰者逆德也争者事之末也隂謀逆德好用凶器試身于所末上帝禁之行者不利越王曰吾已决之矣遂興師吳王聞之悉發精兵擊越敗之夫椒越王乃以餘兵五千保棲于㑹稽吳王追而圍之越王謂范蠡曰以不聽子故至于此為之奈何蠡對曰持滿者與天定傾者與人節事者以地卑禮厚幣以遺之不許而身與之市勾踐曰諾乃令大夫種行成於吳十四年吴伐越于㰎李闔閭傷將指越王勾踐恃大明之龜與吳戰而不勝身臣入宦于吳反國棄龜明法親民以報吳則夫差為擒魯監門之女嬰相從績中夜而泣涕其偶曰何為而泣也嬰曰吾聞衛世子不肖所以泣也其偶曰衛世子不肖諸侯之憂也子曷為泣也嬰曰吾聞之異乎子之言也昔有宋之桓司馬得罪於宋君出於魯其馬佚而輾吾園而食吾園之葵是嵗吾聞之園人亡利之半越王勾踐起兵而攻吳諸侯畏其威魯往獻女吾姊與焉兄往視之道畏而死越兵威者吳也兄死者我也由是觀之福與禍相及也今衛世子甚不肖好兵吾男弟三人能無憂乎此條年無據詳越伐吳諸侯畏威而獻女似在勾踐兼吳之後時事也書曰唯髙宗報上甲㣲上甲微契後八世湯之先也定公問曰此何謂也孔子對曰此謂親盡廟毁有功而不及祖有德而不及宗故於每嵗之大甞而報祭焉所以昭其功德也公曰先君僖公功德前行可以與於報乎孔子曰丘聞昔虞夏商周以帝王行此禮者則有矣自此以下未之知也顔淵侍定公于䑓東野畢御馬于䑓下定公曰善哉東野畢之御顔淵曰善則善矣然其馬將失定公不恱以告左右曰吾聞之君子不讒人君子亦讒人乎顔淵不恱歴階而去須㬰馬敗聞矣定公躐席而起曰趨駕請顔淵顔淵至定公曰寡人曰善哉東野畢御也吾子曰善則善矣雖然其馬將失也不識吾子何以知之也顔淵曰臣以政知之昔者舜工於使人造父工於使馬舜不窮於其民造父不盡其馬是以舜無失民造父無失馬今東野畢之御也上車執轡御體正矣周旋歩驟朝禮畢矣厯險至逺而馬力殚矣然求不已是以知其失也定公曰善可少進與顔淵曰獸窮則觸鳥窮則啄人窮則詐自古及今其窮在下能無危者未之有也詩曰執轡如組兩驂如舞御之善也定公曰善哉寡人之過也秦欲伐楚使使者往觀楚之寳器楚王聞之召令尹子西而問焉曰秦欲觀楚之寳器吾和氏之璧隋侯之珠可以示諸令尹子西對曰不知也召昭奚恤而問焉昭奚恤對曰此欲觀吾國得失而圖之不在寳器而在賢臣珠玉玩好之物非寳重者王遂使昭奚恤應昭奚恤發精兵三百人陳於西門之内為東面之壇一為南面之壇四為西面之壇一秦使者至昭奚恤曰君客也請就上位東面令尹子西南面大宗子敖次之葉公子髙次之司馬子反次之昭奚恤自居西面之壇稱曰客欲觀楚國之寳器楚國之所寳者賢臣也理百姓實倉廩使民各得其所令尹子西在此奉珪璧使諸侯解忿悁之難交兩國之懽國無兵革之憂大宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師旅整兵戎以當強敵提枹鼓以動百萬之衆所使皆趨湯火蹈白刄不顧死生之難司馬子反在此懐伯王之餘議攝治亂之遺風昭奚恤在此唯大國之所觀秦使者瞿然無所對昭奚恤遂揖而去秦使者反言于秦君曰楚多賢臣未可謀也遂不伐楚孔子至衞靈公聞而喜郊迎孔子主於子路妻兄顔濁鄒家靈公問孔子居魯得禄幾何對曰奉粟六萬衛人亦致粟六萬靈公謂孔子曰有語寡人為國家者謹之於廟堂之上而國家治矣其可乎孔子曰可愛人者則人愛之惡人者則人惡之知得之己者亦知得之人所謂不出於環堵之室而知天下者反之己者也昭七年衛靈公立至哀二年始薨所輯事當係于昭定之世然事頗多今𩔖係之定公末年衛靈公襜被以與婦人逰子貢見公公曰衛其亡乎對曰昔者夏桀殷紂不任其過故亡成湯文武知任其過故興衛奚其亡也孔子居衛月餘公與夫人同車宦者雍渠参乗出使孔子為次乗招揺市過之於是醜之去衞靈公甞與夫人夜坐聞車聲至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭信節不為㝠㝠墮行蘧伯玉衛之賢大夫也仁而有智敬於事上此其人必不闇昧廢禮是以知之使人視之果蘧伯玉反之以戯夫人曰非也夫人酌觴再拜賀公曰子何以賀寡人夫人曰始妾獨有蘧伯玉耳今衛復有與之齊者是君有二臣也國多賢臣國之福也妾是以賀公曰善哉遂語夫人其實焉靈公使伯玉於楚逄楚公子晳於濮上伯玉為軾車子晳曰吾聞上士託色其次託辭其下託財三者固可得而託耶伯玉曰謹受命既致使昭王因問士伯玉曰楚多士而不能用昭王曰何也伯玉曰子胥生於楚逃之吳吳相之發兵攻楚墮平王之墓是吳善用之坌賁生於楚走之晉其治七十二縣道不拾遺城郭不閉是晉善用之今瑗之来逄子晳於濮上又將行矣於是昭王追子晳而還之衛靈公以天寒鑿池宛春諌曰天寒起役恐傷民公曰天寒乎宛春曰公衣狐裘坐熊席是以不寒今民衣弊不補履决不組君則不寒民則寒矣公曰善令罷役左右諌曰君鑿池不知天之寒也而春知之以春之知之也而令罷役福將歸于春也而怨將歸於君公曰不然春也魯國之匹夫也而我舉之春之善非寡人之善歟魯君聞顔闔得道之人也使人以幣先焉顔闔守陋閭苴布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家歟顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使者還反審之復来求之則不得已故若闔者真惡富貴也仲尼問於太史大弢伯常騫狶韋曰夫衛靈公飲酒湛樂不聴國家之政田獵畢弋不應諸侯之際其所以為靈公者何耶大弢曰是因是也伯常騫曰夫靈公有妻三人同濫而浴史鰌奉御而進所摶幣而扶翼其慢若彼之甚也見賢人若此其肅也是其所以為靈公也狶韋曰夫靈公也死卜塟于故墓不吉卜塟於沙丘而吉掘之數仞得石椁焉洗而視之有銘焉曰不馮其子靈公奪而埋之夫靈公之為靈也久矣之二人何足以識之北宫奢為衛靈公賦斂以為鐘乎郭門之外三月而成上下之縣王子慶忌見而問焉曰子何術之設奢曰一之間無敢設也奢聞之既雕既琢復歸於樸侗乎其無識儻乎其怠疑萃乎芒乎其送往而迎来来者勿禁往者勿止從其強梁隨其曲傅因其自窮故朝夕賦斂而毫毛不挫而况有大塗者乎顔闔將傅衛靈公太子而問於蘧伯玉曰有人於此其德天殺與之為無方則危吾國與之為有方則危吾身其知足以知人之過而不知其所以過若然者吾奈之何蘧伯玉曰善哉問乎戒之慎之正汝身哉形莫若就心莫若和雖然之二者有患就不欲入和不欲出形就而入且為顛為滅為崩為蹶心和而出且為聲為名為妖為孽彼且為嬰兒亦與之為嬰兒彼且為無町畦亦與之為無町畦彼且為無涯亦與之為無涯達之入於無疵汝不知夫螳螂乎怒其臂以當車轍不知其不勝任也是其材之美者也戒之慎之積伐而美者以犯之幾矣汝不知夫養虎者乎不敢以生物與之為其殺之之怒也不敢以全物與之為其决之之怒也時其飢飽逹其怒心虎之與人異𩔖而媚養已者順也故其殺者逆也夫愛馬者以筐盛矢以蜄盛溺適有蚊虻僕縁而拊之不時則缺衘毁首碎胸意有所至而愛有所忘可不慎邪衛靈公夫人南子使人謂夫子曰四方之君子不辱欲與寡君為兄弟者必見寡小君小君願見夫子辭謝不得已而見之夫人在絺帷中夫子入門北面稽首夫人自帷中再拜環佩玉聲璆然夫子曰吾向何為弗見見禮荅焉孔子適鄭與弟子相失夫子獨立郭東門鄭人或謂子貢曰東門有人其顙似堯其頭𩔖臯陶其肩𩔖子産自腰以下不及禹者三寸纍纍若䘮家之狗子貢以實告孔子欣然嘆曰形狀末也而似䘮家之狗然哉蘧伯玉為相子貢往觀之曰何以治國曰以弗治治之趙簡子欲伐衞使史黯往覿焉還報曰蘧伯玉為相未可以加兵固塞險阻何足以致之靈公問於史鰌曰政孰為務對曰大理為務聽獄不中死者不可復生也斷者不可属也故曰大理為務少焉子路見公以史鰌言告之子路曰司馬為務兩國有難兩軍相敵司馬執枹以行之一鬬不當死者數百以殺人為非也此其為殺人亦衆矣故曰司馬為務少焉子貢入見公以二子之言告之子貢曰不識哉昔禹與有扈戰戰陣而不服禹於是修教一年而有扈氏請服故曰去民之所爭奚獄之可聴兵革之不陳奚鼓之可鳴故曰教為務也靈公晝寢而起志氣益衰使人馳召勇士公孫悁道遭行人卜商卜商曰何馳之疾也對曰公晝寢而起使我召勇士公孫悁子夏曰㣲悁而勇若悁者可乎御者曰可子夏曰載我而反至君曰使子召勇士何為召儒使者曰行人曰㣲悁而勇若悁者可乎臣曰可即載與来君曰諾延先生上趣召公孫悁至入門仗劍疾呼曰商下我存若頭子夏顧咄之曰咄内劍吾將與若言勇於是君令内劍而上子夏曰来吾甞與子從君而西見趙簡子趙簡子披髪仗矛而見我君我從十三行之後趨而進曰諸侯相見不宜不朝服不朝服行人卜商將以頸血濺君之服矣使反朝服而見吾君子耶我耶悁曰子也子夏曰子之勇不若我一矣又與子從君而東至阿遭齊君重鞇而坐吾君單鞇而坐我從十三行之後趨而進曰禮諸侯相見不宜相臨以庶揄其一鞇以去之者子耶我耶悁曰子也子夏曰子之勇不若我二矣又與子從君於囿中於是兩冦肩逐我君㧞矛下格而還子耶吾耶悁曰子也子夏曰子之勇不若我三矣所貴為士者上攝萬乗下不敢敖乎匹夫外立節矜而敵不侵擾内禁殘害而君不危殆是士之所長君子之所致貴也若夫以長掩短以衆暴寡凌轢無罪之民而成威於閭巷之間者是士之甚毒而君子之所致惡也衆之所誅鋤也詩曰人而無儀不死何為夫何以論勇於人主之前哉於是靈公避席抑手曰寡人雖不敏請從先生之勇公叔文子問於史叟曰武子勝事趙簡子久矣其寵不解奚也史叟曰武子勝博聞多能而位賤君親而近之致敏以懸貌而䟽䟽則恭而無怨色入與謀國家出不見其寵君賜之禄知足而辭故能久也孔子適衛衛將軍文子問曰吾聞魯公父氏不能聽獄信乎孔子荅曰不知其不能也夫公父氏之聽獄有罪者懼無罪者恥文子曰有罪者懼是聽之察刑之當也無罪者恥何乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡於此而動於彼轡之良也無轡而用筴則馬失道矣文子曰以御言之左手執轡右手運筴不亦速乎若徒轡無筴馬何懼哉孔子曰吾聞之古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛於禮而薄於刑故民從命今也廢禮而尚刑故民彌暴文子曰吳越之民無禮而亦治何也孔子曰夫吳越之俗男女無别同厠而浴民輕相犯故其刑重而不勝由無禮也中國之教為内外以别男女異器服以殊等𩔖故其民篤而法其刑輕而勝由有禮也衛將軍文子問子貢曰季文子三窮而三通何也子貢曰其窮事賢其通舉窮其富分貧其貴禮賤窮以事賢則不佞通而舉窮則忠於朋友富而分貧則宗族親之貴而禮賤則百姓戴之其得之固道也失之命也曰失而不得者何也曰其窮不事賢其通不舉窮其富不分貧其貴不禮賤其得之命也失之固道也彌子瑕有寵於衛君衛國之法竊駕君車者罪刖彌子母病人聞往夜告彌子彌子矯駕君車以出君聞而賢之曰孝哉為母之故忘其刖罪異日與君逰於果園食桃而甘不盡以其半啗君君曰愛我哉忘其口味以啗寡人及彌子色衰愛弛得罪於君君曰是固嘗矯駕吾車又甞啗我以餘桃靈公時彌子有寵専於衛國侏儒有見公者曰臣之夢踐矣公曰何夢對曰夢見竈為見公也公怒曰吾聞見人主者夢見日奚為見寡人而夢見竈對曰夫日兼燭天下一物不能蔽也人君兼燭一國人一人不能擁也故將見人主者夢見日夫竈一人煬焉則後人無從見矣今或者一人有煬君者乎則臣雖夢見竈不亦可乎靈公將之晉至濮水之上稅車而放馬設舍以宿夜分而聞鼓新音者而説之使人問左右盡報弗聞乃召師㳙而告之曰有鼓新聲者使人問左右盡報弗聞其狀似鬼神子為聴而寫之師㳙曰諾因静坐撫琴而寫之明日報曰臣得之矣而未習也請復一宿習之靈公曰諾因復留宿明日而習之遂去之晉晉平公觴之於夷施之䑓平公昭十年卒靈公昭七年立此相遇或于昭八九年之間酒酣靈公起公曰有新聲願請以示平公曰善乃召師㳙令坐師矌之旁援琴鼓之未終師矌撫止之曰此亡國之聲不可聴也平公曰此道奚出師曠曰此師延之所作與紂為靡靡之樂也及武王伐紂師延東走至於濮水而自投故聞此聲者必於濮水之上先聞此聲者其國必削不可聴平公曰寡人所好者音子其使聴之師㳙鼓䆒之平公問師矌曰此所謂何聲也師矌曰此所謂清商也公曰清商固最悲乎師矌曰不如清徴公曰清徴可得而聞乎師矌曰不可古之聴清徴者皆有德義之君也今君德薄不足以聴公曰寡人之所好者音也願試聴之師矌不得已援琴而鼓一奏之有𤣥鶴二八道南方来集於廊門之垝再奏之而列三奏之延頸而鳴舒翼而舞音中宫商之聲聲聞于天平公大説坐者皆喜平公提觴而起為師矌夀反坐而問曰音莫悲于清徴乎師矌曰不如清角平公曰清角可得而聞乎師矌曰不可昔者黄帝合鬼神於泰山之上駕象車而六蛟龍畢方並轄蚩尤居前風伯進掃雨師洒道虎狼在前鬼神在後螣蛇伏地鳳凰覆上大合鬼神作為清角今主君德薄不足聴之聴之將恐有敗平公曰寡人老矣所好者音也願遂聴之師矌不得已而鼓之一奏之有𤣥雲從西北方起再奏之大風至大雨隨之裂帷幕破爼豆隳廊瓦坐者散走平公恐懼伏乎廊室之間晉地大旱赤地三年平公之身遂瘙病衞叔孫文子問於王孫夏曰君先君之廟小吾欲更之可乎對曰古之君子以儉為禮今之君子以汰易之夫衛國雖貧豈無文履一竒以易十稷之繡哉以爲非禮也文子乃止孔子出衛之東門逆姑布子卿曰二三子引車避有人將来必相我者也志之姑布子卿亦曰二三子引車避有聖人將来孔子下歩姑布子卿迎而觀之五十歩從而望之五十歩顧子貢曰是何為者也子貢曰賜之師也所謂魯孔丘也姑布子卿曰是魯孔丘歟吾固聞之子貢曰賜之師何如姑布子卿曰得堯之顙舜之目禹之頸臯陶之喙從前視之盎盎乎似有土者從後視之髙肩弱脊此唯不及四聖者也子貢吁然姑布子卿曰子何患焉汗面而不惡葭喙而不藉逺而望之羸乎若䘮家之狗乎何患焉何患焉子貢以告孔子孔子無所辭獨辭䘮家之狗耳曰丘何敢乎子貢曰汗面而不惡葭喙而不藉賜己知之矣不知䘮家之狗何足辭也孔子曰賜汝獨不見乎䘮家之狗歟既歛而椁布器而祭顧望無人意欲施之上無賢王下無賢士方伯王道衰政教失強凌弱衆暴寡百姓縱心莫之綱紀是人固以丘為欲當之者也丘何敢乎孔子之宋過匡簡子將殺陽虎孔子似之甲士以圍孔子之舍子路怒奮戟將與鬬孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不修丘之過也若似陽虎則非丘之罪也命也夫由歌予和汝子路歌孔子和之三終而匡人解甲而罷孔子行聞哭聲甚悲孔子曰驅之前有賢者至則臯魚也被褐擁鐮哭於道傍孔子辟車與之言曰子非有䘮何哭之悲也臯魚曰吾失之三矣少而學逰諸侯以後吾親失之一也髙尚吾志間吾事君失之二也與友厚而少絶之失之三也樹欲静而風不止子欲養而親不待也往而不可得見者親也吾從此辭矣立槁而死孔子曰弟子誡之足以識矣於是門人辭歸而養親者十有三人子路曰有人於斯夙興夜寐手足胼胝而面目黧黒樹蓺五榖以事其親而無孝子之名者何也孔子曰吾意者身未敬邪色不順邪辭不遜邪古人有言曰衣歟食歟曽不爾即子勞以事其親無此三者何為無孝之名意者所友非仁人邪坐語汝雖有國士之力不能自舉其身非無力也勢不便也是以君子入則篤孝出則友賢何為其無孝子之名周使伯騫問道夫子曰剛者必折勁者數傷倨者不親利者不弊此四者君子之所戒也夫子觀於明堂覩四門墉有堯舜桀紂之象又有周公抱成王負斧扆朝諸侯之圖謂從者曰夫明鏡所以察形往古所以知今夫子入稷廟有金人三緘其口而銘其背曰古之慎言人也誡之哉無多言多言多敗無多事多事多患安樂必誡無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人熖熖不滅炎炎若何㳙㳙不壅終為江河綿綿不絶或成網羅毫末不札將尋斧柯誠能慎言福之根也曰是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可尚也故下之知衆人之不可先也故後之温恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不徙内藏我智不示人技我雖尊髙人弗我害誰能於此江海雖左長於百川以其卑也天道無親而能下人誡之哉顧謂弟子曰小子識之哉此言實而中情而信魯有儉者瓦甂煮食食之而美盛之土鉶之器以進孔子也受之歡然而悦如受太牢之饋弟子曰瓦甂陋器也煮食薄膳也而先生何喜於此乎孔子曰吾聞好諌者思其君食美者念其親吾非以饌為厚也以其食美而思我親也孔子至齊郭門之外遇一嬰兒挈一壺相與俱行其視精其心正其行端孔子謂御曰趣驅之趣驅之韶樂方作孔子至彼聞韶三月不知肉味故樂非獨以自樂也又以樂人非獨以自正也又以正人美哉於此樂者不圖為樂之至於此子圉見孔子於商太宰孔子出子圉入請問客太宰曰吾已見孔子則視子猶蚤虱之油者也吾今見之於君子圉恐孔子貴於君也因謂太宰曰君已見孔子孔子亦將視子猶蚤虱也太宰弗復見南宫敬叔言於魯君曰請與孔子適周魯君與之一乗車兩馬一竪子俱適周見老聃而問禮焉老聃曰子所言其人與骨皆已朽矣獨其言在耳且君子得時則駕不得時則蓬累而行吾聞之良賈深藏若虚君子盛德容貌若愚去子之驕氣與多慾態色與淫志皆無益於子之身吾之所告子者若此而已既辭去老子送之曰吾聞富貴者送人以財仁者送人以言吾不能富貴竊仁人之號送子以言曰聪明深察而近於死者好議人者也博辨廣大而危其身者好發人之惡者也為人子者無以有己為人臣者無以私己夫子乃自周反於魯孔子觀桓公之廟有器焉謂之宥巵孔子曰善哉乎得見此器顧曰弟子取水水至灌之其中則正其盈則覆孔子造然革容曰善哉持盈者乎子貢在側曰請問持盈曰揖而損之曰何謂揖而損之曰夫物盛而衰樂極則悲日中而移月盈而虧是故聰明睿智守之以愚多聞博辨守之以儉武力毅勇守之以畏富貴廣大守之以陋德施天下守之以讓此五者先王所以守天下而弗失也反此五者未甞不亡也楚人有証其父攘羊者國人皆直之聞於楚王楚王召而賞之辭不受國人復稱其行善而不受賞也仲尼聞之曰一事而再取名焉君子不為也吳王伐石以治宫室而於合室之中得紫文金簡之書不能讀之使使者持以問仲尼而欺仲尼曰吳王閒居有赤雀銜書以置殿上不知其義逺諮呈仲尼以視之曰此乃靈寳之方長生之法禹之所服隠在水邦年齊天地朝乎𬗋庭者也禹將仙化封之名山石函之中乃今赤雀啣之殆天授也齊王疾痏之宋迎文摯文摯視王之疾謂太子曰非怒王則疾不可治怒王則摯必死太子頓首彊請曰茍已王之疾臣與臣之母以死争之文摯曰諾與太子期而將往不當者三王固已怒矣摯至不解屨登牀履王衣問王疾王怒而不與言因出舞以重怒王王叱而起疾遂已王大怒生烹死之太子與王后急争不能得夫忠於治世易忠於濁世難文摯非不知活王之疾而身獲死也為太子行難以成其義也蔡使師强王堅使於楚楚王聞之曰人名多章章者獨為師强王堅乎趣見之無以次視其人狀疑其名而醜其聲又惡其形楚王大怒曰今蔡無人乎國可伐也有人不遣乎國可伐也端以此人試寡人乎國可伐也故發二使見三謀伐者蔡也下蔡威公閉門而哭三日三夜泣盡而繼以血旁隣窺墻而問之曰子何故而哭悲若此乎對曰吾國且亡曰何以知之應之曰吾聞之病之將死也不可為良醫國之將亡也不可為計謀吾數諌吾君吾君不用是以知國之將亡也於是窺墻者聞其言舉宗而去之于楚居數年楚王果舉兵而伐蔡窺牆者為司馬將軍而往来虜甚衆問曰得無以昆弟故人乎見威公縳在虜中問曰何以至於此應曰吾何以不至於此且吾聞之也言之者行之役也行之者言之主也汝能行我能言汝為主我為役亦何以不至於此哉窺牆者乃言之於楚王解其縳而俱之楚春秋别典卷十二
