  text: 欽定四庫全書史部四
  hash: sha256:607f6fc3903a942f795e30a3f03095836467f0a196c1fe41ce827ec4c38e184a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0015_WYG_000-1a, image: WYG0386/WYG0386-0589a.png}
body:
  text: 春秋别典别史類提要臣等謹按春秋别典十五卷明薛虞畿撰前有虞畿自序不署年月稱嘗閲注牒見春秋君臣往迹不下千事散著百家皆三氏所未録間或微掇其端而未究其緒存其半而不採其全因不自度略仿左例分十二公以統其世稽三𫝊人名以繫其事凡十五卷末又其弟虞賓跋稱先仲氏輯春秋别典未脫稿而不幸下世不無掛甲漏乙年代倒置之病故特廣閲博搜參互考訂世懸者更數殊者析刪其繁復者十一苴其闕略者十三云云則此書乃虞畿兄弟二人相續而成也舊無刋板此本為朱彛尊家所藏有康熙辛巳十月彛尊題字惜其抄撮具有苦心惟各條之末不疏明出何書明人之習大都若是所譏誠中其病然網羅繁富頗足以廣見聞要亦博洽之一助也虞畿序自署曰粵瀛彞尊跋稱其字里通志不載莫得其詳虞賓跋中稱其仲字列章縫治博士家言蓋廣東諸生也考胡恂潮州府志曰薛虞畿字舜祥海陽人初為諸生後棄去隱韓山之麓以農圃自娛郡長吏欲致之鑿垣而遁著有聽雨蓬稿云云當即其人又考潮州在梁為東陽州後改曰瀛州與粵瀛之稱亦合惟志不言其有此書疑偶未見耳虞畿序又稱書目凡例列在左方令卷首有凡例七條而無書目則傳寫者佚之矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋别典叙昔仲尼作經口授弟子左丘明懼其妄意失真乃推論本事作內傳復採諸國名物作外傳蓋侈哉博乎其紀事也已觀周篇嘗載孔子將作春秋與丘明乘如周觀書於周史歸而作經丘明作傳若是乎其於二百四十年之蹟蓋目覩而備言之也惡有所謂别典哉今考其書或先經而始或後經而終辨理者依合異者錯皆彬彬乎條分臚布井猶伍兩焉公穀後出談經不覩史記耳而傳之堇堇什一二耳然舊史遺文無關聖筆左氏捐而不録者郵衆劉知幾亦謂丘明紀載當世得十之四豈非深慨乎記事之未周歟不佞嘗閲往牒見春秋君臣􅉨跡醇雅奇邪不下千事散著百家皆三氏所弗録間或微掇其端而未究其緒存其半而不掇其全見輒觖之因不自度略倣左例分十二公以統其世稽三傳人以繫其事年不盡考而附諸人人不盡知而援諸事參稽互證務極恢閎幽章纎巨兼收咸紀蓋庶幾哉疑於舊史遺文之猶在焉嘗僭自謂言略成乎一家功可禆於三氏題之曰春秋别典殊三傳也荀悅有言曰立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勛五曰表賢能嗚呼典無當於五志奚取於典也哉或者曰拾金者汰沙掇珠者捐蚌三氏有作皆鏐銑也夜光也子何用矻矻沙蚌是營哉且也無關於聖經何必春秋耶不佞謂不然匠石不遺輪囷醫師不棄溲勃為取用者衆也且相梨可以充品吹竹可以間聲前鋒後距兵之所以萬全也左驗置對獄之所以平反也春秋既曰刑書何厭乎具兩造哉比事屬辭豈盡無取爾耶況鏡古可以觀今也軌前可以循後也準得可以形失也典皆有焉凡十五卷書目凡例列在左方粵瀛後學薛虞畿識輯春秋别典凡例凡輯事盡春秋匪春秋之年事無輯也起隱盡哀一如左氏間詳晉大曲沃趙保晉陽雖逾二百四十年之外為晉主夏盟宜詳始卒從左例也凡輯曰别典匪别弗提左氏內外公穀檀弓既列於經家傳户誦無用取焉諸子百氏希於聞見搜羅殆備義取翼傳不妨僻左也凡輯主分年年據三傳或人可年繫則隨年引經或傳有其人則因人繫事馬史世家不無同異用列分注以資考索凡霸盛桓文烈稱管晏自非孔氏誰不道之二氏有述桓景獨備若槩録著斯亦繁矣略加銘黃唯存馴雅凡事取實録不列寓言鄭圃濠梁僅存可據耳凡史載事輯史例也標僅及事言因事見專言弗録也凡輯萃百家事多錯見此詳彼略甲工乙拙要在參提事必不遺文資簡要
