body:
  text: 春秋别典卷十五明薛虞畿撰魯哀公十五年起芈尹文者楚之毆鹿彘者也司馬子期獵于雲夢載旗之長于地芊尹文㧞劍齊諸軫而斷之貳車抽弓於韔援矢於筩引而未發也司馬子期伏軾而問曰吾有罪于夫子乎對曰臣以君旗拽地故也國君之旗齊于軫大夫之旗齊于軾今子楚國有名大夫而滅三等文之斷也不亦可乎子期悦載之王所王曰吾聞有斷子之旗者其人安在吾將殺之子期以文之言告王王恱使文為江南令而大治白公問孔子曰人可與㣲言乎孔子不應白公問曰若以石投水何如孔子曰吳之善没者能取之曰若以水投水何如孔子曰渑淄之合易牙甞而知之白公曰人固不可以㣲言乎孔子曰何為不可唯知言之謂者乎夫知言之謂者不可以言言也争魚者濡逐獸者趨非樂之也故至言去言至為無為夫淺知之所争者末矣白公不得已遂死于浴室楚太子建以費無極之譛見逐建有子曰勝在外子西召勝使治白號曰白公勝怨楚逐其父將弑恵王及子西欲得易甲人姓名陳士勒兵以示易甲曰與我無患不富貴不與我則此是也易甲笑曰甞言吾義矣吾子忌之乎立得天下不義吾不取也威吾以兵不義吾不從也今子將弑子之君而使吾從子非吾義也子雖告我以利威我以兵吾不忍為也子行子之威則吾亦得明吾義也逆子以兵争也應子以聲鄙也吾聞士立義不争行死不鄙拱而待兵顔色不變也白公之難楚人有莊善者辭其母將往死之其母曰棄親而死其君者義乎莊善曰吾聞事君者内其禄而外其身今所以養母者君之禄也身安得無死乎遂辭而行比至公門三廢車中其僕曰子懼矣曰懼既懼何不返善曰懼者吾私也死義吾公也聞君子不以私害公及公門刎頸而死君子曰好義乎哉白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫之以刄王子閭曰王孫輔相楚國匡正王室而後自庇焉閭之願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公勝曰楚國之重天下無有天以與子何不受也王子閭曰吾聞辭天下者非輕其利也以明其德也不為諸侯者非惡其位也以潔其行也今吾見國而忘主不仁也劫白刃而失義不勇也子雖告我以利威我以兵吾不為也白公強之不可遂殺之葉公子髙率衆誅白公而反恵王於國白公勝將弑楚恵王恵王出令尹司馬皆死㧞劍属之於屈廬曰子與我將舍子子不與我必殺子廬曰子殺叔父而求福於廬也可乎吾聞多命之士見利不動臨死不恐為人臣也時生則生時死則死是謂人臣之禮故上知天命下知臣道其有可刼乎子胡不推之白公勝乃内其劍趙襄子謂仲尼曰先生委質以見人主七十君矣而無所通不識世無明君乎意先生之道固不通乎仲尼不對異日襄子見子路曰甞問先生以道先生不對知而不對則隠也隠則安得為仁若信不知安得為聖子路曰建天下之鳴鐘而撞之以挺豈能發其聲乎君問先生無乃猶以挺撞鐘乎趙襄子攻翟勝老人中人使者来謁之襄子方食有憂色左右曰一朝而兩城下人之所喜也今君有憂色何襄子曰江河之大也不過三日飄風暴雨日中不須臾今趙氏之德行無所于積一旦而兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以為昌也而喜所以為亡也勝非其難者也持之其難者也唯有道之主能持勝石乞侍坐于屈建屈建曰白公其為亂乎石乞曰是何言也白公至于室無營所下士者三人與已相若臣者五人所與同衣食者千人白公之行若此何故為亂屈建曰此建之所謂亂也以君子行則可于國家行過禮則國家疑之且茍不難下其臣必不難髙其君矣建以是知夫子將為亂也處十月白公果為亂白公勝慮亂罷朝而立倒杖䇿錣上貫顊血流至地而不知也鄭人聞之曰顊之忘將何不忘哉齊人有子蘭子者事白公勝勝將為難乃告子蘭子曰吾將舉大事于國願與子共之子蘭子曰我事子而與子殺君是助子之不義也畏患而去子是遁子於難也故不與子殺君以成吾義契領于庭以遂吾行楚有申鳴者在家而養其父孝聞于楚國王欲授之相申鳴辭不受其父曰王欲相汝汝何為不受乎申鳴對曰舍父之孝子而為王之忠臣何也其父曰使有禄于國立義于庭汝樂吾無憂矣吾欲汝之相也申鳴曰諾遂入朝楚王因授之相居三年白公為亂殺司馬子期申鳴將往死之父止之曰棄父而死其可乎申鳴曰聞夫仕者身歸于君而禄歸於親今既去父事君得無死其難乎遂辭而往因以兵圍之白公謂石乞曰申鳴者天下之勇士也今以兵圍我吾為之奈何石乞曰申鳴者天下孝子也往劫其父以兵申鳴聞之必来因與之語白公曰善則往取其父持之以兵告申鳴曰子與吾與子分楚國子不與吾則子父死矣申鳴流涕而應之曰始吾父之孝子今吾君之忠臣也吾聞之也食其食者死其事受其禄者畢其能今吾已不得為父之孝子矣乃君之忠臣也吾何得以全身援枹鼓之遂殺白公其父亦死王賞之金百斤申鳴曰食君之食避君之難非忠臣也定君之國殺臣之父非孝子也名不可兩得行不可兩全也如此而生何面目立於天下遂自殺也葉公諸梁問樂王鮒曰晉大夫趙文子為人何若對曰好學而受規諌葉公曰疑未盡之矣對曰好學智也受規諌仁也江出汶上其源若甕口至楚國其廣千里無他故其下流多也人而好學受規諌宜哉其立也詩云其維哲人告之話言順德之行此之謂也子羔為衛政刖人之足衛之君臣亂子羔走郭門閉刖者守門曰於彼有缺子羔曰君子不踰曰於彼有竇子羔曰君子不隧曰於此有室子羔入追者罷子羔將去謂刖者曰吾不能虧損主之法令而親刖子之足吾在難中此乃子之報怨時也何故逃我刖者曰斷足固我之罪也無可奈何君之治臣也側傾法令先人後臣欲臣之免于法也臣知之獄决罪定臨當論刑君愀然不樂見于顔色臣又知之君豈私臣哉天生仁人之心其固然也此固臣所以脱君也孔子聞之曰善為吏者樹德不善為吏者樹怨公以行之其子羔之謂乎按左傳衛輙出奔在襄十六年子路死子羔出季康子謂子游曰仁者愛人乎子㳺曰然人亦愛之乎子㳺曰然康子曰鄭子産死鄭人丈夫舍珮玦婦人舍珠珥夫婦巷哭三月不聞竽瑟之聲仲尼之死在十六年吾不聞魯國之愛夫子何也子㳺曰譬子産之與夫子其猶浸水之與天雨乎浸水所及則生不及則死斯民之生也必以時雨既以生莫愛其賜故曰譬子産之與夫子猶浸水之與天雨也按左哀十六年孔子卒宋景公時熒惑在心懼召子韋而問曰熒惑在心何也子韋曰熒惑天罰也心宋分野也禍當君身雖然可移於相公曰相所使治國也而移死焉不祥寡人當自請也子韋曰可移于民公曰民死將誰君乎寧獨死耳子韋曰可移于嵗公曰嵗饑民餓必死為人君欲殺其民以自活其誰以我為君乎是寡人之命固盡矣子無復言矣子韋還走北面再拜曰臣敢賀君天之處髙而聽卑君有仁人之言三天必三賞君今夕星必徙舍君延夀二十一嵗公曰子何知之對曰君有三善故三賞星必三舍行七星之當一年三七二十一故曰延二十一年臣請伏於陛下以司之星不徙臣請死之公曰可是夕也星三徙舍如子韋言史記年表宋熒惑守心在十五年楚太宰子朱侍飯於令尹子國子國啜羮而熱投巵漿而沃之明日太宰子朱辭官而歸其僕曰楚太宰未易得也辭官去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百子國白公亂後十七年見傳子西子越王問於大夫文種曰吾欲伐吳可乎對曰可矣吾賞厚而信罰嚴而必君欲知之何不試焚宫室於是遂焚宫室人莫之救乃下令曰人之救火死者比死敵之賞救火而不死者比勝敵之賞不救火者比降北之罪人塗其體被濡衣而赴火者左三千人右三千人此知必勝之勢也按𫝊哀十七年越伐吳敗之越王慮伐吳欲人之輕死也出見怒鼃乃為之式從者曰奚敬於此王曰為其有氣故也明年之戰以頭獻王者幾十餘人石益謂孫伯曰吳將亡矣子亦知之乎孫伯曰晚矣子之知之也吾何為不知石益曰然則子何以不諌孫伯曰昔桀罪諌者紂焚聖人剖王子比干之心袁氏之婦絡而失其紀其妾告之怒棄之夫亡者豈欲人知其過哉越王勾踐好勇教其士臣三年以其知為未足以知之焚舟失火鼓而進之其士驅前列伏水火而死有不可勝數也當此之時不鼓而進也越伐吳乃先宣言曰我聞吳王築如皇之䑓掘深池罷苦百姓煎靡財貨以盡民力余為民誅之曾從子善相劍者也衛君怨吳王曾從子曰吳王好劍臣相劍者也臣請為吳王相劍㧞而示之因為君刺之衛君曰子之為是也非縁義也為利也吳强而富衛弱而貧子必往吾恐子為吳王用之於我也乃逐之隰斯彌見田成子與登䑓四望之面北暢南望隰子家之樹蔽之田成子亦不言隰子歸使人伐之斧離數創隰子止之其相室曰何變之數也隰子曰古者有諺曰知淵中之魚者不祥夫成子將有事事大而我示之知㣲我必危矣不伐樹未有罪也知人之所不言其罪大矣乃不伐也陳成子謂鴟夷子曰何與常也對曰君死吾不死君亡吾不亡陳成子曰然子何以與常對曰未死去死未亡去亡其有何死亡矣從命利君謂之順從命病君謂之諛逆命利君謂之忠逆命病君謂之亂君有過不諌諍將危國殞社稷也有能進言于君用則留之不用則去之謂之諌用之可生不用則死謂之静比和同力率羣下相與彊矯君雖不安不能不聽遂解國之大患除國之大害成於尊君安國謂之輔有君之命任君之事竊君之重以安國之危除主之辱攻伐足以成國之大利謂之弼故諌諍輔弼之人社稷之臣明君之所専禮而闇君以為已賊故明君之所賞闇君之所殺也明君好問闇君好獨明君上賢使能而享其功闇君畏賢妬能而滅其業罰其忠而賞其賊夫是之謂至闇桀紂之所以亡也詩云曾是莫聽大命以傾此之謂也范蠡行逰與齊屠地居奄忽龍變仁義沈浮湯湯慨慨天地同憂鴟夷子事田成子田成子去齊走而之燕鴟夷子負𫝊而從至望邑子皮曰子不聞涸澤之虵乎涸澤虵將徙有小虵謂大虵曰子行而我隨之人以為虵之行者耳必殺子不如相銜負我以行人必以為神君也乃相銜負以越公道而行人皆避之曰神君也今子美而我惡以子為我上客千乗之君以子為我使者萬乗之卿也子不如為我舍人田成子因負𫝊而隨之至逆旅逆旅之君待之甚重因獻酒肉襄子擊殺代王因舉兵平代地而迎其姊趙夫人夫人曰吾受先君之命事代之王今十有餘年矣代無大故而主殘之今代已亡吾將誰歸且吾聞婦人執義無二夫吾豈有二夫哉欲迎我何之以弟慢夫非義也以夫怨弟非仁也吾不敢怨然亦不歸遂呼天而自殺於摩笄之地代人懐之趙簡子病按史記簡子病在晉平公十七年魯悼公之十年召太子曰我死已塟服衰上夏屋之山以望簡子死已塟襄子上夏屋以望代俗襄子曰先君必以此教之歸慮所以取代先善之代君好色以其弟姊妻之所以善代者以萬故襄子謁代君請觴之令舞者置兵羽中具大金斗酒酣反斗擊之舞者孫兵以鬬其妻聞之磨笄自刺故趙氏至今有磨笄反斗之號趙簡子薨而未葬而中牟畔之葬五日襄子興師而攻之圍未匝而城自壊者十丈襄子擊金而退之軍吏諌曰君誅中牟之罪而城自壊者是天助之也君曷為而退之襄子曰吾聞之於叔向曰君子不乗人於危不厄人於險使其治城然後攻之中牟聞其義而請降佛肸以中牟叛設禄邑炊鼎曰與我者受邑不與我者烹中牟之士皆從之城北田基一作田卑亦中牟人獨後至袪衣將入鼎曰義死不避斧鉞之罪義窮不受軒冕之服無義而生不仁而富不如烹佛肸脱履而生之趙氏屠中牟得而取之論有功者田基為始田基曰不可一人舉而萬夫俛首智者不為也賞一人以慙萬夫義者不取也我受賞則中牟之士終自慙矣以行臨人不道吾去矣襁負其母南徙于楚楚王髙其義待以司馬佛肸叛疑在十七年之前孔子未卒故論語記之勾踐已平吳𫝊二十二年吳亡乃以江北渡淮與齊晉諸侯㑹於徐州致貢於周周元王使人賜勾踐胙命為伯勾踐已去渡淮南以淮上地與楚歸吳所侵宋地于宋與魯泗水東方百里當是時越兵横行於江淮東諸侯畢賀號稱霸王越已勝吳又索卒於楚而攻晉左史倚相謂楚王曰夫越破吳豪士死鋭卒盡大甲傷今又索卒以攻晉示我不病也不如起師與分吳楚王曰善因起師而從越越王怒將擊之大夫種曰不可吾豪士盡大甲傷我與戰必不克不如賂之乃賂露山之隂五百里以貽之越破吳請師于楚以伐晉楚王與大夫皆懼將許之左史倚相曰此恐吾攻已故示我不病請為長轂千乗卒三萬與分吳地王聽之遂取東國越王勾踐使㢘稽獻民于楚王楚王使者曰越夷狄之國也臣請欺其使者楚王曰越王賢人也其使者亦賢子其慎之使者出見㢘稽曰冠則得以俗見不冠不得見㢘稽曰夫越亦周之列封也不得處于大國而處江海之波與魭鱣魚鼈為伍文身剪髪而後處焉今来至上國必曰冠得俗見不冠不得見如此則上國使適越亦將劓墨文身剪髪而後得以俗見可乎楚王聞之披衣出謝晉智伯伐鄭齊田恒救之有詧盖必身立焉車徒有不進者必令助之壘合而後敢處井竈成而後敢食智伯曰吾聞田恒新得國而愛其民内同其財外同其勤勞治軍如此其得衆也不可待也乃去之耳哀二十七年見𫝊智伯欲襲衛故遺之乗馬先之一璧衛君大恱酌酒諸大夫皆喜南文子獨不喜有憂色衛君曰大國禮寡人寡人故酌諸大夫酒諸大夫皆喜而子獨不喜有憂色者何也南文子曰無方之禮無功之賞禍之先也我未有往彼有以来是以憂也於是衛君乃修津梁而擬邊城智伯聞衛兵在境上乃止吳赤市使於智伯氏假道於衛甯文子具紵絺三百襲將以送之大夫豹曰吳雖大國也不壤交逰之道則亦敬矣又何禮焉甯文子不聴遂致之吳赤市至於智氏既得事將歸吳智伯命造舟為梁吳赤市曰吾聞之天子濟于水造舟為梁諸侯維舟大夫方舟方舟臣之職也且敬太甚必有故使人視之則用兵在後矣將以襲衛吳赤市曰衛假吾道而厚贈我我見難而不告是與為謀也稱疾而留使人告衛人警滅智伯聞之乃止智伯囂之時有士曰長兒子魚絶智伯而去之三年將東之越而道聞智伯囂之見殺也謂御者曰還車返吾將死之御者曰夫子絶智伯而去之三年矣今返死之是絶属無别也長兒子魚曰不然吾聞仁者無餘愛忠臣無餘禄吾聞智伯之死而動吾心餘禄之加於我者至今尚存吾將往依反而死趙襄子問於王子淮曰吳之所以亡者何也對曰吳君吝而不忍襄子曰宜哉吳之亡也吝則不能賞賢不忍則不能罰姦賢者不賞有罪不能罰不亡何待魯人攻鄪曽子辭於鄪君曰請出冦罷而後復来請姑母使狗豕入吾舍鄪君曰寡人之於先生也人無不聞今魯人攻我而先生去我我胡守先生之舍魯人果攻鄪而數之罪十而曽子之所争者九魯師罷鄪君復修曽子之舍而後迎之卞莊子魯卞邑大夫也性好勇甞刺虎管豎子止之曰兩虎方食牛牛甘必争鬭則大者傷小者亡從傷而刺之一舉必有兩獲莊子然之果獲二虎齊人欲伐魯忌卞莊子不敢過卞莊子善事母母無恙時三戰而三北交逰笑之國君辱之莊子受命顔色不變及母死三年魯興師莊子請從見於魯將軍曰初與母處是以三北吾甚辱焉今母没矣請塞責遂赴敵獲一甲首而獻之曰此塞一北又入獲一甲首而獻之曰此塞再北又入獲一甲首而獻之曰此塞三北將軍止之請為兄弟莊子曰三北以養母是子道也今士節小具而塞責矣吾聞之士節不以辱生遂反敵數十人而死君子曰三北而塞責滅世斷家於孝不終也趙襄子飲酒五日五夜不廢酒謂侍者曰我誠邦士也夫飲酒五日五夜矣而殊不病優莫曰君勉之不及紂二日耳紂七日七夜今君五日襄子懼謂優莫曰然則吾亡乎優莫曰不亡襄子曰不及紂二日耳不亡奚待優莫曰桀紂之亡也遇湯武今天下盡桀也而君紂也桀紂並世焉能亡然亦殆矣春秋别典卷十五
