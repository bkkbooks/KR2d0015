body:
  text: 春秋别典卷九明薛虞畿撰魯昭公元年庚申在位三十二年周景王四年宰我聘於齊而反見夫子曰梁丘據遇虺毒三旬而後瘳朝齊君齊君㑹大夫衆賔而慶焉弟子與在賔列大夫衆賔並復獻攻療之方弟子謂之曰夫所以獻方將為病也今梁丘已療矣而諸夫子乃復獻方方將奚施意欲梁丘大夫復有虺害當用之乎衆坐黙然無辭弟子此言何如夫子曰汝説非也夫三折肱為良醫梁丘子遇虺毒而獲療猶有與之同疾者必問所以已之之方焉衆人為此故各言其方欲售之以己人之疾也凡言其方稱其良也且以叅據所以已之之方優劣曾子從孔子之齊景公以下卿禮聘曾子曾子固辭將行晏子送之曰吾聞君子贈人以財不若以言今夫蘭本三年湛之以鹿醢既成則易以匹馬非蘭美也願子詳所以湛既得所湛亦求所湛吾聞君子居必擇處逰必擇士居必擇處所以求士也逰必擇士所以脩道也吾聞反常移性者欲也不可不慎也孔子見齊景公景公致廩丘以為養孔子辭不受出謂弟子曰吾聞君子當功以受禄今説景公景公未之行而賜我廩丘其不知丘亦甚矣遂辭而行魯昭公有慈母而愛之死為之練冠故有慈母之服孟獻伯拜上卿叔向往賀門有御馬不食禾向曰子無二馬二輿何也獻伯曰吾觀國人尚有饑色是以不秣馬班白者多以徒行故不二輿向曰吾始賀子之拜卿今賀子之儉也叔向出語苖賁皇曰助吾賀獻伯之儉也苖子曰何賀焉夫爵禄旂章所以異功伐别賢不肖也故晉國之法上大夫二輿二乗中大夫二輿一乗下大夫専乗此明等級也自大卿必有軍事是故循車馬比卒乗以偹戎事有難則以偹不虞平夷則以給朝事今亂晉國之政乏不虞之偹以成節儉以潔私名獻伯之儉也可與又何賀楚靈王為申之命四年事執齊慶封宋太子後至執而囚之狎徐君拘齊慶封中射士諌曰合諸侯不可無禮此亡之機也昔者桀為有戎之㑹而有緍叛之紂為黎丘之蒐而戎狄叛之由無禮也君其圖之君不聼遂行其意居未期年靈王南逰羣臣從而刼之靈王饑而死乾谿之上孔子聞師襄善琴適晉學之十日不進師㐮子曰可以益矣子曰丘已習其曲矣未得其数也有間曰已習其数可以益矣曰丘未得其志也有間曰已習其志可以益矣子曰丘未得其為人也有間曰有所穆然深思焉有所怡然髙望而逺志焉曰丘得其為人黯然而黒頎然而長眼如望洋如王四國非文王其孰能為此也師襄子避席再拜曰師盖言文王操也訪樂于萇𢎞萇𢎞謂劉文公曰吾觀仲尼有聖人之表河目而龍顙黄帝之形貌也脩肱而龜背長九尺六寸成湯之形體也言必稱先王躬履謙讓洽聞強記博物不窮其聖人之興乎劉子曰方今周室衰㣲而諸侯力争孔丘布衣聖將安施萇𢎞曰堯舜文武之道或弛而墜禮樂崩䘮亦正其統紀而已既而孔子聞之曰吾豈敢哉亦好禮樂者也十八年陳哀公娶鄭長姬生悼太子師少姬生偃二嬖妾長妾生留少妾生勝留有寵哀公哀公属之其弟司徒招哀公病三月招殺悼太子立留為太子哀公怒欲誅招招發兵圍守哀公哀公自經殺招卒立留為陳君四月使使赴楚楚靈王聞陳亂乃殺陳使者使公子棄疾發兵伐陳陳留奔鄭九月楚圍陳十一月滅陳八年事同𫝊使棄疾為陳公招之殺悼太子也太子之子名吳出奔晉晉平公問大史趙曰陳遂亡乎對曰陳顓頊之族陳氏得政于齊乃卒亡自幕至于瞽瞍無違命舜重之以明德至于遂世世守之及胡公周賜之陳使祀虞帝且盛德之後必百世祀虞之世未也其在齊乎魯築郎囿九年事季平子欲速成叔孫昭子曰安用其成速也以虐其民其可乎無囿尚可惡聞嬉戯之逰罷其可治之民乎見𫝊楚靈王乗舟將欲入鄢右尹度王不用其計懼俱死亦去王亡靈王於楚獨徬徨山中野人莫敢入王王行遇其故鋗人謂曰為我求食我已不食三日已鋗人曰新王下法有敢饟王從王者罪及三族且又無所得食王因枕其股而卧鋗人又以土自代逃去王覺而弗見遂饑不能起十三年楚公子棄疾掩殺靈王而奪之位楚平王初即位欲和諸侯乃求故陳悼太子師之子立為陳侯是為恵公恵公立探續哀公卒時年為元空籍五嵗矣七年陳火十五年吳王僚使公子光伐陳取胡沈而去晏子病將死斷楹内書焉謂其妻曰楹也語子壮而視之及壯發書書之曰布帛不窮窮不可飾牛馬不窮窮不可服士不可窮窮不可任窮乎窮乎窮也晏子卒在定九年孔子之郯遭程子於塗傾盖而語終日有間顧子路曰取束帛一以贈先生子路不對有間又顧曰取束帛一以贈先生子路屑然對曰由聞之也士不中而見女無媒而嫁君子不取也孔子曰詩不云乎野有蔓草零露漙兮有羙一人清揚婉兮邂逅相遇適我願兮今程子乃天下之賢士也於是不贈終身不見大徳毋踰閑小德出入可也燕有左伯桃羊角哀者二人相友善也聞楚平王好士同入楚值雨雪山道阻絶糧罄桃度不能俱生併衣食與哀哀辭之桃曰子不我受同我於死無名可痛哉於是哀受之桃餓死空樹中哀至楚為上大夫乃言於平王備禮以塟桃塟畢哀自殺許悼公疾瘧飲藥毒而死十九年事太子止自責不甞藥不立其位與其弟専哭泣啜餰粥嗌不容粒痛已之不甞藥未逾年而死故春秋義之費無忌一作無極復於楚平王曰晉之所以覇者近諸夏也而楚之所以不能與之争者以其僻逺也楚王若欲從諸侯不若大城城父而令太子建守焉以通北方王自收其南是得天下也楚王恱之因命太子建守城父命伍子奢傅之居一年伍子奢逰人於王側言太子甚仁且勇能得民心王以告費無忌無忌曰固聞之太子内撫百姓外約諸侯齊晉又輔之將以害楚其事已搆矣王曰為我太子又尚何求曰以秦女之事怨王王因殺太子建而誅伍子奢十九年無忌譛太子建見左氏二十年譛殺伍子奢胥奔楚平王有臣曰伍子胥王殺其父而無罪奔亡而之吳王曰父死而不死則非父子也死而無補則過計也與吾死而不一明不若舉天地以成名於是紆身而廼適闔廬治味以求親闔廬甚使任之説其謀果其舉反其徳用而任吳國之政也民保命而不失嵗時熟而不㓙五官公而不私上下調而無尤天下服而在御四境静而無虞然後忿心發怒出㓙言隂必死提兵以伐楚五戰而五勝伏尸数十萬入郢城之門執髙兵傷五臟之實毁十龍之鍾撻平王之墓昭王失國而奔妻生虜而入吳伍貟亡楚急求之登太行而望鄭曰其主俗主也不足與舉去鄭而之許問所之許公東南面而唾貟再拜曰知所之矣因如吳至江上見一丈人刺一小船將漁從而請焉丈人渡之絶江問其姓族不告解千金之劍與之不受曰楚令得伍貟者禄萬擔金千鎰昔子胥過吾猶不取我何以子之千金劍為乎貟過吳使人求之不得也每食必祭曰江上之丈人天地至大矣至衆矣將奚不為也而無以為名矣名不可得而聞身不可得而見唯江上之丈人乎楚遣使追捕子胥胥乃貫弓執矢去楚楚追之見其妻曰胥亡矣去三百里使者追及無人之野乃張弓布矢欲害使者使者俯伏而走胥曰報汝平王欲國不滅釋吾父若不爾者楚為墟矣使返報平王王聞之即發大軍追子胥至江失其所在不獲而返子胥行至大江行哭林澤之中伍貟與勝奔吳到關關吏欲執之伍貟因詐曰上所以索我美珠也今我已亡矣將去取之關吏因舍之與勝行去追者在後幾不得免至江江中有漁父乗船從下方泝水而上子胥呼之謂曰漁父渡我如是者再漁父欲渡之適㑹旁有人窺之因而歌曰日月昭昭乎浸已馳與子期乎蘆之漪子胥即止蘆之漪漁父又歌曰日已夕兮予心憂悲日已馳兮何不渡為事寖急兮當奈何子胥入船漁父知其意也乃渡之千潯之津子胥既渡漁父乃視之其有饑色乃謂曰子俟我此樹下為子取餉漁父去後子胥疑之乃潜身於深葦之中有頃漁父来持麥飯抱魚羮盎漿求之樹下不見因歌而呼曰蘆中人蘆中人豈非窮士乎如是至再子胥乃出蘆中而應漁父曰吾見子有饑色為子取餉子何嫌哉子胥曰性命属天今属丈人豈敢有嫌哉二人飲食畢欲去胥乃解百金之劍以與漁者此吾前君之劍中有七星價直百金以此相荅漁父曰吾聞楚之法令得伍貟者賜粟五百石爵執珪豈圖取百金之劍乎遂辭不受謂子胥曰子急去勿留且為楚之所得子胥曰請丈人姓字漁父曰今日凶凶兩賊相逄吾所謂渡楚賊也兩賊相得得形於黙何用姓字為子為蘆中人我為漁丈人富貴莫相忘也子胥曰諾既去誡漁父曰掩子之盎漿無令其露漁父諾子胥行数歩顧視漁人已覆船自沉於江水之中矣子胥黙然遂行至吳疾於中道乞食溧陽㑹女子擊綿於瀨水之上筥中有飯子胥遇之謂曰夫人可得一餐乎女子曰妾與母居三十未嫁飯不可得子胥曰賑窮途少飯亦何罪哉女子知非恒人遂許之發其簞筥飯其盎漿長跽而與之子胥再餐而止女子曰君有逺逝之行何不飽而餐之子胥已餐而去又謂女子曰掩夫人之壺漿無令其露女子歌曰嗟乎妾獨與母居三十年自守貞明不願從適何宜饋飯而與丈夫越虧禮儀妾不忍也子行矣子胥行反顧女子已自投於瀬水矣伍子胥見王子光光惡其貌辭之伍子胥曰此易也願王子居堂上重帷而見其衣若手請説之王子許之子胥説之半光舉帷搏其手而與之坐説畢大説伍子胥以為有吳國者必王子光也退耕于野七年光代王僚為王任子胥六年然後大勝楚於栢舉鞭楚平之墳三百鄉之耕非忘其父之讐也待時也子胥與吳王論兵七薦孫武吳王曰子胥託言進士欲以自納而召孫子問以兵法每陳一篇王不知口之稱善其意大悦問曰兵法寕可以小試耶孫子曰可可以小試於後宫之女王曰諾孫子曰得大王之寵姬二人以為軍隊長各將一隊令三百人皆被甲兠鍪操劍盾而立告以軍法隨皷進退左右廽旋使知其禁乃令曰一皷皆進二皷操進三皷為進形於是宫女皆掩口而笑孫子乃親自操枹擊皷三令五申其笑如故孫子顧視諸女連笑不止孫子大怒兩目忽張聲如駭虎髪上衝冠項旁絶纓顧謂執法曰取鐡鑕孫子曰約束不明申令不從將之罪也既以約束三令五申卒不却行士之過也軍法何如執法曰斬武乃令斬隊長二人即吳王之寵姬也吳王登䑓望見斬二愛姬驅使下之令曰寡人已知將軍用兵矣寡人非此二姬食不甘味宜勿斬之孫子曰臣既已受命為將將法在軍君雖有令臣不受之孫子復撝皷之當左右進退廽旋規矩不敢瞬目二隊寂然無敢顧者於是乃報吳王曰兵已整齊願王觀之惟所欲用使赴水火猶無難矣而可以定天下吳王忽然不悦曰寡人知子善用兵雖可以覇然而無所施也將軍罷兵就舍寡人不願孫子曰王徒好其言而不用其實子胥諌曰臣聞兵者凶事不可空試故為兵者誅伐不行兵道不明今大王處心思士欲興兵戈以誅暴楚以覇天下而威諸侯非孫武之將而誰能渉泗逾淮越千里而戰者乎吳王大悦因鳴皷令軍集而攻楚子胥與要離見吳王吳王曰子何為者要離曰臣國東千里之人臣細小無力迎風則僵負風則伏大王有命臣敢不盡力吳王心非子胥進此人良久黙然不言要離即進曰大王患慶忌乎臣能殺之王曰慶忌之勇世所聞也筋骨果勁萬人莫當走追奔獸手接飛鳥骨騰肉飛樹膝數百里吾甞追之於江駟馬馳不及射之闇接矢不可中今子之力不如也要離曰王有意焉臣能殺之王曰慶忌明智之人歸窮於諸侯不下諸侯之士要離曰臣聞安其妻子之樂不盡事君之義懐室家之愛而不除君之患者非義也臣詐以負罪出奔願王戮臣妻子斷臣右手慶忌必從臣矣王曰諾要離乃詐得罪出奔吳王乃取其妻子焚棄于市要離乃奔諸侯而行怨言以無罪聞於天下遂如衛求見慶忌曰闔廬無道王子所知今戮吾妻子焚之於市無罪見誅吳國之事吾知其情願因王子之勇闔廬可得也何不與我東之於吳慶忌從其謀後三月㨂練士卒遂之吳將渡江於中流要離力㣲坐於上風因風勢以矛鈎其冠順風而刺慶忌慶忌顧而揮之三捽其頭於水中乃加於膝上曰嘻哉天下之勇士也乃敢加刃於我左右欲殺之慶忌止之曰此是天下勇士也豈可一日而殺天下勇士二人哉乃誡左右曰可令還吳以旌其忠於是慶忌死要離渡至江陵愍然不行從者曰君何不行要離曰殺吾妻子以事其君非仁也為新君而殺君之子非義也重其死不貴無義今吾貪生棄行非義也夫人有三惡以立於世吾何面目以視天下之士言訖遂投身於江未絶從者出之要離曰吾寧能不死乎從者勸其勿死以俟爵禄要離乃斷手足伏劍而死東海有勇士曰菑丘訢以勇猛聞於天下遇神淵而飲馬其僕曰飲馬於此者馬必死曰以訢之言飲之其馬果沉菑丘訢去朝服㧞劍而入三日三夜殺三蛟一龍而出雷神從而擊之十日十夜眇其左目要離聞之往見之曰訢在乎曰送有䘮者往見訢於墓曰聞雷神擊子十日十夜眇子左目夫天怨不全日人怨不旋踵至今弗報何也叱而去墓上振憤者不可勝数要離謂門人曰菑丘訢天下之勇士也今日我辱之人中是其必来攻我暮無閉門寢無閉户菑丘訢果夜来㧞劍住要離頸曰子有死罪三辱我以人中死罪一也暮不閉門死罪二也寢不閉户死罪三也要離曰子待我一言来謁不肖一也㧞劍不刺不肖二也刄先辭後不肖三也能殺我者是毒藥之死耳菑丘訢引劍而去曰譆所不若者天下惟子耳𫝊曰公子目夷以辭得國今要離以辭得身言不可不習猶若是乎中行穆伯攻皷十五年事弗能下餽聞倫曰皷之嗇夫聞倫知之請無罷武大夫而鼓可得也穆伯弗應左右曰不折一箭不傷一卒而鼓可得也君奚為弗使穆伯曰聞倫為人佞而不仁若使聞倫下之吾可以勿賞乎吾賞之是賞佞人之得志是使晉國之武舍仁而為佞雖得鼓將何所用之攻城者欲以廣地也得地不取者見其本而知其末也宋元君夜半而夢人被髪闚阿門曰予自宰路之淵予為清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰漁何得對曰且之網得白龜焉其貟五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑚而無遺筴仲尼曰神龜能見夢於元公而不能避余且之網能知七十二鑚而無遺筴不能避刳腸之患如是則智有所困神有所不及也雖有至智萬人謀之魚不畏網罟而畏鵜鶘去小智而大智明去不善而自善矣嬰兒生無所師而能言與能言者處也宋有蘭子者以技干宋元公元公召而使見其技以雙枝長倍其身属其脛並趨並馳七劍迭而躍之五劍常在空中元公大驚輙賜金帛又有蘭子又能燕戯者聞之復以干元公元公大怒曰昔有異技干寡人者技無庸適值寡人有懽心故賜金帛彼必聞此而進復望吾賞拘而擬戮之經月乃放二十五年宋元公將為昭公如晉卒于曲棘見左傳干將者吴人也與歐冶子同師俱能為劍越前来獻三枚闔廬得而寳之以故使劍匠作為二枚一曰干將二曰莫邪莫邪干將之妻也干將作劍采五山之銕精六合之金英候天伺地隂陽同光百神臨觀天氣下降而金銕之精不銷淪流於是干將不知其由莫邪曰子以善為劍聞於王使子作劍三月不成其有意乎干將曰吾不知其理也莫邪曰夫神化之物須人而成今夫子得無得其人而後成乎干將曰昔吾師作冶金銕之𩔖不銷夫妻俱入冶鑪中然後成物今後世即山作冶麻經葌服然後敢鑄金於山今若作劍不變化者其若斯耶莫邪曰師知鑠身以成物吾何難哉於是干將妻乃斷髪剪爪投於鑪中使童男童女三百人鼓槖裝炭金銕乃濡遂以成劍陽曰干將隂曰莫邪陽作龜文隂作漫理干將匿其陽出其隂而獻之闔廬甚重既得寳劍適㑹魯使季孫聘於吴闔廬使掌劍大夫以莫邪獻之季孫㧞劍逐之鍔中缺者大如黍米歎曰美哉劍也雖上國之師何能加之夫劍之成也吴覇有缺則亡矣我雖好之其可受乎不受而去闔廬既寳莫邪復命于國中作金鈎令曰能為善鈎者賞之百金吴作鈎者甚衆而有貪王之重賞也殺其二子以血釁金遂成二鈎獻於闔廬謁宫門而求賞王曰為鈎者衆而子獨求賞何以異於衆夫子之鈎乎作鈎者曰吾之作鈎也貪而殺二子釁成二鈎王乃舉衆鈎以示之何者是也王鈎甚多形體相𩔖不知其所在於是鈎師向鈎而呼二子之名吴鴻扈稽我在於此王不知汝之神也聲絶於口兩鈎俱飛著父之胸吳王大驚曰嗟夫寡人誠負於子乃賞百金遂服而不離身吴有士曰張胥鄙譚夫吾前交而後絶張胥鄙有罪拘將死譚夫吾合徒而取之出至於道而後乃知其夫吾也輟行而辭曰義不同於子故前交而後絶吾聞之君子不為危易行今吾從子是安則肆志危則易行也與吾因子而生不若反拘而死闔廬聞之令吏釋之張胥鄙曰吾義不同于譚夫吾固不受其任矣今吏以是出我以譚夫吾故免也吾庸遽受之乎遂觸墻而死譚夫吾聞之曰我任而不受佞也不知而出之愚也佞不可以接士愚不可以事君吾事虚矣人惡以吾力生吾亦恥以此立于是乃絶頸而死君子曰譚夫吾其以失士矣張胥鄙亦未為可也可謂剛勇矣未可謂得節也孟獻子聘於晉宣子觴之三徙鐘石之縣不移而具獻子曰富哉家宣子曰子之家孰與我家富獻子曰吾家甚貧惟有二士曰顔回兹無盧者使吾邦家安平百姓和協惟此二者耳獻子出宣子曰彼君子也以養賢為富我鄙人也以鐘石金玉為富孔子曰獻子之富可著於春秋萇𢎞以方事周靈王諸侯莫朝周周力少萇𢎞乃明鬼神事設射貍首貍首者諸侯諸侯不来者依物怪欲以致諸侯諸侯不從而晉人執殺萇𢎞周人之言方怪者自萇𢎞按左氏哀三年劉氏范氏世為婚姻萇𢎞事劉文公故周與范氏趙鞅以為討六月癸夘周人殺萇𢎞春秋别典卷九
