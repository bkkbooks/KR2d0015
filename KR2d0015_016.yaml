front:
  text: 春秋别典跋
  hash: sha256:4fa99ca595d1719f8468b458efb2e652a04d9e48f5325da9713897668a55d3cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0015_WYG_016-1a, image: WYG0386/WYG0386-0745c.png}
body:
  text: 先仲氏輯春秋别典未脫藁而不幸下世郭郡公用唐祠部言亟取而序之臚其目于郡乘藝文志中公其賢於中郎逺矣顧其甫成於草創而考核未加不無挂甲漏乙年代倒置之病貽好事者之惜走謂昔丘明受經作傳廣記而備言表時而記月藉令輯别以翼左乃采托未廣而世次乖舛曷稱别典哉故特廣閲博搜遇有異聞輒默識以歸參互考訂不遺餘力焉世縣者更類殊者析刪其繁復者什一苴其闕略者什三事則咸備而罔缺序則有條而不紊案之以案三氏之遺者庶無面邙適越之嘆嗟夫躬太史者亡十篇司蘭臺者遺八表創始之難為功自古志之矣矧仲氏列章逢治博士家言出其餘力以從事於此且又以無年何怪乎立言之罔終哉長志未信責在後人走愧纘承殫精極慮聊以自塞其責云爾若曰妄干載筆以附於作述之林則吾豈敢薛虞賓跋暇思輯春秋别傳一書凡左氏內外傳及公羊穀梁所書槩不登載於經文下别録子史百家之言有志未逮不意薛君先得我心也别典十五卷抄撮具見苦心惟是各條之末不疏明出何書明人之習大都若是君名虞畿弟名虞賓其字里新通志不載莫得其詳矣康煕辛巳十月朏竹垞老人彛尊識
  hash: sha256:f7655673d4ac269f2b4223542884d9b1757bc84e9e508c46eaa05e57b20f49ba
