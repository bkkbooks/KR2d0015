body:
  text: 春秋别典卷七明薛虞畿撰魯襄公二十五年起齊崔杼弑莊公也有陳不占者聞君難將赴之比去餐則失匙上車失轍御者曰怯如是去有益乎不占曰死君義也無勇私也遂往聞戰鬭之聲恐駭而死人曰不占可謂仁者之勇也二十五年齊人弒君魯襄公援戈而起曰孰臣而敢弑其君乎師懼曰夫齊君治之不能任之不肖縱一人之欲以虐萬夫之性非所以立君也其身死自取之也今君不愛萬夫之命而傷一人之死奚其過也其臣已無道矣其君亦不足惜也崔杼弑君邢蒯瞶使晉而反其僕曰崔杼弑荘公子将奚如邢蒯瞶曰驅之将入死而報君其僕曰君之無道也四鄰諸侯莫不聞也以夫子而死之不亦難乎邢蒯瞶曰善能言也然亦晚矣子早言我我能諫之諫不聽我能去余既不諫又不去吾聞食其禄者死其事吾既食亂君之禄矣又安得從治君而死之遂驅車入死其僕曰人有亂君人能死之我有治長可無死乎乃結轡自刎于車上君子曰邢蒯瞶可謂守節死義矣僕夫則無為死也猶飲食而遇毒也崔杼弑莊公令士大夫盟者皆脱劍而入言不疾指不至血者死所殺十人次及晏子晏子奉杯血仰天而嘆曰惡乎崔子將為無道殺其君盟者皆視之崔子謂晏子曰子與我我與子分國子不我與我將殺子直兵將推之曲兵將勾之唯子圖之晏子曰嬰聞回以利而背其君非仁也刼以刃而失其志者非勇也詩云愷悌君子求福不回嬰可謂不回矣直兵推之曲兵勾之嬰不之回也崔子舎之晏子趍出授綏而垂其僕將馳晏子撫其手曰虎豹在山林其命在庖厨馳不益生緩不益死按之成節然後去之晏子十七年始見傳晏子與崔杼盟其辭曰不與崔氏而與公孫氏者受其不祥晏子曰不與公孫氏者而與崔氏者受此不祥崔子不説直兵造胷勾兵鈎頸謂晏子曰子變子言齊國與子共之不變子言則今是已晏子曰崔子子獨不聞夫詩乎詩曰莫莫葛藟施于條枚豈弟君子求福不回嬰且可以回而求福乎崔杼曰此賢者不可殺也罷之而去延陵季子遊於晉二十九年入其境曰譆暴哉國乎入其都曰譆力絀哉國乎立其朝曰譆亂哉國乎從者曰夫子之入晉境未久也何其名之不疑也季子曰然吾入其境田畝荒穢而不休雜増崇髙吾是以知其國之暴也入其都新室惡而故室美新牆卑而故牆髙吾是以知其民力之絀也吾立其朝其君能視而不下問其臣伐善而不上諫吾是以知其國之亂也延陵季子将西聘晉帶寳劍以遇徐君徐君觀劍不言而色欲之延陵季子以有上國之使未獻也然其心許之矣致使于晉故反則徐君死于楚於是脱劍致之嗣君從者止之曰此吳國之寳非所以贈之也延陵季子曰吾非贈之也先日吾來徐君觀吾劍不言而色欲之吾為有上國之使未獻也雖然吾心許之矣今死而不進是欺心也愛劍偽心廉者不為也遂脱劍致之嗣君嗣君曰先君無命孤不敢受劍於是季子以劍帶徐君墓樹而去徐人嘉而謌之曰延陵季子兮不忘故脱千金之劍兮帶秋墓延陵季子逰於齊見遺金呼牧者取之牧者曰子居之髙視之小貌之君子而言之野也吾有君不君有友不友當暑衣裘君疑取金者乎延陵季子知其為賢者請問姓名牧者曰子乃皮相之士也何足語姓字哉遂去延陵季子立而望之不見乃止衞有五丈夫俱負􅇲而入井灌韭終日一區鄧析過下車為教之曰為機重其後輕其前命曰橰終日灌韭百區不倦五丈夫曰吾師言曰有機智之功必有機智之則我非不知也不欲為也子其往矣我一心溉之不知改已鄧析去行數十里顔色不悦懌自恥弟子曰是何人也而恨我君請為君殺之鄧析曰釋之是所謂真仁者也可令守國鄭之富人有溺洧水者人得其死者其子請贖之其人求金甚多金愈益求愈甚其子患以問鄧析曰置之彼必無所更賣矣子産治鄭三十年子皮授子産政昭二十年卒鄧析務難之與民之有獄者約大獄一衣小獄襦袴民獻衣襦袴而學訟者不可勝數鄭國大亂民日讙譁子産患之於是殺鄧析而民心乃服法律大行按左氏定八年駟􅞰嗣大叔為政殺鄧析𫝊非之諸書多作子産殺鄧析何也姑存之鄧析操兩可之説設無窮之辭當子產執政作竹刑鄭國用之數難子產之治子産惡之子產執而戮之俄而誅之子產相鄭簡公謂子產曰内政毋出外政毋入夫衣裳之不美車馬之不飾子女不潔寡人之醜也國家之不治封疆之不正夫子之醜也子産相鄭終簡公之身内無國中之亂外無諸侯之患簡公襄七年立鄭昭公之時以所愛徐摯為相國亂上下不和太宫子期言之君以子產為相為相一年豎子不戲狎班白不提挈僮子不犂畔二年市不豫賈三年門不夜闗道不拾遺四年田器不歸五年士無尺籍喪期不令而治治鄭二十六年而死丁壯號哭老人兒啼曰子産去我死乎民將安歸鄭昭公在魯桓公年非子産時君也疑簡公鄭簡公謂子產曰國小迫於荆晉之間今城郭不完甲兵不備不可以待不虞子産曰臣閉其外也已逺矣而守其内也已固矣雖國小猶不危之也君其勿憂是以歿簡公之身無患鄭簡公謂子產曰飲酒不樂也俎豆不大鐘鼔竽瑟不鳴寡人之事也國人不定朝廷之不治與諸侯交不得志子之事也子有職寡人亦有職各守其職子產退而為政五年國無盜賊道不拾遺桃棗䕃於街者莫有援也錐刀遺道三日可反三年不登民無饑也晉人欲攻鄭令叔向視其有人與無人子產為之詩曰子惠思我牽裳涉洧子不我思豈無他士叔向即曰子產在焉不可攻也秦荆近其詩有異心不可攻也晉乃輟攻鄭趙文子問於叔向曰晉六將軍孰先亡乎對曰其中行氏乎文子曰何故先亡對曰夫中行氏之為政也以苛為察以切為明以刻為志以計多為善以聚歛為良譬之其猶鞟革者也大則大矣裂之道也當先亡晉平公問於師矌曰人君之道何如對曰人君之道清浄無為務在博愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘繫於左右廓然逺見踔然獨立屢省考績以臨臣下此人君之操也平公曰善襄十五年晉平公立至昭十年平公卒在位歴年多而事甚衆難一一以年考也盡繫於襄之末年晉平公問於師矌曰舅犯與趙衰孰賢對曰陽處父欲臣文公因舅犯三年不達因趙衰三日而達智不知其士衆不智也知而不言不忠也欲言之而不敢無勇也言之而不聽不賢也晉平公問於叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎叔向對曰管仲善制割隰朋善削縫賓胥無善純縁桓公知衣而已亦其臣之力也師曠侍曰臣請譬之以五味管仲善割斷之隰朋善煎熬之賓胥無善齊和之羮以熟矣奉而薦之而君不食誰能强之亦君之力也晉悼公命叔向𫝊太子彪即平公故叔向事獨多晉平公為馳逐之車龍旌衆色挂之以犀象錯之以羽芝車成題金千鎰立之於殿下令羣臣得觀焉田差三過而不一顧公作色大怒問曰田差三過而不一顧何為也田差對曰臣聞説天子者以天下説諸侯者以國説大夫者以官説士者以事説農夫者以食説婦姑者以織桀以奢亡紂以淫敗是以不敢顧也平公曰善晉平公過九原而嘆曰嗟乎此地之藴吾良臣多矣若使死者起也吾将誰與歸乎叔向對曰其趙武乎公曰子黨于子之師也對曰臣敢言趙武之為人也立若不勝衣言若不出口然其身舉士於白屋下者四十六人皆得其意而公家甚賴之及文子之死也四十六人皆就賓位是其無私徳也臣故以為賢也平公曰善夫趙武之為賢臣也相晉天下無兵革者九年春秋曰晉趙武之力盡得人也晉平公問叔向曰嵗饑疾疫翟人攻我我將若何對曰嵗饑來年而反矣疾疫将止矣翟人不足患也公曰患有大於此者乎對曰夫大臣重禄而不極諫近臣畏罪而不敢言左右顧寵於小官而君不知此誠患之大者也公曰善於是令國中曰欲有諫者無隠左右言及國無罪昭元年敗狄于大鹵晉平公問於師曠曰吾年七十欲學恐已暮矣師曠曰何不炳燭乎公曰安有為人臣而戲其君乎師曠曰盲臣安敢戲其君乎臣聞之少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行乎公曰善哉晉平公出言而不當師曠舉瑟而撞之跌袵宫壁左右欲塗之平公曰舎之以為寡人失孔子聞之曰平公非不痛其體也欲來諫者也晉平公之時寳藏之臺燒士大夫聞皆趨車馳馬救火三日三夜乃勝之公子晏子獨束帛而賀曰甚善矣平公勃然作色曰珠玉之所藏也國之重寳也而天火之士大夫趨車走馬而救之子獨束帛而賀何也有説則生無説則死公子晏子曰何敢無説臣聞之王者藏於天下諸侯藏於百姓商賈藏於篋匱今百姓之於外裋褐不蔽形糟糠不充口虚而賦歛無已收大半而藏之臺是以天火之且臣聞之昔者桀殘賊海内賦歛無度萬民甚苦是故湯誅之為天下戮笑今皇天降灾於藏臺是君之福也而不自知變悟亦恐君之為鄰國笑矣公曰善自今以往請藏於百姓之間晉平公春築臺叔向曰不可古者聖王貴德而務施緩刑辟而趨民時今春築臺是奪民時也夫徳不施則民不歸刑不緩則百姓愁使不歸之民役愁怨之百姓而又奪其時是竭也夫拘百姓而養育之而又重竭之豈所以定命安存而稱為人君於後世哉平公曰善乃罷臺役叔向御坐平公請事公腓痛足痺轉筋而不敢壊坐晉國聞之皆曰叔向賢者平公禮之轉筋而不敢壊坐晉國之辭仕託慕叔向者國之錘矣叔向賦獵功多者受多功少者受少晉平公鑄大鐘工聽之皆以為調矣師矌曰不調請更鑄之後世有知音者將知鐘之不調也臣竊為君恥之師涓至果知鐘之不調也晉平公泛西河中流樂而歎曰嗟乎安得賢士與之樂此也船人盍胥一作固桑跽而對曰主君亦不好士耳夫珠出於江海玉出於崑山無足而至者由主君之好也君苟好士則賢士至矣平公曰吾食客二千人朝食不足夕收市租暮食不足朝收市租尚可謂不好士乎盍胥對曰夫鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不為加髙損一把飛不為加下不知君之食臣六翮也將腹背之毛也平公黙然不應蔡侯宋公鄭伯朝於晉蔡侯謂叔向曰子亦奚以語我對曰蔡侯土地計衆不若宋鄭其車馬衣裘侈於二國諸侯其有圖蔡者乎處期年楚伐蔡而殘之晉平公使范昭觀齊國之政景公賜之宴晏子在前范昭趨曰願君之倅樽以為夀景公顧左右曰酌寡人之樽獻之客晏子對曰徹去樽范昭不悦起舞顧太師曰子為我奏成周之樂願舞太師曰盲臣不習范昭起出門景公謂晏子曰夫晉天下大國也使范昭來觀齊國之政今子怒大國之使者將奈何晏子曰范昭之為人非陋而不知禮也是欲試吾君嬰故不從於是景公召太師而問之曰范昭使子奏成周之樂何故不調對如晏子於是范昭歸報平公曰齊未可并也吾試其君晏子知之吾犯其樂太師知之孔子聞之曰善乎晏子不出俎豆之間折衝千里而太師其與焉晉平公使叔向聘于吳吳人拭舟以逆之左五百人右五百人有繡衣而豹裘者有錦衣而􅈢裘者叔向歸以告平公平公曰吳其亡矣奚以敬舟奚以敬民叔向對曰君為馳底之臺上可以發千兵下可以陳鐘鼔諸侯聞君者亦曰奚以敬其臺奚以敬民所敬各異也於是平公乃罷臺晉平公好樂多其賦歛不治城郭曰敢有諫者死國人憂之有咎犯非􅈢偃也見門大夫曰臣聞主君好樂故以樂見門大夫入言曰晉人咎犯也欲以樂見平公曰内之止坐殿上則出鐘磬竽瑟坐有頃平公曰客子為樂咎犯對曰臣不能為樂臣善隠平公召隠士十二人咎犯曰隠臣竊願昧死御平公曰諾咎犯申其左臂而詘五指平公問于隠官曰占之為何隠官皆曰不知平公曰歸之咎犯則申其一指曰是一也便㳺赭盡而峻城闗二也柱梁衣繡士民無褐三也侏儒有餘酒而使士民渴四也民有饑色馬有粟秩五也近臣不敢諫逺臣不得達平公曰善乃屏鐘鼓除竽瑟遂與咎犯參治國惠公多寵姬公欲去諸大夫而立寵姬宋諸大夫共誅姬宋惠公懼奔齊九年髙偃如晉請兵伐燕入其君晉平公許與齊伐燕入惠公惠公至燕而死按史年表在昭公七年見傳傳曰燕簡公晉平公閒居師矌侍坐平公曰子生無目眹甚矣子之墨墨也師矌對曰天下有五墨墨而臣不得與一焉平公曰何謂也師矌曰羣臣行賂以求名譽百姓侵寃無所告訴而君不悟此一墨墨也忠臣不用用臣不忠下才處髙不肖臨賢而君不悟此二墨墨也姦臣欺詐空虚府庫以其少才覆塞其惡賢人逐姦邪貴而君不悟此三墨墨也國貧民罷上下不和而好財用兵嗜欲無厭諂諛之人衮衮在傍而君不悟此四墨墨也至道不明法令不行吏民不正百姓不安而君不悟此五墨墨也國有五墨墨而不危者未之有也臣之墨墨小墨墨耳何害于國家哉晉平公出畋見乳虎伏而不動顧謂師矌曰吾聞之霸王之主出則猛獸伏不敢起今者寡人出見乳虎伏而不動此其猛獸乎師矌曰鵲食猬猬食鵔䴊鵔䴊食豹豹食駮駮食虎夫駮之狀有似駮焉今者君之出必驂駮馬而出畋乎公曰然師矌曰臣聞之一自誣者窮再自誣者辱三自誣者死今夫虎所以不動者為駮馬也固非主君之徳義也君奈何一自誣乎平公異日出朝有鳥環平公不去平公顧謂師矌曰吾聞之也霸王之主鳯下之今者出朝有鳥環寡人終朝不去是其鳯鳥乎師矌曰東方有鳥名諫珂其為鳥也文身而朱足憎鳥而愛􅈢今者君必衣狐裘以出朝乎平公曰然師矌曰臣已嘗言之矣一自誣者窮再自誣者辱三自誣者死今鳥為􅈢裘之故非為君之徳義也君奈何而再自誣乎平公不説異日置酒虒祁之臺使郎中馬章布蒺蔾於階上令人召師矌師矌至履而上堂平公曰安有人臣履而上人主堂者乎師矌解履刺足伏刺膝仰天而嘆公起引之曰今者日與叟戲叟遽憂乎對曰憂夫肉自生蟲而還自食也木自生蠧而還自刻也人自興妖而還自賊也五鼎之具不當生藜藿人主堂廟不當生蒺蔾平公曰今為之奈何師矌曰妖已在前無可奈何入來月八日脩百官立太子君將死矣至來月八日平旦謂師矌曰叟以今日為期寡人如何師矌不樂謁歸歸未㡬而平公死乃知師矌神明矣叔向之殺萇𢎞也數見萇𢎞于周因佯遺書曰萇𢎞謂叔向曰子起晉國之兵以攻周吾廢劉氏而立單氏劉氏請之君曰此萇𢎞也乃殺之左氏哀三年周人殺萇𢎞趙鞅惡范氏及周之劉氏萇𢎞事劉文公故周人殺萇𢎞此曰叔向殺𢎞非也荆王弟在秦秦不出也中射之士曰資臣百金臣能出之因載百金之晉見叔向曰荆王弟在秦秦不出也請以百金委叔向叔向受金而以之見晉平公曰可以城壺丘矣平公曰何也對曰荆王弟在秦秦不出也是秦惡荆也必不敢禁我城壺丘若禁之我曰為我出荆王之弟吾不城彼如出之可以城之秦因出之荆王大悦以金百鎰遺晉此條𩔖戰國䇿士之謀疑非羊舌肸之為也且云以百金見叔向叔向受金益知其非是矣肸親數鮒之賄而已以賄汙乎決不然矣韓平子問於叔向曰剛與柔孰堅對曰臣年八十矣齒再隳而舌尚存老聃有言曰天下之至柔馳騁乎天下之至堅又曰人之生也柔弱其死也剛强萬物草木之生也柔脆其死也枯槁因此觀之柔弱者生之徒也剛强者死之徒也夫生者毁而必復死者破而愈亡吾是以知柔之堅于剛也平子曰善哉然則子之所行何從叔向曰臣亦柔耳何以剛為平子曰柔無乃脆乎叔向曰柔者紉而不折㢘而不缺何以為脆也天之道㣲者勝是以兩軍相加而柔者克之兩仇争利而柔者得焉易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙夫懐謙不足而四道者助之則安往而不得其志矣平子曰善春秋别典卷七
