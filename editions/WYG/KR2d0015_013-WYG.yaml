body:
  text: 春秋别典卷十三明薛虞畿撰魯哀公元年丁未在位二十七年周敬王二十六年越王降吳元年吳夫差伐越報㰎李登舟逕去終不返顧越王夫人乃據船哭顧烏鵲啄江渚之蝦飛去復来因哭而歌之曰仰飛鳥兮烏鳶陵𤣥虚兮翩翩集洲渚兮優恣啄蝦矯翮兮雲間任厥兮往還妾無罪兮負地有辜兮譴天颿颿獨兮西往孰知返兮何年心惙惙兮若割泪泫泫兮雙懸又哀吟曰彼飛鳥兮鳶烏已廽翔兮翕蘇心在専兮素蝦何居食兮江湖廽復翔逝颺去復返兮於乎始事君兮去家終我命兮君都終未遇兮何幸離吾國兮去吳妻衣褐兮為婢夫去冕兮為奴嵗遥遥兮難拯寃悲疼兮心惻腸千結兮服膺於乎哀兮忘食顧我烏兮如鳥身翔翔兮矯翼去我國兮心揺情憤惋兮誰識越王聞夫人怨歌心中内慟乃曰孤何憂吾之六翮備矣楚伐陳吳救之軍間三十里雨十日夜星左史倚相謂子期曰雨十日甲輯而兵聚吳人必至不如備之乃為陣陣未成而吳人至見楚陣而反左史曰吳反覆六十里其君子必休小人必食我將三十里擊之必可敗也乃從之遂破吳軍孔子困於陳蔡之間按史記哀二年孔子如蔡吳救蔡遷于州束又云定公十三年甲辰乃陳閔公六年孔子適陳居環堵之内席三經之席七日不食藜藿不糁弟子皆有饑色讀詩書治禮不休子路進見曰凡人為善者天報以福為不善者天報以禍今先生積德行為善久矣意者尚有遺行乎奚居隠也孔子曰由来汝坐吾語汝子以夫知者為無不知也則王子比干何為剖心而死子以諌者為必聴也伍子胥何必抉目於吳東門子以㢘者為必用乎伯夷叔齊何為饑死於首陽山之下子以忠者為必用乎則鮑莊何為而肉枯荆公子髙終身不顯鮑焦抱木而立枯介子推登山焚死故君子博學深謀不遇時者衆矣豈獨丘哉賢不肖者才也為不為者人也遇不遇者時也死生者命也有其才不遇其時雖才不用茍遇其時何難之有故舜耕厯山而陶于河畔立為天子則其遇堯也傅説負壤土釋版築而立佐天子則其遇武丁也伊尹有莘氏媵臣也負鼎爼調五味而佐天子則其遇成湯也吕望行年五十賣食于棘津行年七十屠牛朝歌行年九十為天子師則其遇文王也管夷吾束縳膠目居檻車中自車中起為仲父則其遇齊桓也百里奚自賣取五羊皮伯氏牧牛以為卿大夫則其遇秦穆公也沈尹名聞天下而讓孫叔敖則其遇楚莊王也伍子胥前多功後戮死非其智益衰也前遇闔廬後遇夫差也夫驥厄鹽車非無驥狀也世莫能知也使驥得王良造父驥無千里之足乎芝蘭生深林非為無人而不香故學者非為通也為窮而不困也憂不衰也此知禍福之始而心不惑也聖人之深念獨知獨見舜亦賢聖矣南面治天下唯其遇堯也使舜居桀紂之世能自免刑戮可也又何官得治乎夫桀殺關龍逄而紂殺王子比干當是時豈關龍逄無知而比干無恵哉此桀紂無道之世然也故君子疾學端行修身以須其時也孔子遭難陳蔡之境絶糧弟子皆有饑色孔子歌兩柱之間子路入見曰夫子之歌禮乎孔子不應曲終而曰由君子好樂而無驕也小人好樂而無懾也其誰知之子不知我而從我者乎子路不悦援干而舞三終而出至七日孔子修樂不休子路愠見曰夫子之修樂時乎孔子不應樂終而曰由昔者齊桓霸心生於莒勾踐霸心生於㑹稽晉文霸心生於驪氏故居不幽則思不逺身不約則智不廣庸知而不遇乎於是興明日免於厄子貢執轡曰二三子從夫子而遇是難也其不可忘已孔子曰惡何言也語不云乎三折肱而成良醫夫陳蔡之間丘之幸也二三子從丘者皆幸人也吾聞人君不困不成王列士不困不成行昔者湯困於吕文王困於羑里秦穆公困於殽齊桓公困於長勺勾踐困於㑹稽晉文困於驪氏夫困之為道從寒之及煖煖之及寒也唯賢者獨知而難之也易曰困亨貞大人吉無咎有言不信聖人所與之難言信也書曰兹予大享於先王爾祖其從與享之季桓子問曰此何謂也孔子曰古之王者臣有大功死則必祀之於廟所以殊有績勸忠勤也盤庚舉其事以勵其世臣故稱焉桓子曰天子之臣有大功者則既然矣諸侯之臣有大功者可以如之乎孔子曰勞能定國功加於民大臣死難雖食之公廟可也桓子曰其位次何如孔子曰天子諸侯之臣生則有列於朝死則有位於廟其序一也季桓子以粟千鍾餼孔子孔子受之而不辭既以頒門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎孔子曰何也對曰季孫以為恵也子曰然吾得千鍾所以受而不辭者為季孫之恵且以為寵也夫受人財不以成富與季孫之恵于一人豈若恵數百人哉魯季孫有䘮孔子弔之入門而左客次也主人以璠璵收孔子經庭而趨歴級而上曰以寳玉收猶之棄骸中原也經庭歴級非禮也雖然以救過也孔子見季康子康子立在三年康子未説孔子又見之宰予曰吾聞之夫子曰王公不聘不動今吾子之見司寇也小數矣孔子曰魯國以衆相陵以兵相暴之日久矣而有司不治聘我者孰大乎於是魯人聞之曰聖人將治可以不先自為刑罰乎自是之後國無争者孔子謂弟子曰違山十里蟪蛄之聲猶尚存耳政事無如膺之矣古之魯俗塗門之閭羅門之羅收門之漁獨得於禮是以孔子善之夫塗門之閭富家為貧者出羅門之羅有親者取多無親者取少收門之漁有親者取巨無親者取少魯有父子訟者康子曰殺之孔子曰未可也夫民不知子父訟之不善者久矣是則上過也上有道是人亡矣康子曰夫治民以孝為本今殺一人以戮不孝不亦可乎孔子曰不孝而誅之是虐殺不辜也三軍大敗不可誅也獄訟不治不可刑也上陳之教而先服之則百姓從風矣躬行不從而後俟之以刑則民知罪矣夫二仞之牆民不能踰百仭之山童子升而逰焉陵遲故也今世仁義之陵遲久矣能使民弗踰乎詩曰俾民不迷昔者君子導其百姓不使迷是以威厲而不主刑錯而不用也於是從者聞之乃請舍訟季孫好士終身莊居處衣服常如朝廷而季孫適解有過失而不能長為也故客以為厭易已相與怨之遂殺季孫故君子去泰去甚季孫之治魯也衆殺人而必當其罪多罰人而必當其過子貢曰暴哉治乎季孫聞之曰吾殺人必當其罪罰人必當其過先生以為暴何也子貢曰夫奚不若子産之治鄭一年而負罰之過省二年而刑殺之過亡三年而庫無拘人故民歸之如水就下愛之如孝子敬父母子産病將死國人皆吁嗟曰誰可使代子産死者乎及其不免死也士大夫哭之於朝商賈哭之於市農夫哭之於野哭子産者皆如䘮父母今竊聞夫子疾之時則國人喜活則國人皆駭以死相賀以生相恐非暴而何哉賜聞之託法而治謂之暴不戒致期謂之虐不教而誅謂之賊以身勝人謂之責責者失身賊者失臣虐者失政暴者失民且賜聞居上位行此四者而不亡者未之有也於是季孫稽首謝曰謹聞命矣孔子曰自季孫之賜我千鍾而友益親自南宫敬叔之乗我車也而道加行故道有時而後重有勢而後行㣲夫子之賜丘之道幾於廢也孔子侍坐於季孫季孫之宰通曰君使人假馬其與之乎孔子曰吾聞君取於臣謂之取不曰假季孫悟告宰曰自今以往君有取謂之取無曰假故君子正假馬之名而君臣之義定矣夫子自陳過蒲㑹公叔氏以蒲畔蒲人止夫子弟子有公良孺者以私車五乗從夫子其人長賢有勇力謂曰吾昔從夫子遇難於匡今又遇難於此命也已吾與夫子再遇難寕鬭而死鬬甚疾蒲人懼謂孔子曰茍毋適衞吾出子與之盟出孔子東門孔子遂適衞子貢曰盟可負也耶孔子曰要盟也神不聴衞靈公聞夫子来喜郊迎問曰蒲可伐乎對曰可靈公曰吾大夫以為不可今蒲衞之所以待晉楚也以衞伐之無乃不可乎夫子曰其男子有死之志婦人有保西河之志吾所伐者不過四五人靈公曰善乃不伐蒲陳恵公大城因起陵陽之䑓未終而坐法死者數十人又執三監吏孔子適陳聞之見陳侯與俱登䑓而觀焉孔子曰美哉斯䑓自古聖王之為城䑓未有不戮一人而能致功若此者陳侯黙然而退遽竊赦所執吏既而見孔子問曰昔周作靈䑓亦戮人乎荅曰文王之興附者六州六州之衆各以子道来故區區之䑓未及期日而已成矣何戮之有乎夫以小小之衆能立大大之功惟君耳田饒事魯哀公而不見察田饒謂哀公曰臣將去君黄鵠舉矣公曰何謂也曰君獨不見夫鷄乎首戴冠者文也足摶距者武也摶作𫝊敵在前敢鬬者勇也得食相呼仁也守夜不失時信也雖鷄有此五者君猶日㵸而食之者何以其所從来近也夫黄鵠一舉千里止君園池食君魚鱉啄君菽粟無此五者君猶貴之以其所從来者逺也臣請黄鵠舉矣公曰止吾將書子之言也田饒曰臣聞食其食者不毁其器䕃其樹者不折其枝有士不用何書其言為遂去之燕燕立以為相三年燕政大平國無盜賊公聞之慨然太息為之避寢三月抽損上服曰不慎其前而悔其後何可復得六年戊子田乞請諸大夫曰常之母有魚菽之祭幸來㑹飲飲次乞盛陽生槖中置坐中央發槖出陽生曰此乃齊君也大夫皆伏謁將與大夫盟而立之鮑牧醉乞誣大夫曰吾與鮑牧謀共立陽生鮑牧怒曰子忘景公之命乎諸大夫相視欲悔陽生前頓首曰可則立之否則已鮑牧恐祻起乃復曰皆景公子也何為不可乃與盟立陽生是為悼公楚恵王食寒葅而得蛭因遂吞之腹有疾而不能食令尹入見問曰王安得此疾也王曰我食寒葅而得蛭念譴之而不行其罪乎是法廢而威不立也非所以使國聞也譴而行其誅乎則庖宰食監法皆當死心又不忍也故吾恐蛭之見也因遂吞之令尹避席再拜而賀曰臣聞天道無親唯德是輔君有仁德天之所奉也病不為傷是夕也恵王之後蛭出故其久病心腹之疾皆愈天之視聽不可不察也七年立宋圍曹不抜七年宋圍曺司馬子魚謂君曰文王伐崇崇軍其城三旬不降退而修教復伐之因壘而降今君德無乃有所缺乎胡不退修德無闕而後動八年宋滅曺子貢見太宰嚭太宰嚭問曰孔子何如對曰臣不足以知之太宰曰子不知何必事之對曰惟不知故事之夫子其猶夫山林也百姓各足其材焉太宰嚭曰子増夫子乎對曰夫子不可増也夫賜其猶一累壤也以一累壤増太山不益其髙且為不智太宰曰然則子有所酌也對曰天下有大尊而子獨不酌焉不識誰之罪也七年吴徴百牢康子使子貢見太宰嚭或此其時也齊攻魯子貢見哀公請求救於吳公曰奚先君寳之用子貢曰使吳責吾寳而與吾師是不可恃也於是以楊幹麻觔之弓六往子貢謂吳王曰齊為無道欲使周公之後不血食且魯賦五百邾賦三百不識以此益齊吳之利歟非歟吳王懼乃興師救魯諸侯曰齊伐周公之後而吳救之遂朝於吳十一年見𫝊田常欲作亂於齊憚髙國鮑晏故移其兵欲以伐魯孔子聞之謂門弟子曰夫魯墳墓所處父母之國國危如此二三子何為莫出子路請出孔子止之子張子石請行孔子弗許子貢請行孔子許之遂行至齊説田常曰君之伐魯過矣夫魯難伐之國其城薄以卑其地狹以泄其君愚而不仁大臣偽而無用其士民又惡甲兵之事此不可與戰君不如伐吳夫吳城髙以厚池廣以深甲堅以新士選以飽重器精兵盡在其中又使明大夫守之此易伐也田常忿然作色曰子之所難人之所易子之所易人之所難而以教常何也子貢曰臣聞之憂在内者攻強憂在外者攻弱今君憂在内吾聞君三封而三不成者大臣有不聽者也今君破魯以廣齊戰勝以驕主破國以尊臣而君之功不與焉則交日踈於主是君上驕主心下恣羣臣求以成大事難矣夫上驕則恣臣驕則争是君上與主有郤下與大臣交争也如此則君之立於齊危矣故曰不如伐吳伐吳不勝民人外死大臣内空是君上無彊臣之敵下無民人之過孤主制齊者唯君也田常曰善雖然吾兵業已加魯矣去而之吳大臣疑我奈何子貢曰君按兵無伐臣請往使吳王令之救魯而伐齊君因以兵迎之田常許之使子貢南見吳王説曰臣聞之王者不絶世霸者無彊敵千鈞之重加銖兩而移今以萬乗之齊而私千乗之魯與吳争彊竊為王危之且夫救魯顯名也伐齊大利也以撫泗上諸侯誅暴齊以服强晉利莫大焉名存亡魯實困强齊智者不疑也吳王曰善雖然吾甞與越戰棲之㑹稽越王苦身養士有報我心子待我伐越而聽子子貢曰越之勁不過魯吳之强不過齊王置齊而伐越則齊已平魯矣且王方以存亡繼絶為名夫伐小越而畏强齊非勇也夫勇者不避難仁者不窮約智者不失時王者不絶世以立其義今存越示諸侯以仁救魯伐齊威加晉國諸侯必相率而朝吳霸業成矣且王必惡越臣請東見越王令出兵以從此實空越名從諸侯以伐也吳王大説乃使子貢之越越王除道郊迎身御至舍而問曰此蠻夷之國大夫何以儼然辱而臨之子貢曰今者吾説吳王以救魯伐齊其志欲之而畏越曰待我伐越乃可如此破越必矣且夫無報人之志而令人疑之拙也有報人之意使人知之殆也事未發而先聞危也三者舉事之大患勾踐頓首再拜曰孤甞不料力乃與吳戰困於㑹稽痛入於骨髓日夜焦唇乾舌徒欲與吳王接踵而死孤之願也遂問子貢子貢曰吳王為人猛暴羣臣不堪國家敝於數戰士卒弗忍百姓怨上大臣内變子胥以諌死太宰嚭用事順君之過以安其私是殘國之治也今王誠發士卒佐之以徼其志重寳以説其心卑辭以尊其禮其伐齊必也彼戰不勝王之福也戰勝必以兵臨晉臣請北見晉君令其攻之弱吳必矣其銳兵盡於齊重甲困於晉而王制其弊此滅吳必矣越王大説許諾送子貢金百鎰劍一良矛二子貢不受遂行報吳王曰臣敬以大王之言告越王越王大恐曰孤不幸少失先人内不自量抵罪於吳軍敗身辱棲於㑹稽國為虚莽賴大王之賜使得奉爼豆而修祭祀死不敢忘何謀之敢應後五日越使大夫種頓首言於吳王曰東海役臣孤勾踐使者臣種敢修下吏問於左右今竊聞大王將興大義誅强救弱困暴齊而撫周室請悉起境内士卒三千人孤請自被堅執銳以先受矢石因越賤臣種奉先人藏器甲二十領銕屈盧之矛歩光之劍以賀軍吏吳王大説以告子貢曰越王欲身從寡人伐齊可乎子貢曰不可夫空人之國悉人之衆又從其君不義君受其幣許其師而辭其君吳王許諾乃謝越王於是吳王乃遂發九郡兵伐齊子貢因去之晉謂晉君曰臣聞之慮不先定不可以應卒兵不先辦不可以勝敵今夫齊與吳將戰彼戰而不勝越亂之必矣與齊戰而勝必以其兵臨晉晉君大恐曰為之奈何子貢曰修兵休卒以待之晉君許諾子貢去而之魯呉王果與齊人戰於艾陵大破齊師獲七將軍之兵而不歸果以兵臨晉與晉人相遇潢池之上晉吳争強晉人擊之大敗吳師越王聞之渉江襲呉去城七里而軍吳王聞之去晉而歸與越戰於五湖三戰不勝城門不守越遂圍王宫殺夫差而戮其相破呉三年東向而霸故子貢一出存魯亂齊破呉强晉而霸越子貢一使使勢相破十年之中五國各有交戰艾陵在哀十一年殺子胥在艾陵還後衞孔文子將攻太叔疾問䇿於孔子辭不知退命載而行文子固止會季康子逐公華公賔公林以幣迎乃歸魯作丘陵之歌曰登彼丘陵峛崺其阪仁道在邇求之若逺遂迷不復自嬰屯蹇喟然四顧題彼太山鬱確其髙梁甫四連枳棘充路陟之無緣將伐無柯患滋蔓延惟以永嘆涕淚潺湲然終不能用夫子亦不仕十一年呉王欲從民飲酒伍子胥諌曰不可昔白龍下清冷之淵化為魚漁者豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形白龍對曰我下清冷之淵化為魚天帝曰魚固人之所射也若是豫且何罪夫白龍天帝貴畜也豫且宋國賤臣也白龍不化豫且不射今棄萬乗之位而從布衣之士飲酒臣恐其有豫且之憂矣王乃止越大飢范蠡曰呉甚富王少年智寡好須臾之名不顧後患王卑辭請糴食可得也越王乃使人請於呉呉王將與之子胥曰呉越仇讎之國也非吳喪越越必喪呉若燕齊秦晉豈能踰五湖九江越十七阨以有呉哉不若勿與而攻之且夫飢代事猶淵之與阪誰國無有王曰義兵不攻服仁者食飢餓不仁不義雖得十越吾不為也遂與之三年呉亦飢請於越弗許乃攻之夫差為禽案哀十一年呉殺子胥十二年㑹槖皋十三年越入呉然則越飢在哀九年間勾踐自會稽歸七年拊循其士民士民欲用以報呉大夫逄同諫曰國新流亡今乃復殷給繕飾備利呉必懼懼則難必至且鷙鳥之擊也必匿其形今夫呉兵加齊晉怨深於楚越名髙天下實害周室徳少而功多必淫自矜為越計莫若結齊親楚附晉以厚吳吳之志廣必輕戰是我連其權三國伐之越承其弊可克也勾踐曰善呉王欲伐楚告其左右曰敢有諌者死舎人有少孺子者欲諌不敢則懷丸操彈於其後園露沾其衣如是者三旦呉王曰子來何苦沾衣如是對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後也螳蜋委身曲跗欲取蟬而不知黄雀在其旁也黄雀延頸欲啄螳蜋而不知彈丸在其下也皆欲得其前利而不顧後之患也吳王曰善乃罷兵西施美婦人也居苧蘿山若邪溪之西故曰西子鬻薪浣沙為世絶色甞病心而顰其里之醜婦見而美之亦捧心而顰其里之富人見之堅閉門而不出貧人見之挈妻子而去之越王得之厚飾以羅縠教以容歩學服而使范蠡獻之於吳王吳王大説子胥諌曰不可王勿受也臣聞賢士國之寳美女國之咎夏亡以妹喜殷亡以妲已周亡以褒姒吳王不聽遂受之子胥數諌吳王不聽將殺之子胥歸謂被離曰吾貫弓接矢於鄭楚之界越度江淮自致於斯前王聴從吾計破楚見凌之讎欲報前王之恩而至於此吾非自惜祻將及爾被離曰忠諌不聽自殺何益何如亡乎子胥曰亡臣安往吳王聞子胥之怨恨也乃使人賜属鏤之劍按𫝊吳殺子胥在十一年吳王使使賜伍子胥属鏤之劍曰子以此死子胥仰天嘆曰嗟夫讒臣嚭為亂矣王乃反誅我我令若父霸自若未立時諸公子争立我以死争之於先王幾不得立若既得立欲分吳國予我我顧不敢望也然今若聽諛臣言以殺長者乃告其舍人曰必樹我墓上以梓令可為器而抉吾眼縣吳東門之上以觀越冦之入滅吳也乃自剄死吳王聞之大怒乃取子胥尸盛以鴟夷革浮之江中吳人憐之為立祠於江上因命曰胥山吳王謂被離曰汝甞與子胥論寡人之短乃髠被離而刑之王孫駱聞之不朝王召而問曰子何非寡人而不朝乎駱曰臣恐耳曰子以吾殺子胥為重乎駱曰大王氣髙子胥位下王誅之臣命何異於子胥臣是以恐也王曰非聴宰嚭以殺子胥圖寡人也駱曰臣聞人君者必有敢諌之臣在上位者必有敢言之交夫子胥先王之老臣也不忠不信不得為前王臣吳王心中悷然悔殺子胥豈非宰嚭之讒子胥而欲殺之駱曰不可王若殺宰嚭此為二子胥也於是不誅哀公問孔子曰寡人生乎深宫之中長於婦人之手寡人未甞知哀也未甞知憂也未甞知勞也未甞知懼也未甞知危也孔子避席曰吾君之問乃聖君之問也丘小人也何足以言之哀公曰否吾子就席㣲吾子無所聞之矣孔子就席曰然君入廟門升自阼階仰見榱棟俯見几筵其器存其人亡君以此思哀則哀將安不至矣君昧爽而櫛冠平旦而聴朝一物不應亂之端也君以此思憂則憂將安不至矣君平旦而聴朝日昃而退諸侯之子孫必有在君之門庭者君以此思勞則勞將安不至矣君出魯之四門以望魯之四郊亡國之墟列必有數矣君以此思懼則懼將安不至矣丘聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將安不至矣夫執國之柄履民之上懍懍乎以腐索御犇馬易曰履虎尾詩曰如履薄氷不亦危乎哀公再拜曰寡人雖不敏請事斯語矣孔子在哀公朝乃告老之日也凡公有問宜於此時故併附於此哀公問於孔子曰吾聞君子不博有之乎孔子對曰有之哀公曰何為其不博也對曰為其有二乗公曰有二乗則何為不博也對曰為行惡道也哀公懼焉有間曰若是乎君子之惡惡道之甚也對曰惡惡道不能甚則其好善道也亦不能甚好善道不能甚則百姓之親之也亦不能甚詩云未見君子憂心惙惙亦既見止亦既覯止我心則恱詩之好善道之甚也如此公曰善哉吾聞君子成人之美不成人之惡㣲孔子吾焉聞斯言哉孔子御坐於哀公哀公賜之桃與黍哀公請用仲尼先飯黍而後㗖桃左右皆揜口而笑哀公曰黍者非飯之也以雪桃也仲尼對曰丘知之矣夫黍者五榖之長也祭先王為上盛果窳有六而桃為下祭先王不得入廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五榖之長雪果窳之下是從上雪下也丘以為妨義故不敢以先於宗廟之盛也哀公問政於孔子對曰政有使民富且夀哀公曰何謂也孔子曰薄賦斂則民富無事則逺罪逺罪則民夀公曰若此則寡人貧矣孔子曰詩云愷悌君子民之父母未見其子富而父母貧者也哀公問取人孔子曰無取健無取佞無取讒健驕也佞諂也讒誕也故弓調然後求勁焉馬服然後求良焉士信慤然後求智焉士不信焉又多智譬之豺狼其難以身迎矣書曰為虎傅翼不亦殆哉哀公問於孔子曰當今之時君誰賢對曰衞靈公公曰吾聞之其閨門之内姑姊妹無别對曰臣觀於朝廷未觀於堂陛之間也靈公之弟曰公子渠牟其智足以治千乗之國其信足以守之而靈公愛之又有士曰王林國有賢必進而任之無不逹也不能逹退而與分其禄而靈公尊之又有士曰慶足國有大事則進而治之無不濟也而靈公説之史鰌去衛靈公邸舍三月琴瑟不御待史鰌之入也而復入臣是以知其賢也哀公問於孔子曰鄙諺云莫衆而迷今寡人舉事與羣臣慮之而國愈亂其故何也孔子對曰明主之問臣一人知之一人不知也如是者明主在上羣臣直議於下今羣臣無不一辭同軌乎季孫者舉魯國盡化為一君雖問境内之人猶之不免於亂也哀公問於仲尼曰春秋之記曰冬十二月霣霜不殺菽何為記此仲尼曰此言可以殺而不殺也夫宜殺而不殺梅李冬實天失道草木猶犯干之而况於君人乎哀公問於孔子曰有智者夀乎孔子曰然人有三死而非命也者人自取之夫寢處不時飲食不節佚勞過度者疾共殺之居下位而上忤其君嗜慾無厭而求不止者刑共殺之少以犯衆弱以侮强忿怒不量力者兵共殺之此三死者非命也人自取之詩云人而無儀不死何為此之謂也公父文伯仕於晉病死女子為自殺於房中者二人其母聞之弗哭也其相室曰焉有此子死而弗哭者乎其母曰孔子賢人也逐於魯而是人弗隨也今死而婦人為之自殺者二人若是者必其於長者薄而於婦人厚也既而夫子聞之曰季氏之婦尚賢哉子路愀然對曰夫子亦好人之譽已乎夫子死而不哭是不慈也何善爾子曰怒其子之不能隨賢所以為尚賢者吾何有焉其亦善此而已矣文伯康子從兄弟與同時春秋别典卷十三
