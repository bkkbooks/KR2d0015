body:
  text: 春秋别典卷三明薛虞畿撰魯閔公元年庚申在位二年周惠王十六年衛懿公有臣曰𢎞演逺使未還狄人攻衛經二年書其民曰君之所與禄位者鶴也所富者宮人也君使宮人與鶴戰予焉能戰遂潰而去狄人追及懿公於滎澤殺之盡食其肉獨舎其肝𢎞演至報使於肝畢呼天而號盡哀而止曰臣請為表因自刺其腹納懿公之肝而死齊桓聞之曰衛之亡也以無道今有臣若此不可不存於是救衛於楚丘衛文公是年立以亂故犇齊齊人入之初狄殺懿公也衛人憐之思復立宣公前太子伋之後伋子又死而代伋死者子壽又無子太子伋同母弟二人其一曰黔牟牟嘗代惠公為君八年復去其二曰昭伯昭伯黔牟皆已前死故立昭伯子申為戴公公卒復立其弟燬為文公晉獻公太子之至靈臺虵繞左輪御曰太子下拜吾聞國君之子虵繞左輪者速得國太子遂不行返乎舎御人見太子太子曰吾聞為人子者盡和順君不行私欲恭嚴承命不逆君安今吾得國是君失安也得國之利而忘君安非子道也聞得國而拜其虵非君欲也廢子道不孝逆君欲不安而使我行之殆欲吾國之危明也拔劍將死御止之曰夫禎祥妖孽天之道也恭嚴承命人之行也拜祥戒孽禮也恭嚴承命不以身恨君孝也今太子恨福不福失禮殺身恨君失孝從僻心棄正行非臣之所聞也太子曰不然吾得國君之孽也拜君之孽不可謂禮見禨祥而忘君之安國之賊也懐賊心以事君不可謂孝挟偽意以御天下懷賊心以事君邪之大者也而使我行之是欲國之危明矣遂伏劍而死君子曰晉太子徒御使之拜虵祥猶惡之至於自殺者為見疑於欲國也己之不欲國以安君亦以明矣為一愚御過言之故至於身死虧子道絶祭祀不可謂孝可謂逺嫌一節之士也晉獻公之時東郭民有祖朝者上書獻公曰草茅臣東郭民祖朝願請聞國之計獻公使使出告之曰肉食者已慮之矣藿食者尚何與焉祖朝對曰大王獨不聞古之將曰桓司馬朝朝其君舉而晏御呼車驂亦呼車御肘其驂曰子何越云為乎何為藉呼車驂謂其御曰當呼者呼乃吾事也子當御正子之轡銜耳今子不正轡銜使馬率然驚妄轢道中行人必逢大敵下車免劍涉血履肝者固吾事也子寧能辟子之轡下佐我乎其禍亦及吾身與有深憂吾安得無呼車哉今大王曰肉食者已慮之矣藿食者尚何與焉設使肉食者一旦失計於廟堂之上若臣等之藿食者寧得無肝膽塗地於中原之野與其禍亦及臣之身臣與有其憂深臣安得無與國家之計乎獻公召而見之三日與語無復憂者乃立之以為師也晉獻公欲伐郭而憚舟之僑存荀息曰周書有言美女破舌乃遺之女樂以亂其政舟之僑諫而不聽遂去國而伐郭遂破之又欲伐虞而憚宮之竒在荀息曰周書有言美男破老乃遺之美男敎之惡宮之奇竒諫而不聽遂去國而伐虞遂取之魯僖公元年壬戌在位三十二年周惠王十八年齊桓公時江國黄國小國也在江淮之間近楚楚大國也數侵伐欲滅取之江人黄人患楚齊桓公方存亡繼絶救危扶傾尊周室攘夷狄為陽穀之㑹三年貫澤之盟與諸侯將伐楚四年江人黄人慕桓公之義来㑹盟於貫澤管仲曰江黄逺齊而近楚楚為利之國也若伐而不能救無以宗諸侯不可受也桓公不聽遂與之盟管仲死楚人伐江滅黄十二年桓公不能救君子閔之是後桓公信壞德衰諸侯不附遂凌夷不能復興虞公不聽宮之奇出謂其子曰虞將亡矣惟忠信者能留外㓂而不害除闇以應外謂之忠定身以行事謂之信今君施其所惡於人闇不除矣以賄滅親身不定矣夫國非忠不立非信不固旣不忠信而留外㓂㓂知其釁而歸圖焉已自拔其本矣何以能久吾不去懼及焉以其孥適西周三月虞乃亡晉滅虞虢俱五年冬百里奚少時家貧流落不偶出遊以干諸侯嘗之齊齊不用又之周周不用又轉而之他久之不返其妻無以自給乃西入秦為澣婦遂與奚相失奚遂歸虞事虞公為大夫及晉獻公伐虢道出虞境遂以璧馬賂虞公假道意在併虞宮之奇語奚曰是不可不諫也奚曰貪賂玩㓂公盖不可與言者也宮之竒曰然則子将遂已乎奚曰子盡子心吾行吾志耳奇諫虞公果不聽晉伐虢歸遂滅虞虜虞公及奚以歸百里奚為秦繆公夫人媵於秦四年秦迎婦於晉百里奚媵焉百里奚亡秦走宛楚鄙人執之繆公聞百里奚賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里奚在焉請以五羖羊皮贖之楚人遂與之時百里奚年已七十餘繆公釋其囚與語國事謝曰臣亡國之臣何足問繆公曰虞公不用子故亡非子罪也固問語三日繆公大悦授之國政號曰五羖大夫百里奚讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣遊困於齊而乞食銍人蹇叔収臣臣因而欲事齊君無知蹇叔止臣臣得脱齊難遂之周周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利禄爵且留再用其言得脱一不用及虞君難是以知其賢於是繆公使人厚幣迎蹇叔以為上大夫秦繆公使賈人載鹽徵諸賈人賈人買百里奚以五羖羊之皮使將車之秦穆公觀鹽見百里奚牛肥曰任重道逺以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也令有司具沐浴為衣冠與坐公大悅異日與公孫支論政公孫支大不寧曰君耳目聰明思慮審察君其得聖人乎公曰然吾悦夫奚之言彼𩔖聖人也公孫支遂歸取雁以賀曰君得社稷之聖臣敢賀社稷之福公不辭再拜而受明日公孫支乃致上卿以讓百里奚曰秦國處僻民陋以愚無知危亡之本也臣自知不足以處其上請以讓之公不許公孫支曰君不用賔相而得社稷之聖臣君之禄也臣見賢而讓之臣之禄也今君既得其禄矣而使臣失禄可乎請終致之公不許公孫支曰臣不肖而處上位是君失倫也不肖失倫臣之過也進賢而退不肖君之明也今臣處位廢君之德而逆臣之行也臣將逃公乃受之故百里奚為上卿以致之公孫支為次卿以佐之奚為秦相妻在秦知之而未敢言一日奚坐堂上樂作所賃澣婦自言知音因授琴撫絃而歌者三其一曰百里奚五羊皮憶别時烹伏雌炊扊扅今日富貴㤀我為其二曰百里奚初娶我時五羊皮臨當相别時烹牝鷄今日富貴忘我為其三曰百里奚百里奚母已死𦵏南溪墳以瓦覆以柴舂黄藜搤伏鷄西入秦五羖皮今日富貴捐我為歌畢奚愕然問之乃其故妻也遂還為夫婦奚相秦勤勵自苦勞不坐乗暑不張盖行於國中未嘗從車騎操干戈及其死也秦國男女流涕童子不歌謡舂者不相杵德澤流於後世而秦卒頼焉宋襄公兹父為桓公太子有後妻子曰公子目夷公愛之兹父為公愛之也欲立之請於公曰請使目夷立臣為之相兄以佐之公曰何故也對曰臣之舅在衛愛臣若終立則不可以往絶跡於衛是背母也且臣自知不足以處目夷之上公不許彊以請公公許之將立公子目夷夷辭曰兄立而弟在下是其義也今弟立而兄在下不義也不義而使目夷為之目夷將逃乃逃之衛兹父從之三年桓公有疾八年事使人召兹父若不来是使我以憂死也兹父乃反公復立之以為太子然後目夷歸也畧見傳此尤詳宋桓公病太子兹父讓其庶兄目夷為嗣桓公義太子意竟不聽桓公卒太子兹父立是為襄公以其庶兄目夷為相未𦵏而齊桓公㑹諸侯於葵丘九年齊桓公與管仲謀伐莒謀未發而聞於國桓公怪之以問管仲仲曰國必有聖人也桓公歎曰歖日之役者有執柘杵而上視者意其是耶乃令復役無得相代少焉東郭垂至管仲曰此必是也乃令儐者延而進之分級而坐管仲曰子言伐莒者也對曰然管仲曰我不言伐莒子何故言伐莒對曰臣聞君子善謀小人善意臣竊意之也管仲曰吾不言伐莒子何以意之也對曰臣聞君子有三色優然喜樂者鐘皷之色愀然清静者縗絰之色勃然充滿者兵革之色也日者臣望君之在臺上也勃然充滿此兵革之色君呼而不吟所言者莒也君舉臂而指所當者莒也臣竊慮小諸侯之未服者其惟莒乎臣故言之君子曰凡耳之聞以聲也今不聞其聲而以容與臂是東郭垂不以耳聽而聞也桓公管仲雖善謀不能隱聖人之聽於無聲視於無形東郭垂有之矣故桓公尊禄而禮之此條年不可考晉初與㑹獻公死九年國内亂秦繆公僻逺不與中國㑹盟楚成王初収荆蠻有之夷狄自置惟獨齊為中國㑹盟而桓公能宣其德故諸侯賔㑹於是桓公稱曰寡人南伐至召陵望熊山北伐山戎離枝孤竹西伐大夏涉流沙束馬縣車登太行至卑耳山而還諸侯莫違寡人寡人兵車之㑹三乗車之㑹六九合諸侯一匡天下昔三代受命有何以異於此乎吾欲封泰山禪梁父管仲固諫不聽乃說桓公以逺方珍怪物至乃得封桓公乃止桓公既伯㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云宓羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首皆受命然後得封禪桓公曰寡人北伐山戎西伐大夏涉流沙束馬縣車上卑耳之山南伐至召陵登熊耳山以望江漢兵車之㑹三乗車之㑹六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳯凰麒麟不来嘉穀不生而蓬蒿藜莠茂䲭梟𩔖至而欲封禪無乃不可乎桓公乃止桓公讀書於堂上輪扁斲輪於堂下釋椎鑿而上問桓公曰敢問公之所讀何言耶公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟粕已乎桓公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰以臣之事觀之斲輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能得之於臣是以行年七十而老斲輪古之人與其不可傳者死矣然則君之所讀者古人之糟粕已夫齊桓公謂鮑叔曰寡人欲鑄大鐘昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行桓公曰昔者吾圍譚三年得而不自與者仁也吾北伐孤竹剗令支而反者武也吾為葵丘之㑹以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也然則文武仁義寡人盡有之矣寡人之行豈避堯舜哉鮑叔曰君直言臣直對昔者公子糾在上位而不相讓非仁也背太公之言而侵魯境非義也壇塲之上詘於一劍非武也姪娣不離懐袵非文也凡為不善遍於物不自知者無天禍必有人害天處甚髙其聽甚下除君過言天且聞之桓公曰寡人有過乎幸記之社稷之福子不幸教幾有大罪以辱社稷桓公乗馬虎望見之而伏桓公問管仲曰今日寡人乗馬虎望見寡人而不敢行其故何也管仲對曰意者君乗駮馬而盤桓迎日而馳乎公曰然管仲對曰此駮象也駮食虎豹故虎伏焉桓公外舎而不鼎饋中婦諸子謂宮人盍不從乎君將有行宮人皆出從公怒曰孰謂我有行者宫人曰賤妾聞之中婦諸子公召中婦諸子曰女言聞吾有行也對曰妾聞之君外舎而不鼎饋非有内憂必有外患今君外舎而不鼎饋君非有内憂也妾是以知君之將有行也公曰善此非吾所與及也而言乃至焉吾是以語女吾欲致諸侯而不至為之奈何中婦諸子曰自妾之身之不為人持接也未嘗得人之布織也意者更容不審邪明日管仲朝公告之管仲曰此聖人之言也君必行之管仲復於桓公曰無翼而飛者聲也無根而固者情也無方而富者生也公亦固情謹聲以嚴尊生此謂道之榮桓公退再拜請若此言齊桓公出獵逐鹿而走入山谷之中見一老父而問之曰是為何谷對曰為愚公之谷桓公曰何故對曰以臣名之桓公曰今觀公之儀狀非愚人也何為以公名對曰臣請陳之臣故畜牸生子而大賣之買駒少年曰牛不能生馬遂持駒去傍隣聞之以臣為愚故名此谷為愚公之谷桓公曰公誠愚矣何為而與之桓公遂歸明日朝以告管仲管仲正衿再拜曰此夷吾之愚也使堯在上咎繇為理安有取人之駒者乎若有見暴如此叟者必不與也公知獄訟之不正故與之耳請退而修政孔子曰弟子記之桓公覇君也管仲賢佐也猶有以智為愚者也况不及桓公管仲者乎齊桓公與管仲鮑叔甯戚飲酒桓公謂鮑叔姑為寡人祝乎鮑叔奉酒而起曰祝吾君無㤀其出而在莒也使管仲無㤀其束縛而從魯也使甯戚無㤀其飯牛於車下也桓公避席再拜曰寡人與二大夫皆無㤀夫子之言齊之社稷必不廢矣此言常思困隘之時必不驕矣齊桓公出遊遇一丈夫裒衣應步帶著桃殳桓公怪而問之曰是何名何經所在何篇所居何以斥逐何以避余丈夫曰是名二桃桃之為言亡也夫曰慎桃何患之有故亡國之社稷以戒諸侯庶人之戒在於桃殳桓公說其言與之共載来年正月庶人皆佩桓公置酒令諸大夫曰後者飲一經程管仲後當飲一經程飲其半而棄其半桓公曰仲父當飲一經程而棄之何也管仲曰臣聞之酒入口者舌出舌出者失言失言者棄身與其棄身不寧棄酒乎桓公曰善齊桓公出逰於野見亡國故城郭氏之墟問於野人曰是為何墟野人曰是為郭氏之墟桓公曰郭氏者曷為墟野人曰郭氏者善善而惡惡桓公曰善善而惡惡人之善行也其所以為墟者何也野人曰善善而不能行惡惡而不能去是以為墟也桓公歸以語管仲曰其人為誰桓公不知也管仲曰君亦一郭氏也於是桓公招野人而賞焉里克殺奚齊卓子使告公子求入而納之公子以告子犯子犯不可曰夫堅樹在始始不固本終必槁落夫長國家者唯知哀樂喜怒之節是以導民不哀喪而求國難因亂以入殆以喪得國則必樂喪樂喪必哀生因亂以入則必喜亂喜亂必怠徳是哀樂喜怒之節易也何以導民重耳曰非喪誰代非亂誰納我子犯曰偃也聞之喪亂有大小大喪大亂之剡也父母死為大喪讒在兄弟為大亂今適當之是故難里克殺君九年事狐突遇申生兒乃謡曰共太子更塟矣後十四年晉亦不昌昌乃在兄十年鮑叔有疾管仲為之不内水漿曰馬為知己者良士為知己者死鮑子亡天下莫知我安用水漿鮑叔死管仲舉上袵而哭之泣下如雨從者曰非君父子也此亦有説乎管仲曰非夫子所知也吾嘗與鮑子負販于南陽吾三辱于市鮑子不以我為怯知我之欲有所明也鮑子嘗與我有所說王者而三不見聽鮑子不以我為不肖知我之不遇明君也鮑子嘗與我臨財分貨吾自取多者三鮑子不以我為貪知我之不足於財也生我者父母知我者鮑子也士為知己者死而况為之哀乎秦穆公嘗出而亡其駿馬自往求之見人已殺其馬方共食其肉繆公問曰是吾駿馬也諸人皆懼而起繆公曰吾聞食駿馬肉不飲酒者殺人即以次飲之酒殺馬者皆慙而去居三年晉攻秦繆公圍之往時食馬肉者相謂曰可以出死報食馬得酒之恩矣遂潰圍繆公卒得以解難勝晉獲惠公以歸此徳出而福反也韓之戰在十五年齊桓公問於寗戚曰管子今年老矣若棄寡人而就世吾恐法令不行人多失職百姓疾怨國多盜賊吾何如而使奸邪不起民衣食足乎寗戚對曰要在得賢開其道路而任之桓公曰得賢奈何寗戚對曰開其道路察而用之尊其位重其禄顯其名則天下之士騷然舉足而至矣桓公曰既以舉賢士而用之矣㣲夫子幸而臨之則未有布衣崛竒之士踵門而求見寡人者寗戚對曰是君察之不明舉之不顯而用之疑位之卑禄之薄也且夫國之不得士者有五阻焉主不好賢諂諛在傍一阻也言便事者未嘗見用二阻也壅塞掩蔽必因近習然後見察三阻也訊獄詰窮其辭以法遏之四阻也執事適欲擅國權命五阻也去此五阻則豪俊並興賢智求處五阻不去則上蔽吏民之情下塞賢士之路是故明王聖主之治若夫江海無不受故長為百川之主明王聖君無不容故安樂而長久由此觀之則安主利人者非獨一士也桓公曰善吾将著夫五阻以為式本也管仲有疾桓公問之曰仲父之病病矣可不謂云至於大病則寡人惡乎屬國而可管仲曰公誰欲與公曰鮑叔牙曰不可其為人亷潔善士也其扵不已若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也将弗乆矣公曰然則孰可對曰勿己則隰朋可其為人也上忘而下畔愧不若黄帝而哀不己若者以徳分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其扵國有不聞也其於家有不見也勿己則隰朋可公又問曰不幸而失仲父也二三大夫其猶能以國寧乎管仲對曰君請矍已乎鮑叔牙之為人也好直賓胥無之為人也好善寗戚之為人也能事孫在之為人也善言公曰此四子者其孰能一人之上也寡人并而臣之則其不以國寧何也對曰鮑叔之為人也好直而不能以國詘賓胥無之為人也好善而不能以國詘寗戚之為人也能事而不能以足息孫在之為人也善言而不能以口息臣聞之消息盈虚與百姓詘信然後能以國勿己者朋其可乎朋之為人也動必量力舉必量技言終喟然而嘆曰天之生朋以為夷吾舌也其身死舌焉得生哉管仲又言曰東郭有狗嘊嘊旦夕欲齧我豭而不使也今夫易牙子之不能愛將安愛君必去之公曰諾管子又言曰北郭有狗嘊嘊旦暮欲齧我豭而不使也今夫竪刁其身之不愛焉能愛君必去之公曰諾管子又言曰西郭有狗嘊嘊旦暮欲齧我豭而不使也今夫衛公子開方去其千乗之太子而臣事君是所願得於君者是將欲過其千乗也君必去之桓公曰諾管子遂卒十月隰朋亦卒桓公去易牙竪刁衞公子開方五味不至於是乎復反易牙宮中亂復反竪刁利言卑辭不在側復反衞公子開方桓公内不量力外不量交而力伐四隣公薨六子皆求立公死七日不斂九月不葬齊國大亂桓公問管仲疾管仲曰臣願君之逺易牙竪刁堂誣公子開方夫易牙以調味事公公曰唯烝嬰兒之未嘗於是蒸其首子而獻之公人情非不愛其子也於子之不愛将何有扵公公喜内而妬竪刁自刑而為公治内人情非不愛其身也於身之不愛也将何有于公公子開方事公十五年不歸視其親齊衞之間不容數日之行臣聞之務偽不乆盖虚不長其生不長者其死必不終桓公曰善管仲死已塟公憎四子者廢之官逐堂誣而苛病起兵逐易牙而味不至逐竪刁而宮中亂逐公子開方而朝不治桓公曰嗟聖人固有悖乎乃復四子者處期年四子作難圍公一室不得出有一婦人遂從竇入得至公所公曰吾饑而欲食渴而欲飲不可得其故何也婦人對曰易牙竪刁堂誣公子開方四人分其齊國塗十日不通矣公子開方以書社七百下衞矣食将不得矣公曰嗟乎兹聖人之言長乎哉死者無知即已若有知吾何面目以見仲父地下乃援素襪以裹首而絶死十一日蟲出户乃知桓公之死也葬以揚門之扇十二年管仲受享禮扵王以后不見經𫝊十七年冬經書齊侯小白卒仲卒當在十四年十五年中管子書記仲戒公勿用易牙竪刁開方仲卒公逐三子未也幾復用處朞年而三子作亂則公亦薨是可証春秋别典卷三
